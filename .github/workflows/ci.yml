name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One run per branch/PR: cancel superseded runs, but never on main.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  # Warnings are errors in CI — this is the "clippy must be green" gate.
  # Local `make check` stays lenient; CI runs the same command, strictly.
  RUSTFLAGS: -Dwarnings

jobs:
  # Formatting uses the NIGHTLY toolchain on purpose: rustfmt.toml has
  # nightly-only options (see the Makefile). No compile, so it's its own fast job.
  fmt:
    name: rustfmt (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: make fmt-check

  # clippy + tests on stable — the exact `make check` you run locally.
  check:
    name: clippy + tests (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: make check

  # The lean core must keep compiling AI/server-free: the mobile-client contract.
  # This is the guard that stops a core module from quietly reaching into a gated one.
  core:
    name: lean core (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make build-core

  # The frb bridge crate (apps/mobile/rust) wraps the lean core for the mobile
  # app. Pure host Rust (no Android SDK, no Flutter), so it is cheap enough to
  # block every PR: this is what catches a lib API change silently breaking
  # the mobile bridge between emulator runs. The full on-device story is the
  # scheduled mobile build, not this job.
  bridge:
    name: mobile bridge (host tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/mobile/rust
      - run: cargo test --manifest-path apps/mobile/rust/Cargo.toml

  # The mobile suite against the real embedded core, no emulator: the Dart
  # unit + widget tests load the host dylib, then the full-app integration
  # test drives picker -> review -> grade in a headless Linux window and
  # asserts the store file. Blocking like e2e, and for the same reason: this
  # is the layer that catches a change silently breaking the mobile review
  # flow. Time is injected through the bridge, so nothing here sleeps; the
  # on-Android tier of the same suite belongs to the weekly mobile-drift
  # workflow.
  mobile-e2e:
    name: mobile e2e (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/mobile/rust
      - name: Linux desktop build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev xvfb
      - run: cargo build --release --manifest-path apps/mobile/rust/Cargo.toml
      - run: cd apps/mobile && flutter test
      - run: cd apps/mobile && xvfb-run -a flutter test integration_test -d linux

  # Browser-driven smoke over the real binary: a click must reach the server and
  # change the screen, with no uncaught page errors. This is the only layer that
  # catches a control which silently does nothing. Blocking, on purpose — an
  # advisory red here would decay into noise. What it does NOT cover, and why,
  # is written down in e2e/README.md.
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      # Playwright's `webServer` shells out to `cargo run`. A cold compile inside
      # its start timeout is a classic flake, so build first: the servers then
      # boot in about a second.
      - run: cargo build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - run: make e2e
      # A red run that only says "timeout" gets ignored, then disabled, then
      # deleted. The trace makes it actionable (config sets retain-on-failure).
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-traces
          path: e2e/test-results/
          if-no-files-found: ignore

  # Coverage — informational (a flashlight, not a gate): it computes line
  # coverage, prints the summary, uploads the browsable HTML as an artifact, and
  # uploads lcov to Codecov (also informational — see codecov.yml). Nightly-only
  # toolchain: `make coverage`/`make coverage-lcov` both run under
  # `cargo +nightly llvm-cov` so the `#[cfg_attr(coverage_nightly, ...)]`
  # exclusions in src/ apply consistently to both reports.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "" # coverage instruments its own flags; it isn't the warnings gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: make coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html/
      # lcov output for Codecov (see Makefile's coverage-lcov). Informational
      # only — codecov.yml sets both statuses to informational and
      # fail_ci_if_error is false, so this never gates CI.
      - run: make coverage-lcov
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
