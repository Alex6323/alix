name: pages

# Build the landing page (site/) + the mdBook manual (docs/book) and publish them
# to GitHub Pages as ONE site: the landing page at /, the book at /book/.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/book/**"
      - "assets/alix.svg"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# The deploy job needs to publish to Pages; everything else is read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time — and never cancel a deploy mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build (site + book)
    runs-on: ubuntu-latest
    # Job-level so the steps' `if: env.SITE_DETAILS …` conditions can see it:
    # a step's own env block is invisible to its own `if`.
    env:
      SITE_DETAILS: ${{ secrets.SITE_DETAILS }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build the book
        run: mdbook build docs/book # → docs/book/book
      - name: Assemble the site (landing at /, book under /book/)
        run: |
          mkdir -p _site
          cp -r site/. _site/
          cp assets/alix.svg _site/icon.svg
          cp -r docs/book/book _site/book
      # site/impressum.html + site/datenschutz.html carry {{placeholder}}
      # tokens (see scripts/site-details.py). Real postal details never
      # enter git history: they live only in the SITE_DETAILS repo secret
      # (JSON: name/street/city/email/phone) and get stamped into the built
      # _site artifact here, right before deploy.
      #
      # No secret configured (forks, or before it's set up): skip silently,
      # deploy with the templates' own visible "[wird beim Deploy
      # eingesetzt]" placeholder text, never fail the build for this.
      # Secret set but malformed (bad JSON, or a missing/empty required
      # key): --check fails the build loudly, before anything deploys.
      - name: Check site details placeholders
        if: env.SITE_DETAILS != ''
        run: python3 scripts/site-details.py --check _site
      - name: Inject site details
        if: env.SITE_DETAILS != ''
        run: python3 scripts/site-details.py --inject _site
      - name: Note missing SITE_DETAILS secret
        if: env.SITE_DETAILS == ''
        run: |
          echo "::notice::SITE_DETAILS secret not set, deploying site/impressum.html and site/datenschutz.html with their local-preview placeholder text."
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy (pages)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
