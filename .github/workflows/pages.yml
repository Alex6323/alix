name: pages

# Build the landing page (site/) + the mdBook manual (docs/book) and publish them
# to GitHub Pages as ONE site: the landing page at /, the book at /book/.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/book/**"
      - "assets/alix.svg"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# The deploy job needs to publish to Pages; everything else is read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time — and never cancel a deploy mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build (site + book)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build the book
        run: mdbook build docs/book # → docs/book/book
      - name: Assemble the site (landing at /, book under /book/)
        run: |
          mkdir -p _site
          cp -r site/. _site/
          cp assets/alix.svg _site/icon.svg
          cp -r docs/book/book _site/book
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy (pages)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
