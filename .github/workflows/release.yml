name: release

# Cut a release: on a version tag (e.g. v0.1.0), cross-compile `alix` for each
# target and upload the archives to the GitHub Release. The asset names match the
# download buttons on alix.io AND site/install.sh:
#   alix-aarch64-apple-darwin.tar.gz   alix-x86_64-apple-darwin.tar.gz
#   alix-x86_64-unknown-linux-gnu.tar.gz   alix-x86_64-pc-windows-msvc.zip
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the Release and upload its assets

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,     os: macos-latest }
          - { target: x86_64-apple-darwin,      os: macos-13 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-pc-windows-msvc,   os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds, archives (.tar.gz / .zip on Windows), and uploads to the release
      # for the pushed tag — creating the release if it doesn't exist yet.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: alix
          target: ${{ matrix.target }}
          archive: alix-$target
          include: LICENSE-MIT,LICENSE-APACHE,README.md
          token: ${{ secrets.GITHUB_TOKEN }}
