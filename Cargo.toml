[package]
name = "alix"
version = "0.1.0"
authors = ["Alex6323 <Al3k5@protonmail.com>"]
edition = "2024"
description = "An AI-augmented spaced-repetition learning tool for the terminal and the web."
keywords = ["learning", "flashcards", "spaced-repetition", "tui"]
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
directories = "6"
ratatui = "0.30"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
strsim = "0.11"
thiserror = "2"
tiny_http = "0.12"
toml = "1"
twox-hash = "2"

[dev-dependencies]
tempfile = "3"

[lib]
name = "alix"
path = "src/lib.rs"

[[bin]]
name = "alix"
path = "src/main.rs"
