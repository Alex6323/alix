[package]
name = "alix"
version = "0.2.0"
authors = ["Alex6323 <Al3k5@protonmail.com>"]
edition = "2024"
description = "Your personal AI tutor — built for understanding, not just remembering."
keywords = ["spaced-repetition", "flashcards", "anki", "llm", "study"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/Alex6323/alix"
homepage = "https://alix.study"
readme = "README.md"
categories = ["command-line-utilities"]
exclude = ["docs/", "site/", ".github/", "examples/"]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
directories = "6"
ratatui = "0.30"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
strsim = "0.11"
thiserror = "2"
tiny_http = "0.12"
toml = "1"
twox-hash = "2"

[dev-dependencies]
tempfile = "3"

[lib]
name = "alix"
path = "src/lib.rs"

[[bin]]
name = "alix"
path = "src/main.rs"

# examples/ is excluded from the published package (see `exclude` above), but
# `test = true` still makes plain `cargo test` build and run this example's
# `#[cfg(test)]` unit tests locally and in CI — otherwise `cargo clippy
# --all-targets` compiles them but `cargo test` never executes them.
[[example]]
name = "gh-review-prep"
test = true
