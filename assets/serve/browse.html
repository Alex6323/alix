<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>flash — browse</title>
<style>
  :root {
    --void: #06121a;
    --panel-top: #103241;
    --panel-bot: #0a212b;
    --ink: #e8f4f5;
    --dim: #6f939d;
    --line: #173640;
    --bolt: #22d3ee;
    --bolt-hi: #7df9e8;
    --good: #3ee0a0;
    --again: #ff6b6b;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --card-w: min(94vw, 720px);
    --card-h: min(70vh, 600px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, #0c2734 0%, var(--void) 60%) fixed;
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; min-height: 100%; overflow: hidden;
  }
  .bar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; font-family: var(--mono); font-size: 0.78rem;
    color: var(--dim); border-bottom: 1px solid var(--line); background: rgba(6,18,26,0.6);
  }
  .bar .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--bolt); font-weight: 600; }
  .bar .brand svg { width: 13px; height: 16px; filter: drop-shadow(0 0 5px rgba(34,211,238,0.6)); }
  .bar .deck { color: var(--ink); }
  .bar .tag { color: var(--dim); }
  .bar .sep { color: var(--line); }
  .bar .spacer { flex: 1; }
  .bar .charge { width: 84px; height: 6px; border-radius: 99px; background: var(--line); overflow: hidden; }
  .bar .charge i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--bolt), var(--bolt-hi)); box-shadow: 0 0 8px rgba(34,211,238,0.7); transition: width 0.25s ease; }
  .bar .pos { color: var(--ink); }

  .stage { flex: 1; display: grid; place-items: center; padding: 24px 16px; min-height: 0; }
  .stack {
    position: relative; width: var(--card-w); height: var(--card-h);
    animation: deal 0.28s cubic-bezier(0.2,0.7,0.2,1) both;
  }
  @keyframes deal { from { opacity: 0; transform: translateY(12px) scale(0.985); } to { opacity: 1; transform: none; } }
  .peek { position: absolute; inset: 0; border-radius: 20px; background: var(--panel-bot); border: 1px solid var(--line); }
  .peek.p1 { transform: translate(7px,-7px); opacity: 0.7; }
  .peek.p2 { transform: translate(14px,-14px); opacity: 0.4; }
  .stack[data-depth="1"] .peek { display: none; }
  .stack[data-depth="2"] .peek.p2 { display: none; }

  .card {
    position: absolute; inset: 0; border-radius: 20px;
    background: linear-gradient(160deg, var(--panel-top), var(--panel-bot));
    border: 1px solid var(--line); box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
    padding: 30px 26px; overflow: auto;
    display: flex; flex-direction: column; justify-content: safe center; text-align: center;
  }
  .card::after { content: ""; position: absolute; inset: 12px; border-radius: 12px; border: 1px solid rgba(125,249,232,0.10); pointer-events: none; }
  .front-text { font-size: clamp(1.35rem, 4.2vw, 2rem); font-weight: 600; line-height: 1.28; letter-spacing: -0.01em; }
  .context { color: var(--bolt); font-family: var(--mono); font-size: 0.95rem; margin-top: 12px; white-space: pre-wrap; }
  .context .hole { color: var(--bolt-hi); font-weight: 700; }
  .context .muted-hole { color: var(--dim); }
  /* the card is a flex column; bound the image by it (shrink + min-height:0) so
     it scales to fit, with flex-grow 0 so small images keep their natural size. */
  .card-img { flex: 0 1 auto; min-height: 0; align-self: center; max-width: 100%; object-fit: contain; margin: 12px auto 0; border-radius: 8px; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--line) 18%, var(--line) 82%, transparent); margin: 22px auto; width: 70%; }
  .answer { color: var(--good); font-size: clamp(1.1rem, 3.4vw, 1.4rem); line-height: 1.4; margin: 0 0 6px; white-space: pre-wrap; }
  .note {
    text-align: left; margin: 18px auto 0; max-width: 600px;
    background: rgba(245, 213, 122, 0.09); border: 1px solid rgba(245, 213, 122, 0.18);
    border-left: 3px solid #e7c66b; border-radius: 10px;
    padding: 12px 15px; color: #ecdca6; font-size: 0.93rem;
  }
  .note p { margin: 0 0 10px; } .note p:last-child { margin-bottom: 0; }
  .note pre { margin: 8px 0; padding: 10px 12px; overflow-x: auto; background: rgba(0,0,0,0.32); border-radius: 8px; font: 0.82rem/1.45 var(--mono); color: #cfe0e3; }

  .legend { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; color: var(--ink); border: 1px solid var(--line);
    border-radius: 11px; padding: 8px 13px; min-height: 42px;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .chip .k { font-family: var(--mono); font-size: 0.68rem; color: var(--dim); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; }
  .chip:hover { border-color: var(--bolt); color: var(--bolt-hi); }
  .chip:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .chip:disabled { opacity: 0.35; cursor: default; border-color: var(--line); color: var(--ink); }
  .msg { color: var(--dim); font-family: var(--mono); }

  .menu-wrap { position: relative; flex: none; }
  .kebab {
    background: none; border: 0; color: var(--dim); cursor: pointer;
    font-size: 1.15rem; line-height: 1; padding: 4px 8px; min-height: auto;
    border-radius: 8px; max-width: none;
  }
  .kebab:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
  .menu {
    position: absolute; right: 0; top: calc(100% + 8px); z-index: 20;
    display: none; min-width: 168px; padding: 6px;
    background: #0b2531; border: 1px solid var(--line); border-radius: 11px;
    box-shadow: 0 14px 34px -12px rgba(0,0,0,0.8);
  }
  .menu.open { display: block; }
  .menu button {
    display: block; width: 100%; text-align: left; background: none;
    color: var(--again); border: 0; border-radius: 7px; cursor: pointer;
    padding: 11px 12px; font-size: 0.92rem; font-weight: 500;
  }
  .menu button:hover { background: rgba(255,255,255,0.07); }
  .menu .mk { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); float: right; }

  /* ── deck-selection screen ────────────────────────────────────────── */
  .select { width: var(--card-w); text-align: left; animation: deal 0.3s both; }
  .select .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 16px; }
  .deck-filter { width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 11px 14px; background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 11px; color: var(--ink); font: inherit; font-size: 0.95rem; }
  .deck-filter::placeholder { color: var(--dim); }
  .deck-filter:focus { outline: none; border-color: var(--bolt); }
  .decklist { display: flex; flex-direction: column; gap: 8px; max-height: 62vh; overflow-y: auto; scrollbar-width: none; }
  .decklist::-webkit-scrollbar { width: 0; }
  .deckrow { display: flex; align-items: center; gap: 12px; padding: 12px 14px; min-height: 48px; border: 1px solid var(--line); border-radius: 11px; cursor: pointer; transition: border-color 0.12s, background 0.12s; }
  .deckrow:hover { border-color: var(--bolt); }
  .deckrow:focus { outline: none; border-color: var(--bolt); box-shadow: 0 0 0 2px rgba(125,249,232,0.35); }
  .deckrow .box { flex: none; width: 18px; height: 18px; border: 1px solid var(--dim); border-radius: 5px; }
  .deckrow.on { border-color: var(--bolt); background: rgba(125,249,232,0.06); }
  .deckrow.on .box { background: var(--bolt); border-color: var(--bolt); position: relative; }
  .deckrow.on .box::after { content: "✓"; position: absolute; inset: 0; display: grid; place-items: center; color: var(--void); font-size: 0.8rem; font-weight: 700; }
  .deckrow .name { flex: 1; }
  .deckrow .name .lock { color: var(--dim); }
  .deckrow .meta { font-family: var(--mono); font-size: 0.74rem; color: var(--dim); }
  .deckrow .meta.state-finished { color: var(--good); }
  .deckrow.locked { opacity: 0.55; }
  .deckrow.locked:hover { border-color: var(--bolt); }
  .chip.primary { background: var(--bolt); color: var(--void); border-color: var(--bolt); }
  .chip.primary .k { color: rgba(6,18,26,0.55); border-color: rgba(6,18,26,0.3); }

  @media (prefers-reduced-motion: reduce) { .stack { animation: none; } .bar .charge i { transition: none; } }
</style>
</head>
<body>
  <div class="bar">
    <span class="brand">
      <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M 269 168 L 221 254 L 253 254 L 237 348 L 297 246 L 263 246 L 285 168 Z" fill="currentColor"/></svg>
      flash
    </span>
    <span class="sep">·</span>
    <span class="deck" id="deck"></span>
    <span class="tag">browse</span>
    <span class="spacer"></span>
    <span class="charge"><i id="charge"></i></span>
    <span class="pos" id="pos"></span>
    <span class="menu-wrap" id="menuWrap">
      <button class="kebab" id="kebab" aria-label="More actions" aria-haspopup="true">⋮</button>
      <div class="menu" id="menu" role="menu">
        <button id="mRemove" role="menuitem">Remove card <span class="mk">x</span></button>
      </div>
    </span>
  </div>
  <main class="stage" id="stage"></main>
  <div class="legend" id="legend"></div>

<script>
"use strict";
let cards = [];
let label = "";
let phase = "browse"; // "select" while choosing decks
let i = 0;
let KEYS = {};        // configured [browse] key bindings, from /api/keys

const stage = document.getElementById("stage");
const legend = document.getElementById("legend");
const deckEl = document.getElementById("deck");
const posEl = document.getElementById("pos");
const chargeEl = document.getElementById("charge");
const menuWrap = document.getElementById("menuWrap");
const menu = document.getElementById("menu");

function post(body) { return { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }; }
function el(tag, cls, text) { const n = document.createElement(tag); if (cls) n.className = cls; if (text !== undefined) n.textContent = text; return n; }
function cardImage(src) { const img = el("img", "card-img"); img.src = src; img.alt = ""; return img; }
function hit(e, binds) { return (binds || []).some(b => b.ctrl === e.ctrlKey && e.key.toLowerCase() === b.k.toLowerCase()); }
function keyLabel(binds) {
  if (!binds || !binds.length) return "";
  const b = binds[0];
  const name = b.k === " " ? "space" : b.k === "Enter" ? "enter" : b.k === "Escape" ? "esc" : b.k === "Backspace" ? "bksp" : b.k;
  return (b.ctrl ? "ctrl-" : "") + name;
}

function apply(d) { phase = d.phase; label = d.label; cards = d.cards || []; i = 0; render(); }
function select(names) { fetch("/api/select", post({ decks: names })).then(r => r.json()).then(apply); }
function deselect() { menu.classList.remove("open"); fetch("/api/deselect", post({})).then(r => r.json()).then(apply); }

function remove() {
  if (cards.length === 0) return;
  fetch("/api/remove", post({ index: i })).then(r => r.json()).then(d => {
    cards = d.cards;
    if (i >= cards.length) i = Math.max(0, cards.length - 1);
    render();
  });
}
function go(n) { i = Math.max(0, Math.min(cards.length - 1, n)); render(); }

function render() {
  menu.classList.remove("open");
  stage.innerHTML = "";
  legend.innerHTML = "";
  if (phase === "select") { renderSelect(); return; }
  deckEl.textContent = label;
  if (cards.length === 0) {
    posEl.textContent = "";
    chargeEl.style.width = "0%";
    menuWrap.style.display = "none";
    stage.appendChild(el("div", "msg", "No cards."));
    chip("Back to Decks", deselect, false, "esc");
    return;
  }
  menuWrap.style.display = "";
  posEl.textContent = `${i + 1} / ${cards.length}`;
  chargeEl.style.width = ((i + 1) / cards.length * 100) + "%";

  const c = cards[i];
  const depth = Math.min(3, cards.length);
  const deck = el("div", "stack"); deck.dataset.depth = depth;
  deck.appendChild(el("div", "peek p2"));
  deck.appendChild(el("div", "peek p1"));
  const card = el("div", "card");
  card.appendChild(el("div", "front-text", c.front));
  for (const ctx of c.context) card.appendChild(contextLine(ctx));
  if (c.img) card.appendChild(cardImage(c.img));
  card.appendChild(el("div", "divider"));
  for (const b of c.back) card.appendChild(el("div", "answer", b));
  if (c.img_back) card.appendChild(cardImage(c.img_back));
  renderNote(card, c.note);
  deck.appendChild(card);
  stage.appendChild(deck);

  chip("Prev", () => go(i - 1), i === 0, keyLabel(KEYS.prev) || "←");
  chip("Next", () => go(i + 1), i === cards.length - 1, keyLabel(KEYS.next) || "→");
  chip("Decks", deselect, false, "esc");
}

// The deck-selection screen: a checklist of available decks + a Start button.
async function renderSelect() {
  deckEl.textContent = "select decks";
  posEl.textContent = "";
  chargeEl.style.width = "0%";
  menuWrap.style.display = "none";

  const data = await (await fetch("/api/decks")).json();
  const wrap = el("div", "select");
  wrap.appendChild(el("div", "lede", "choose decks to browse"));
  if (!data.decks.length) {
    wrap.appendChild(el("div", "msg", "No decks found. Add .txt decks to your decks folder."));
    stage.appendChild(wrap);
    return;
  }

  const filter = el("input", "deck-filter");
  filter.type = "text";
  filter.placeholder = "filter decks…";
  filter.autocomplete = "off";
  wrap.appendChild(filter);

  const chosen = new Set();
  const startChip = el("button", "chip primary", "Start");
  startChip.appendChild(el("span", "k", "enter"));
  startChip.disabled = true;
  startChip.addEventListener("click", () => { if (chosen.size) select([...chosen]); });
  const toggle = (row, name) => {
    if (chosen.has(name)) chosen.delete(name); else chosen.add(name);
    row.classList.toggle("on");
    startChip.disabled = chosen.size === 0;
  };

  const list = el("div", "decklist");
  const rows = [];
  for (const d of data.decks) {
    const row = el("div", "deckrow" + (d.locked ? " locked" : ""));
    row.tabIndex = 0;
    row.appendChild(el("span", "box"));
    const name = el("span", "name", d.name);
    if (d.locked) name.appendChild(el("span", "lock", " \u{1F512}"));
    row.appendChild(name);
    if (d.meta) row.appendChild(el("span", "meta state-" + d.state, d.meta));
    row.addEventListener("click", () => toggle(row, d.name));
    rows.push({ row, name: d.name.toLowerCase() });
    list.appendChild(row);
  }
  wrap.appendChild(list);
  stage.appendChild(wrap);
  legend.appendChild(startChip);

  const visible = () => rows.filter(r => r.row.style.display !== "none");

  // Substring filter, like the TUI picker; toggled selections survive hiding.
  filter.addEventListener("input", () => {
    const q = filter.value.trim().toLowerCase();
    for (const { row, name } of rows) row.style.display = !q || name.includes(q) ? "" : "none";
  });

  // ↑/↓ move between the filter box and the visible rows; Space toggles a
  // focused row (Enter still starts, handled globally).
  filter.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); const v = visible(); if (v.length) v[0].row.focus(); }
  });
  list.addEventListener("keydown", (e) => {
    const row = e.target.closest(".deckrow");
    if (!row) return;
    const v = visible();
    const idx = v.findIndex(r => r.row === row);
    if (e.key === "ArrowDown") { e.preventDefault(); if (idx < v.length - 1) v[idx + 1].row.focus(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); if (idx > 0) v[idx - 1].row.focus(); else filter.focus(); }
    else if (e.key === " ") { e.preventDefault(); toggle(row, row.querySelector(".name").textContent); }
  });

  filter.focus(); // ready to type-to-filter immediately
}

function contextLine(text) {
  const div = el("div", "context");
  div.innerHTML = escapeHtml(text)
    .split("____").join('<span class="hole">____</span>')
    .split("[…]").join('<span class="muted-hole">[…]</span>');
  return div;
}
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderNote(parent, units) {
  if (!units || units.length === 0) return;
  const note = el("div", "note");
  for (const u of units) {
    if (u.kind === "sentence") note.appendChild(el("p", null, u.text));
    else if (u.kind === "code") {
      const pre = el("pre");
      pre.appendChild(el("code", null, u.lines.join("\n")));
      note.appendChild(pre);
    }
  }
  parent.appendChild(note);
}

function chip(text, onClick, disabled, key) {
  const b = el("button", "chip", text);
  if (key) b.appendChild(el("span", "k", key));
  b.disabled = !!disabled;
  b.addEventListener("click", onClick);
  legend.appendChild(b);
}

document.addEventListener("keydown", (e) => {
  if (e.altKey || e.metaKey) return; // ctrl handled per-binding below
  if (phase === "select") {
    if (e.key === "Enter") {
      const b = legend.querySelector(".chip.primary");
      if (b && !b.disabled) { e.preventDefault(); b.click(); }
    }
    return;
  }
  // Esc returns to the deck picker.
  if (e.key === "Escape") { e.preventDefault(); deselect(); return; }
  // first/last stay fixed at g/G/Home/End, like the TUI; arrows always move
  if (hit(e, KEYS.remove)) { e.preventDefault(); remove(); }
  else if (hit(e, KEYS.next) || e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); go(i + 1); }
  else if (hit(e, KEYS.prev) || e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); go(i - 1); }
  else if (e.key === "g" || e.key === "Home") go(0);
  else if (e.key === "G" || e.key === "End") go(cards.length - 1);
});

document.getElementById("kebab").addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("open"); });
menu.addEventListener("click", (e) => e.stopPropagation());
document.getElementById("mRemove").addEventListener("click", () => { menu.classList.remove("open"); remove(); });
document.addEventListener("click", () => menu.classList.remove("open"));

// Load the configured key bindings first, then the cards (or the picker).
fetch("/api/keys").then(r => r.json()).then(k => {
  KEYS = k;
  document.querySelector("#mRemove .mk").textContent = keyLabel(KEYS.remove);
  return fetch("/api/cards");
}).then(r => r.json()).then(apply);
</script>
</body>
</html>
