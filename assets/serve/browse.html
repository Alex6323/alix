<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>alix — browse</title>
<link rel="stylesheet" href="/theme.css">
<script>document.documentElement.dataset.theme=(function(){try{return localStorage.getItem("alix-theme")}catch(e){return null}})()||"dark";</script>
<style>
  :root {
    --card-w: min(94vw, 720px);
    --card-h: min(70vh, 600px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, var(--halo) 0%, var(--void) 60%) fixed;
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; min-height: 100%; overflow: hidden;
  }
  .bar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; font-family: var(--mono); font-size: 0.78rem;
    color: var(--dim); border-bottom: 1px solid var(--line); background: rgba(6,18,26,0.6);
  }
  .bar .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--bolt); font-weight: 600; }
  .bar .brand svg { width: 13px; height: 16px; filter: drop-shadow(0 0 5px rgba(34,211,238,0.6)); }
  .bar .deck { color: var(--ink); }
  .bar .tag { color: var(--dim); }
  .bar .sep { color: var(--line); }
  .bar .spacer { flex: 1; }
  .bar .charge { width: 84px; height: 6px; border-radius: 99px; background: var(--line); overflow: hidden; }
  .bar .charge i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--bolt), var(--bolt-hi)); box-shadow: 0 0 8px rgba(34,211,238,0.7); transition: width 0.25s ease; }
  .bar .pos { color: var(--ink); }

  .stage { flex: 1; display: grid; place-items: center; padding: 24px 16px; min-height: 0; }
  .stack {
    position: relative; width: var(--card-w); height: var(--card-h);
    animation: deal 0.28s cubic-bezier(0.2,0.7,0.2,1) both;
  }
  @keyframes deal { from { opacity: 0; transform: translateY(12px) scale(0.985); } to { opacity: 1; transform: none; } }
  .peek { position: absolute; inset: 0; border-radius: 20px; background: var(--panel-bot); border: 1px solid var(--line); }
  .peek.p1 { transform: translate(7px,-7px); opacity: 0.7; }
  .peek.p2 { transform: translate(14px,-14px); opacity: 0.4; }
  .stack[data-depth="1"] .peek { display: none; }
  .stack[data-depth="2"] .peek.p2 { display: none; }

  .card {
    position: absolute; inset: 0; border-radius: 20px;
    background: linear-gradient(160deg, var(--panel-top), var(--panel-bot));
    border: 1px solid var(--line); box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
    padding: 30px 26px; overflow: auto;
    display: flex; flex-direction: column; justify-content: safe center; text-align: center;
  }
  .card::after { content: ""; position: absolute; inset: 12px; border-radius: 12px; border: 1px solid rgba(125,249,232,0.10); pointer-events: none; }
  .front-text { font-size: clamp(1.35rem, 4.2vw, 2rem); font-weight: 600; line-height: 1.28; letter-spacing: -0.01em; }
  .context { color: var(--bolt); font-family: var(--mono); font-size: 0.95rem; margin-top: 12px; white-space: pre-wrap; }
  .context .hole { color: var(--bolt-hi); font-weight: 700; }
  .context .muted-hole { color: var(--dim); }
  /* the card is a flex column; bound the image by it (shrink + min-height:0) so
     it scales to fit, with flex-grow 0 so small images keep their natural size. */
  .card-img { flex: 0 1 auto; min-height: 0; align-self: center; max-width: 100%; object-fit: contain; margin: 12px auto 0; border-radius: 8px; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--line) 18%, var(--line) 82%, transparent); margin: 22px auto; width: 70%; }
  .answer { color: var(--good); font-size: clamp(1.1rem, 3.4vw, 1.4rem); line-height: 1.4; margin: 0 0 6px; white-space: pre-wrap; }
  .note {
    text-align: left; margin: 18px auto 0; max-width: 600px;
    background: rgba(245, 213, 122, 0.09); border: 1px solid rgba(245, 213, 122, 0.18);
    border-left: 3px solid var(--note-border); border-radius: 10px;
    padding: 12px 15px; color: var(--note-ink); font-size: 0.93rem;
  }
  .note p { margin: 0 0 10px; } .note p:last-child { margin-bottom: 0; }
  .note pre { margin: 8px 0; padding: 10px 12px; overflow-x: auto; background: rgba(0,0,0,0.32); border-radius: 8px; font: 0.82rem/1.45 var(--mono); color: var(--note-code); }

  .legend { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; color: var(--ink); border: 1px solid var(--line);
    border-radius: 11px; padding: 8px 13px; min-height: 42px;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .chip .k { font-family: var(--mono); font-size: 0.68rem; color: var(--dim); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; }
  .chip:hover { border-color: var(--bolt); color: var(--bolt-hi); }
  .chip:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .chip:disabled { opacity: 0.35; cursor: default; border-color: var(--line); color: var(--ink); }
  .msg { color: var(--dim); font-family: var(--mono); }

  .menu-wrap { position: relative; flex: none; }
  .kebab {
    background: none; border: 0; color: var(--dim); cursor: pointer;
    font-size: 1.15rem; line-height: 1; padding: 4px 8px; min-height: auto;
    border-radius: 8px; max-width: none;
  }
  .kebab:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
  .menu {
    position: absolute; right: 0; top: calc(100% + 8px); z-index: 20;
    display: none; min-width: 168px; padding: 6px;
    background: var(--menu-bg); border: 1px solid var(--line); border-radius: 11px;
    box-shadow: 0 14px 34px -12px rgba(0,0,0,0.8);
  }
  .menu.open { display: block; }
  .menu button {
    display: block; width: 100%; text-align: left; background: none;
    color: var(--again); border: 0; border-radius: 7px; cursor: pointer;
    padding: 11px 12px; font-size: 0.92rem; font-weight: 500;
  }
  .menu button:hover { background: rgba(255,255,255,0.07); }
  .menu .mk { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); float: right; }

  /* ── deck-selection screen ────────────────────────────────────────── */
  .select { width: var(--card-w); text-align: left; animation: deal 0.3s both; }
  .select .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 16px; }
  .deck-filter { width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 11px 14px; background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 11px; color: var(--ink); font: inherit; font-size: 0.95rem; }
  .deck-filter::placeholder { color: var(--dim); }
  .deck-filter:focus { outline: none; border-color: var(--bolt); }
  .lists { display: flex; flex-direction: column; max-height: 62vh; overflow-y: auto; scrollbar-width: none; }
  .lists::-webkit-scrollbar { width: 0; }
  .select .section { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); margin: 18px 2px 9px; }
  .lists > .section:first-child { margin-top: 2px; }
  .select .empty-hint { color: var(--dim); font-size: 0.85rem; padding: 4px 2px 0; }
  /* single-launch rows: click a deck to browse it, a workspace/folder to open.
     A leading chevron (›) marks a drillable row; members nest by --depth. */
  .deckrow { display: flex; align-items: center; gap: 12px; padding: 12px 14px; padding-left: calc(14px + var(--depth, 0) * 18px); min-height: 48px; border: 1px solid var(--line); border-radius: 11px; cursor: pointer; transition: border-color 0.12s, background 0.12s; }
  .lists.filtering .deckrow { padding-left: 14px; }
  .deckrow:hover { border-color: var(--bolt); }
  .deckrow:focus { outline: none; border-color: var(--bolt); box-shadow: 0 0 0 2px rgba(125,249,232,0.35); }
  .deckrow .open { flex: none; width: 14px; text-align: center; color: var(--dim); font-size: 1.1rem; line-height: 1; }
  .deckrow:hover .open { color: var(--bolt); }
  .deckrow .name { flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* a workspace row stacks its title over a dim description line */
  .deckrow .rowtext { flex: 0 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .deckrow .rowtext .name { flex: none; }
  .deckrow .desc { font-size: 0.74rem; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .deckrow .kind { flex: none; font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bolt); border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; }
  .deckrow .loc { flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--mono); font-size: 0.72rem; color: var(--dim); }
  .deckrow .meta { margin-left: auto; padding-left: 10px; font-family: var(--mono); font-size: 0.74rem; color: var(--dim); white-space: nowrap; }
  .deckrow .meta.state-finished { color: var(--good); }
  .chip.primary { background: var(--bolt); color: var(--void); border-color: var(--bolt); }
  .chip.primary .k { color: rgba(6,18,26,0.55); border-color: rgba(6,18,26,0.3); }

  @media (prefers-reduced-motion: reduce) { .stack { animation: none; } .bar .charge i { transition: none; } }
</style>
</head>
<body>
  <div class="bar">
    <span class="brand">
      <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M 269 168 L 221 254 L 253 254 L 237 348 L 297 246 L 263 246 L 285 168 Z" fill="currentColor"/></svg>
      alix
    </span>
    <span class="sep">·</span>
    <span class="deck" id="deck"></span>
    <span class="tag">browse</span>
    <span class="spacer"></span>
    <span class="charge"><i id="charge"></i></span>
    <span class="pos" id="pos"></span>
    <div id="theme-picker"></div>
    <span class="menu-wrap" id="menuWrap">
      <button class="kebab" id="kebab" aria-label="More actions" aria-haspopup="true">⋮</button>
      <div class="menu" id="menu" role="menu">
        <button id="mRemove" role="menuitem">Remove card <span class="mk">x</span></button>
      </div>
    </span>
  </div>
  <main class="stage" id="stage"></main>
  <div class="legend" id="legend"></div>

<script>
"use strict";
let cards = [];
let label = "";
let phase = "browse"; // "select" while choosing decks
let i = 0;
let KEYS = {};        // configured [browse] key bindings, from /api/keys
let PK = {};          // configured deck-picker nav keys, from /api/picker-keys
let selectEsc = null; // in the deck-select confirm view, Esc returns to browse
let lastWorkspace = null; // name of the workspace you launched from, to return into it

const stage = document.getElementById("stage");
const legend = document.getElementById("legend");
const deckEl = document.getElementById("deck");
const posEl = document.getElementById("pos");
const chargeEl = document.getElementById("charge");
const menuWrap = document.getElementById("menuWrap");
const menu = document.getElementById("menu");

function post(body) { return { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }; }
function el(tag, cls, text) { const n = document.createElement(tag); if (cls) n.className = cls; if (text !== undefined) n.textContent = text; return n; }
function cardImage(src) { const img = el("img", "card-img"); img.src = src; img.alt = ""; return img; }
function hit(e, binds) { return (binds || []).some(b => b.ctrl === e.ctrlKey && e.key.toLowerCase() === b.k.toLowerCase()); }
function keyLabel(binds) {
  if (!binds || !binds.length) return "";
  const b = binds[0];
  const name = b.k === " " ? "space" : b.k === "Enter" ? "enter" : b.k === "Escape" ? "esc" : b.k === "Backspace" ? "bksp" : b.k;
  return (b.ctrl ? "ctrl-" : "") + name;
}

function apply(d) { phase = d.phase; label = d.label; cards = d.cards || []; i = 0; render(); }
function select(names) { fetch("/api/select", post({ decks: names })).then(r => r.json()).then(apply); }
function deselect() { menu.classList.remove("open"); fetch("/api/deselect", post({})).then(r => r.json()).then(apply); }

// When the review server hosts this browse (at /browse), "leave" returns to the
// picker page (the launching workspace re-opens via review.html's sessionStorage),
// instead of browse.html's own deck-selection screen.
const HOSTED = location.pathname === "/browse";
function leave() {
  if (HOSTED) fetch("/api/deselect", post({})).catch(() => {}).finally(() => { location.href = "/"; });
  else deselect();
}

function remove() {
  if (HOSTED || cards.length === 0) return; // read-only when hosted by the review server
  fetch("/api/remove", post({ index: i })).then(r => r.json()).then(d => {
    cards = d.cards;
    if (i >= cards.length) i = Math.max(0, cards.length - 1);
    render();
  });
}
function go(n) { i = Math.max(0, Math.min(cards.length - 1, n)); render(); }

function render() {
  menu.classList.remove("open");
  stage.innerHTML = "";
  legend.innerHTML = "";
  if (phase === "select") { renderSelect(); return; }
  deckEl.textContent = label;
  if (cards.length === 0) {
    posEl.textContent = "";
    chargeEl.style.width = "0%";
    menuWrap.style.display = "none";
    stage.appendChild(el("div", "msg", "No cards."));
    chip(HOSTED ? "Leave" : "Back to Decks", leave, false, "esc");
    return;
  }
  menuWrap.style.display = "";
  posEl.textContent = `${i + 1} / ${cards.length}`;
  chargeEl.style.width = ((i + 1) / cards.length * 100) + "%";

  const c = cards[i];
  const depth = Math.min(3, cards.length);
  const deck = el("div", "stack"); deck.dataset.depth = depth;
  deck.appendChild(el("div", "peek p2"));
  deck.appendChild(el("div", "peek p1"));
  const card = el("div", "card");
  card.appendChild(el("div", "front-text", c.front));
  for (const ctx of c.context) card.appendChild(contextLine(ctx));
  if (c.img) card.appendChild(cardImage(c.img));
  card.appendChild(el("div", "divider"));
  for (const b of c.back) card.appendChild(el("div", "answer", b));
  if (c.img_back) card.appendChild(cardImage(c.img_back));
  renderNote(card, c.note);
  deck.appendChild(card);
  stage.appendChild(deck);

  chip("Prev", () => go(i - 1), i === 0, keyLabel(KEYS.prev) || "←");
  chip("Next", () => go(i + 1), i === cards.length - 1, keyLabel(KEYS.next) || "→");
  chip(HOSTED ? "Leave" : "Decks", leave, false, "esc");
}

// The deck-selection screen, mirroring the terminal picker (browse-flavored).
// Three sections — Workspaces (each with its last-progress time) · Recent loose
// decks · Folders — and single-launch: click a deck to browse it, or open a
// Workspace/Folder to drill into its unlock dependency tree. browse ignores
// locking, so any deck opens (no 🔒/🕒 gating); mastered 🎉 decks live in the
// Mastered window (m). The filter searches every loose deck.
async function renderSelect() {
  deckEl.textContent = "select decks";
  posEl.textContent = "";
  chargeEl.style.width = "0%";
  menuWrap.style.display = "none";

  const data = await (await fetch("/api/decks")).json();
  const workspaces = data.workspaces || [];
  const recent = data.recent || [];
  const folders = data.folders || [];
  if (!workspaces.length && !recent.length && !folders.length) {
    const wrap = el("div", "select");
    wrap.appendChild(el("div", "lede", "choose decks to browse"));
    wrap.appendChild(el("div", "msg", "No decks found. Add .txt decks to your decks folder."));
    stage.appendChild(wrap);
    return;
  }

  // Every mastered (exam-passed) deck across the catalog, for the m window.
  const mastered = recent.filter(d => d.mastered);
  for (const g of workspaces.concat(folders)) for (const m of g.members) if (m.mastered) mastered.push(m);

  // Open one deck/member for browsing. Launching inside a workspace remembers it
  // so leaving the session returns here.
  function launch(it, wsName) {
    lastWorkspace = wsName || null;
    select([it.name]);
  }

  // A drillable workspace/folder row (chevron, opens its members).
  function openRow(grp) {
    const row = el("div", "deckrow");
    row.tabIndex = 0;
    row.appendChild(el("span", "open", "›"));
    // A workspace's description (its goal) sits dim under the title.
    const text = el("div", "rowtext");
    text.appendChild(el("span", "name", grp.label || grp.name));
    if (grp.description) text.appendChild(el("span", "desc", grp.description));
    row.appendChild(text);
    if (grp.path) row.appendChild(el("span", "loc", grp.path));
    if (grp.meta) row.appendChild(el("span", "meta", grp.meta));
    row.addEventListener("click", () => renderDrill(grp));
    row._open = grp;
    row._search = (grp.label || grp.name).toLowerCase();
    row._default = true;
    return row;
  }

  // A single deck/member row. `wsName` is the workspace to return into; `dflt`
  // whether it shows before any filter; `showKind` tags a trace (drill-in only).
  function deckRow(it, wsName, dflt, showKind) {
    const row = el("div", "deckrow");
    row.tabIndex = 0;
    if (it.depth) row.style.setProperty("--depth", it.depth);
    row.appendChild(el("span", "name", it.label || it.name));
    if (showKind && it.is_trace) row.appendChild(el("span", "kind", "trace"));
    if (it.path) row.appendChild(el("span", "loc", it.path));
    if (it.meta) row.appendChild(el("span", "meta state-" + it.state, it.meta));
    row.addEventListener("click", () => launch(it, wsName));
    row._item = it; row._wsName = wsName;
    row._search = (it.label || it.name).toLowerCase();
    row._default = dflt !== false;
    return row;
  }

  // Renders a sectioned list with a filter, focus-driven primary button, and
  // keyboard navigation. `sections` is [{ title, rows }] (title null = no
  // header); `back` (Esc/h) leaves the view; `allowMastered` binds m + a chip.
  function renderList(opts) {
    selectEsc = opts.back || null;
    stage.innerHTML = ""; legend.innerHTML = "";
    let focusedEl = null;

    const wrap = el("div", "select");
    wrap.appendChild(el("div", "lede", opts.lede));
    const filter = el("input", "deck-filter");
    filter.type = "text"; filter.placeholder = opts.filterPlaceholder || "filter decks…"; filter.autocomplete = "off";
    wrap.appendChild(filter);

    const lists = el("div", "lists");
    const sectionEls = [];
    for (const sec of opts.sections) {
      const header = sec.title ? el("div", "section", sec.title) : null;
      if (header) lists.appendChild(header);
      for (const r of sec.rows) lists.appendChild(r);
      sectionEls.push({ header, rows: sec.rows });
    }
    const emptyHint = el("div", "empty-hint", "No decks match.");
    lists.appendChild(emptyHint);
    wrap.appendChild(lists);
    stage.appendChild(wrap);

    const visibleRows = () =>
      Array.from(lists.querySelectorAll(".deckrow")).filter(r => r.style.display !== "none");

    // The primary button reflects the focused row: Open a workspace/folder, or
    // Browse a deck.
    function syncPrimary() {
      legend.innerHTML = "";
      if (opts.allowMastered && mastered.length) {
        const mb = el("button", "chip", "Mastered \u{1F389}");
        mb.appendChild(el("span", "k", keyLabel(PK.mastered) || "m"));
        mb.addEventListener("click", renderMastered);
        legend.appendChild(mb);
      }
      const f = focusedEl;
      let primary;
      if (f && f._open) {
        primary = el("button", "chip primary", "Open");
        primary.appendChild(el("span", "k", "enter"));
        primary.addEventListener("click", () => renderDrill(f._open));
      } else if (f && f._item) {
        primary = el("button", "chip primary", "Browse");
        primary.appendChild(el("span", "k", "enter"));
        primary.addEventListener("click", () => launch(f._item, f._wsName));
      } else {
        primary = el("button", "chip primary", "Browse");
        primary.appendChild(el("span", "k", "enter"));
        primary.disabled = true;
      }
      legend.appendChild(primary);
      if (opts.back) {
        const bb = el("button", "chip", "Back");
        bb.appendChild(el("span", "k", "esc"));
        bb.addEventListener("click", opts.back);
        legend.appendChild(bb);
      }
    }

    wrap.addEventListener("focusin", (e) => {
      const row = e.target.closest ? e.target.closest(".deckrow") : null;
      focusedEl = row;
      syncPrimary();
    });

    // No filter → show each row's default set (Recent hides finished and
    // non-recent decks); with a filter → search every row by label. Empty
    // section headers hide themselves, and the tree flattens.
    function applyFilter() {
      const q = filter.value.trim().toLowerCase();
      lists.classList.toggle("filtering", !!q);
      for (const sec of sectionEls) {
        let shown = 0;
        for (const r of sec.rows) {
          const show = q ? r._search.includes(q) : (r._default !== false);
          r.style.display = show ? "" : "none";
          if (show) shown++;
        }
        if (sec.header) sec.header.style.display = shown ? "" : "none";
      }
      emptyHint.style.display = (q && !visibleRows().length) ? "" : "none";
    }

    filter.addEventListener("input", applyFilter);
    filter.addEventListener("keydown", (e) => {
      const v = visibleRows();
      if (e.key === "ArrowDown") { e.preventDefault(); if (v.length) v[0].focus(); }
      else if (e.key === "Enter") { e.stopPropagation(); e.preventDefault(); if (v.length) v[0].click(); }
      else if (e.key === "Escape") { e.stopPropagation(); e.preventDefault(); if (v.length) v[0].focus(); else filter.blur(); }
      else if (e.key === "Backspace") { e.stopPropagation(); } // edit the filter, don't go back
    });

    lists.addEventListener("keydown", (e) => {
      const v = visibleRows();
      const cur = e.target.closest(".deckrow");
      const idx = cur ? v.indexOf(cur) : -1;
      if (e.key === "ArrowDown" || hit(e, PK.down)) { e.preventDefault(); if (idx < v.length - 1) v[idx + 1].focus(); }
      else if (e.key === "ArrowUp" || hit(e, PK.up)) { e.preventDefault(); if (idx > 0) v[idx - 1].focus(); else filter.focus(); }
      else if (e.key === "g" || e.key === "Home") { e.preventDefault(); if (v.length) v[0].focus(); }
      else if (e.key === "G" || e.key === "End") { e.preventDefault(); if (v.length) v[v.length - 1].focus(); }
      else if (hit(e, PK.filter)) { e.preventDefault(); filter.focus(); }
      else if (hit(e, PK.open)) { e.preventDefault(); if (cur) cur.click(); }
      else if (opts.allowMastered && hit(e, PK.mastered)) { e.preventDefault(); renderMastered(); }
      else if (opts.back && hit(e, PK.back)) { e.preventDefault(); opts.back(); }
    });

    applyFilter();
    syncPrimary();
    const first = visibleRows()[0];
    if (first) first.focus(); else filter.focus();
  }

  function renderTop() {
    const sections = [];
    if (workspaces.length) sections.push({ title: "Workspaces", rows: workspaces.map(openRow) });
    if (recent.length) sections.push({
      title: "Recent",
      // Recent hides finished and non-recent decks until you filter.
      rows: recent.map(d => deckRow(d, null, d.recent && d.state !== "finished", false)),
    });
    if (folders.length) sections.push({ title: "Folders", rows: folders.map(openRow) });
    renderList({
      lede: "pick a deck to browse — open a workspace to drill in",
      filterPlaceholder: "filter decks & workspaces…",
      sections, back: null, allowMastered: true,
    });
  }

  // Drilled into a workspace/folder: its members as an unlock dependency tree.
  function renderDrill(grp) {
    const back = () => { lastWorkspace = null; renderTop(); };
    renderList({
      lede: (grp.label || grp.name) + " — pick a deck to browse",
      sections: [{ title: null, rows: grp.members.map(m => deckRow(m, grp.name, true, true)) }],
      back, allowMastered: false,
    });
  }

  // The Mastered window: every exam-passed deck, as a flat list.
  function renderMastered() {
    renderList({
      lede: "mastered \u{1F389} — browse a finished deck",
      sections: [{ title: null, rows: mastered.map(d => deckRow({ ...d, depth: 0 }, null, true, false)) }],
      back: renderTop, allowMastered: false,
    });
  }

  // Returning from a session launched inside a workspace/folder re-opens it.
  const reopen = lastWorkspace && workspaces.concat(folders).find(g => g.name === lastWorkspace);
  if (reopen) renderDrill(reopen); else renderTop();
}

function contextLine(text) {
  const div = el("div", "context");
  div.innerHTML = escapeHtml(text)
    .split("____").join('<span class="hole">____</span>')
    .split("[…]").join('<span class="muted-hole">[…]</span>');
  return div;
}
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderNote(parent, units) {
  if (!units || units.length === 0) return;
  const note = el("div", "note");
  for (const u of units) {
    if (u.kind === "sentence") note.appendChild(el("p", null, u.text));
    else if (u.kind === "code") {
      const pre = el("pre");
      pre.appendChild(el("code", null, u.lines.join("\n")));
      note.appendChild(pre);
    }
  }
  parent.appendChild(note);
}

function chip(text, onClick, disabled, key) {
  const b = el("button", "chip", text);
  if (key) b.appendChild(el("span", "k", key));
  b.disabled = !!disabled;
  b.addEventListener("click", onClick);
  legend.appendChild(b);
}

document.addEventListener("keydown", (e) => {
  if (e.altKey || e.metaKey) return; // ctrl handled per-binding below
  if (phase === "select") {
    if (e.key === "Enter") {
      const b = legend.querySelector(".chip.primary");
      if (b && !b.disabled) { e.preventDefault(); b.click(); }
    } else if ((e.key === "Escape" || e.key === "Backspace") && selectEsc) {
      e.preventDefault(); selectEsc();
    }
    return;
  }
  // Esc returns to the deck picker (the review picker when hosted).
  if (e.key === "Escape") { e.preventDefault(); leave(); return; }
  // first/last stay fixed at g/G/Home/End, like the TUI; arrows always move
  if (hit(e, KEYS.remove)) { e.preventDefault(); remove(); }
  else if (hit(e, KEYS.next) || e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); go(i + 1); }
  else if (hit(e, KEYS.prev) || e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); go(i - 1); }
  else if (e.key === "g" || e.key === "Home") go(0);
  else if (e.key === "G" || e.key === "End") go(cards.length - 1);
});

document.getElementById("kebab").addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("open"); });
menu.addEventListener("click", (e) => e.stopPropagation());
document.getElementById("mRemove").addEventListener("click", () => { menu.classList.remove("open"); remove(); });
document.addEventListener("click", () => menu.classList.remove("open"));

// Load the configured key bindings first, then the cards (or the picker). The
// picker-keys endpoint falls back to the Vim defaults if an older server lacks it.
Promise.all([
  fetch("/api/keys").then(r => r.json()),
  fetch("/api/picker-keys").then(r => r.json()).catch(() => ({})),
]).then(([k, pk]) => {
  KEYS = k;
  PK = Object.assign({
    up: [{ k: "k", ctrl: false }], down: [{ k: "j", ctrl: false }],
    open: [{ k: "l", ctrl: false }], back: [{ k: "h", ctrl: false }],
    filter: [{ k: "/", ctrl: false }, { k: "f", ctrl: true }], mastered: [{ k: "m", ctrl: false }],
  }, pk || {});
  document.querySelector("#mRemove .mk").textContent = keyLabel(KEYS.remove);
  return fetch("/api/cards");
}).then(r => r.json()).then(apply);
</script>
<script src="/theme.js"></script>
</body>
</html>
