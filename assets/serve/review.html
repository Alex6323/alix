<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>flash</title>
<style>
  :root {
    --void: #06121a;
    --panel-top: #103241;
    --panel-bot: #0a212b;
    --ink: #e8f4f5;
    --dim: #6f939d;
    --line: #173640;
    --bolt: #22d3ee;
    --bolt-hi: #7df9e8;
    --good: #3ee0a0;
    --again: #ff6b6b;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --card-w: min(92vw, 820px);
    --card-h: min(82vh, 680px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, #0c2734 0%, var(--void) 60%) fixed;
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; min-height: 100%; overflow: hidden;
  }

  /* ── status bar: the terminal lineage, in monospace ───────────────── */
  .bar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; font-family: var(--mono); font-size: 0.78rem;
    color: var(--dim); border-bottom: 1px solid var(--line); background: rgba(6,18,26,0.6);
  }
  .bar .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--bolt); font-weight: 600; }
  .bar .brand svg { width: 13px; height: 16px; filter: drop-shadow(0 0 5px rgba(34,211,238,0.6)); }
  .bar .deck { color: var(--ink); }
  .bar .sep { color: var(--line); }
  .bar .spacer { flex: 1; }
  /* stage histogram (new|s1|s2|s3|s4|s5) + cards left, like the TUI header */
  .bar .hist { color: var(--ink); font-variant-numeric: tabular-nums; }
  .bar .hist .muted { color: var(--dim); }

  /* overflow menu: only the destructive action lives here */
  .menu-wrap { position: relative; flex: none; }
  .kebab { background: none; border: 0; color: var(--dim); cursor: pointer; font-size: 1.15rem; line-height: 1; padding: 4px 8px; border-radius: 8px; }
  .kebab:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
  .menu { position: absolute; right: 0; top: calc(100% + 8px); z-index: 20; display: none; min-width: 172px; padding: 6px; background: #0b2531; border: 1px solid var(--line); border-radius: 11px; box-shadow: 0 14px 34px -12px rgba(0,0,0,0.8); }
  .menu.open { display: block; }
  .menu button { display: block; width: 100%; text-align: left; background: none; color: var(--again); border: 0; border-radius: 7px; padding: 11px 12px; font-size: 0.92rem; font-weight: 500; cursor: pointer; }
  .menu button:hover { background: rgba(255,255,255,0.07); }
  .menu .mk { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); float: right; }

  /* ── stage + card ─────────────────────────────────────────────────── */
  .stage { flex: 1; display: grid; place-items: center; padding: 22px 16px; min-height: 0; }
  .stack {
    position: relative; width: var(--card-w);
    animation: deal 0.3s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes deal { from { opacity: 0; transform: translateY(12px) scale(0.985); } to { opacity: 1; transform: none; } }
  .peek { position: absolute; inset: 0; border-radius: 20px; background: var(--panel-bot); border: 1px solid var(--line); }
  .peek.p1 { transform: translate(7px, -7px); opacity: 0.7; }
  .peek.p2 { transform: translate(14px, -14px); opacity: 0.4; }
  .stack[data-depth="1"] .peek { display: none; }
  .stack[data-depth="2"] .peek.p2 { display: none; }

  /* fixed-size card, split into a question half and an answer half by the
     separator; each half centers its own content */
  .card {
    position: relative; height: var(--card-h); border-radius: 20px;
    background: linear-gradient(160deg, var(--panel-top), var(--panel-bot));
    border: 1px solid var(--line); box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
    padding: 18px 30px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card::after { content: ""; position: absolute; inset: 12px; border-radius: 12px; border: 1px solid rgba(125,249,232,0.10); pointer-events: none; }
  /* the card is split into stacked regions of fixed proportion, so revealing
     the answer or note never shifts the question or the answer */
  .region {
    min-height: 0; overflow: auto;
    display: flex; flex-direction: column; justify-content: safe center;
    text-align: center; gap: 12px; padding: 10px 0;
  }
  .region.q { flex: 1 1 0; }   /* question */
  .region.a { flex: 1 1 0; }   /* answer / options */
  /* when the card has a note, the note gets its own reserved region and the
     answer region grows a little so choice options still fit */
  .region.a.withnote { flex: 1.5 1.5 0; }
  .region.n { flex: 1 1 0; justify-content: flex-start; }  /* reserved note zone */
  .front-text { font-size: clamp(1.4rem, 4.4vw, 2.05rem); font-weight: 600; line-height: 1.28; letter-spacing: -0.01em; }
  .context { color: var(--bolt); font-family: var(--mono); font-size: 0.95rem; white-space: pre-wrap; }
  .context .hole { color: var(--bolt-hi); font-weight: 700; }      /* the active cloze blank */
  .context .muted-hole { color: var(--dim); }                     /* sibling holes, hidden */

  .divider { flex: none; height: 1px; width: 70%; margin: 0 auto; background: linear-gradient(90deg, transparent, var(--line) 18%, var(--line) 82%, transparent); }

  .reveal { animation: revealIn 0.26s ease both; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .answer { color: var(--good); font-size: clamp(1.15rem, 3.6vw, 1.5rem); line-height: 1.4; margin: 0 0 4px; white-space: pre-wrap; }
  .answer.pending { color: var(--dim); }
  /* notes: a warm, clearly-separated block (yellow, like the TUI), as wide as
     the card rather than the answer text */
  .note {
    text-align: left; margin: 18px auto 0; max-width: 600px;
    background: rgba(245, 213, 122, 0.09); border: 1px solid rgba(245, 213, 122, 0.18);
    border-left: 3px solid #e7c66b; border-radius: 10px;
    padding: 12px 15px; color: #ecdca6; font-size: 0.93rem;
  }
  .note p { margin: 0 0 10px; } .note p:last-child { margin-bottom: 0; }
  .note pre { margin: 8px 0; padding: 10px 12px; overflow-x: auto; background: rgba(0,0,0,0.32); border-radius: 8px; font: 0.82rem/1.45 var(--mono); color: #cfe0e3; }

  /* multiple-choice options */
  .options { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 560px; margin: 0 auto; }
  .option {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--ink);
    border-radius: 12px; padding: 13px 16px; min-height: 52px; font-size: 1.02rem; cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .option .num { font-family: var(--mono); font-size: 0.78rem; color: var(--dim); }
  .option .opt { white-space: pre-wrap; }
  button.option:hover { border-color: var(--bolt); background: rgba(34,211,238,0.06); }
  button.option:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .option.correct { border-color: var(--good); background: rgba(62,224,160,0.12); color: var(--good); }
  .option.correct .num { color: var(--good); }
  .option.wrong { border-color: var(--again); background: rgba(255,107,107,0.13); color: var(--again); }
  .option.wrong .num { color: var(--again); }
  .option.dim { opacity: 0.45; }

  .card.zap { animation: zap 0.5s ease-out; }
  @keyframes zap {
    0%   { box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8), 0 0 0 0 rgba(125,249,232,0); }
    35%  { box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8), 0 0 26px 1px rgba(125,249,232,0.5); }
    100% { box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8), 0 0 0 0 rgba(125,249,232,0); }
  }

  /* ── summary ──────────────────────────────────────────────────────── */
  .summary { width: var(--card-w); text-align: left; animation: deal 0.3s both; }
  .summary .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
  .summary h2 { font-size: 1.6rem; margin: 0 0 18px; }
  .summary .row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); color: var(--dim); }
  .summary .row b { color: var(--ink); font-family: var(--mono); font-weight: 600; }

  /* ── legend: compact, tappable, doubles as the keymap ─────────────── */
  .legend { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  /* chips centered on the viewport (= card) centerline; score pinned right */
  .legend .keys { grid-column: 2; display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .legend .score { grid-column: 3; justify-self: end; font-family: var(--mono); font-size: 0.82rem; color: var(--dim); font-variant-numeric: tabular-nums; }
  .legend .score b { color: var(--good); font-weight: 600; }
  .legend .score s { color: var(--again); text-decoration: none; font-weight: 600; }
  .legend .score .left { color: var(--ink); margin-left: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; color: var(--ink); border: 1px solid var(--line);
    border-radius: 11px; padding: 8px 13px; min-height: 42px;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .chip .k { font-family: var(--mono); font-size: 0.68rem; color: var(--dim); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; }
  .chip:hover { border-color: var(--bolt); color: var(--bolt-hi); }
  .chip:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .chip.primary { background: var(--bolt); color: var(--void); border-color: var(--bolt); }
  .chip.primary .k { color: rgba(6,18,26,0.55); border-color: rgba(6,18,26,0.3); }
  .chip.primary:hover { filter: brightness(1.08); color: var(--void); }
  .chip.again:hover { border-color: var(--again); color: var(--again); }
  .chip.good:hover { border-color: var(--good); color: var(--good); }
  .chip.easy:hover { border-color: var(--bolt-hi); color: var(--bolt-hi); }

  @media (prefers-reduced-motion: reduce) {
    .stack, .summary, .reveal, .card.zap { animation: none; }
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="brand">
      <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M 269 168 L 221 254 L 253 254 L 237 348 L 297 246 L 263 246 L 285 168 Z" fill="currentColor"/></svg>
      flash
    </span>
    <span class="sep">·</span>
    <span class="deck" id="deck"></span>
    <span class="spacer"></span>
    <span class="hist" id="hist"></span>
    <span class="menu-wrap" id="menuWrap">
      <button class="kebab" id="kebab" aria-label="More actions" aria-haspopup="true">⋮</button>
      <div class="menu" id="menu" role="menu">
        <button id="mRemove" role="menuitem">Remove card <span class="mk">x</span></button>
      </div>
    </span>
  </div>
  <main class="stage" id="stage"></main>
  <div class="legend">
    <div class="keys" id="legend"></div>
    <span class="score" id="score"></span>
  </div>

<script>
"use strict";
let state = null;     // last StateDto
let revealed = 0;     // back lines shown for the current card
let feedback = null;  // choice result being shown ({chosen, correct, passed})
let KEYS = {};        // configured key bindings, from /api/keys

const stage = document.getElementById("stage");
const legend = document.getElementById("legend");
const deckEl = document.getElementById("deck");
const histEl = document.getElementById("hist");
const scoreEl = document.getElementById("score");
const menuWrap = document.getElementById("menuWrap");
const menu = document.getElementById("menu");

async function api(path, opts) { return (await fetch(path, opts)).json(); }
function post(body) { return { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }; }
function load()    { api("/api/state").then(apply); }
function grade(g)  { if (g === "easy") zap(); api("/api/grade", post({ grade: g })).then(apply); }
function skip()    { api("/api/skip", post({})).then(apply); }
function remove()  { api("/api/remove", post({})).then(apply); }
function restart() { api("/api/restart", post({})).then(apply); }

function apply(s) { state = s; revealed = 0; feedback = null; render(); }
function isChoice() { return state.mode === "choice" && state.choices; }
function choose(i) { api("/api/choose", post({ index: i })).then(f => { feedback = f; render(); }); }
// Continue from a choice result applies the grade (pass/fail) and advances.
function continueChoice() { grade(feedback.passed ? "good" : "again"); }

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
}
function backCount() { return state.card ? state.card.back.length : 0; }
function fullyRevealed() { return backCount() === 0 || revealed >= backCount(); }

// Does a keydown match one of a binding list (from the config)?
function hit(e, binds) {
  return (binds || []).some(b => b.ctrl === e.ctrlKey && e.key.toLowerCase() === b.k.toLowerCase());
}
// A short label for the first binding of an action, for the chip key-hints.
function label(binds) {
  if (!binds || !binds.length) return "";
  const b = binds[0];
  const name = b.k === " " ? "space" : b.k === "Enter" ? "enter"
    : b.k === "Escape" ? "esc" : b.k === "Backspace" ? "bksp" : b.k;
  return (b.ctrl ? "ctrl-" : "") + name;
}

function render() {
  deckEl.textContent = state.label;
  histEl.textContent = state.histogram.join("|");
  scoreEl.innerHTML = `<b>${state.passed}✓</b> <s>${state.failed}✗</s><span class="left">${state.remaining}↓</span>`;

  menu.classList.remove("open");
  menuWrap.style.display = state.finished ? "none" : "";

  stage.innerHTML = "";
  legend.innerHTML = "";
  if (state.finished) renderSummary();
  else renderCard();
}

function renderCard() {
  const c = state.card;
  const deck = el("div", "stack");
  deck.dataset.depth = Math.min(3, Math.max(1, state.remaining));
  deck.appendChild(el("div", "peek p2"));
  deck.appendChild(el("div", "peek p1"));

  const card = el("div", "card");
  card.id = "card";

  const hasNote = c.note && c.note.length > 0;

  // question region
  const q = el("div", "region q");
  q.appendChild(el("div", "front-text", c.front));
  for (const ctx of c.context) q.appendChild(contextLine(ctx));
  card.appendChild(q);

  card.appendChild(el("div", "divider"));

  // answer / options region (filled on reveal or answer)
  const a = el("div", "region a" + (hasNote ? " withnote" : ""));
  a.id = "ansRegion";
  card.appendChild(a);

  // reserved note region — present from the start (with its own divider, like
  // the question/answer one) so the note doesn't shift anything when it appears
  if (hasNote) {
    card.appendChild(el("div", "divider"));
    const n = el("div", "region n");
    n.id = "noteRegion";
    card.appendChild(n);
  }

  deck.appendChild(card);
  stage.appendChild(deck);

  fillBottom();
  renderLegend();
}

// The answer + note regions depend on the mode and phase.
function fillBottom() {
  const a = document.getElementById("ansRegion");
  if (!a) return;
  const n = document.getElementById("noteRegion");
  a.innerHTML = "";
  if (n) n.innerHTML = "";
  if (feedback) renderChoiceFeedback(a, n);
  else if (isChoice()) renderChoices(a);
  else fillAnswer(a, n);
}

// Tappable multiple-choice options.
function renderChoices(a) {
  const wrap = el("div", "options");
  state.choices.forEach((opt, i) => {
    const b = el("button", "option");
    b.appendChild(el("span", "num", String(i + 1)));
    b.appendChild(el("span", "opt", opt));
    b.addEventListener("click", () => choose(i));
    wrap.appendChild(b);
  });
  a.appendChild(wrap);
}

// The options after answering: correct in green, a wrong pick in red. The
// note's explanation goes in the reserved note region (now that it's answered).
function renderChoiceFeedback(a, n) {
  const wrap = el("div", "options");
  state.choices.forEach((opt, i) => {
    let cls = "option";
    if (i === feedback.correct) cls += " correct";
    else if (i === feedback.chosen) cls += " wrong";
    else cls += " dim";
    const row = el("div", cls);
    row.appendChild(el("span", "num", String(i + 1)));
    row.appendChild(el("span", "opt", opt));
    wrap.appendChild(row);
  });
  a.appendChild(wrap);
  if (n) renderNote(n, state.card.note);
}

// Fill the answer region for reveal modes (flip / line / choice fallback);
// the note goes in its reserved region once fully revealed.
function fillAnswer(a, n) {
  a = a || document.getElementById("ansRegion");
  if (!a) return;
  a.innerHTML = "";
  if (n) n.innerHTML = "";
  if (revealed === 0) return; // stays empty until revealed

  const c = state.card;
  const shown = state.mode === "line" ? Math.min(revealed, c.back.length) : c.back.length;
  const sec = el("div", "reveal");
  for (let i = 0; i < shown; i++) sec.appendChild(el("div", "answer", c.back[i]));
  if (state.mode === "line" && shown < c.back.length) sec.appendChild(el("div", "answer pending", "···"));
  a.appendChild(sec);
  if (fullyRevealed() && n) renderNote(n, c.note);
}

// A cloze context line, with the active blank brightened and hidden holes
// dimmed. Markers come from the server (cloze BLANK "____" and HIDDEN "[…]").
function contextLine(text) {
  const div = el("div", "context");
  div.innerHTML = escapeHtml(text)
    .split("____").join('<span class="hole">____</span>')
    .split("[…]").join('<span class="muted-hole">[…]</span>');
  return div;
}
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderNote(parent, units) {
  if (!units || units.length === 0) return;
  const note = el("div", "note");
  for (const u of units) {
    if (u.kind === "sentence") note.appendChild(el("p", null, u.text));
    else if (u.kind === "code") {
      const pre = el("pre");
      pre.appendChild(el("code", null, u.lines.join("\n")));
      note.appendChild(pre);
    }
  }
  parent.appendChild(note);
}

function renderLegend() {
  legend.innerHTML = "";
  if (feedback) {
    chip("Continue", "primary", continueChoice, label(KEYS.reveal));
    return;
  }
  if (isChoice()) {
    chip("Skip", "", skip, label(KEYS.skip));
    return;
  }
  if (!fullyRevealed()) {
    chip(state.mode === "line" && revealed > 0 ? "Reveal next" : "Reveal", "primary", reveal, label(KEYS.reveal));
    chip("Skip", "", skip, label(KEYS.skip));
  } else {
    chip("Again", "again", () => grade("again"), label(KEYS.again));
    chip("Good", "good", () => grade("good"), label(KEYS.good));
    chip("Easy", "easy", () => grade("easy"), label(KEYS.easy));
  }
}

function renderSummary() {
  const acc = state.reviews > 0 ? Math.round(100 * state.passed / state.reviews) + "%" : "–";
  const h = state.histogram;
  const wrap = el("div", "summary");
  wrap.appendChild(el("div", "lede", "session complete"));
  wrap.appendChild(el("h2", null, state.reviews > 0 ? "Nicely charged." : "Nothing due."));
  const row = (label, value) => {
    const r = el("div", "row");
    r.appendChild(el("span", null, label));
    r.appendChild(el("b", null, value));
    wrap.appendChild(r);
  };
  row("reviewed", `${state.reviews}`);
  row("passed / failed", `${state.passed} / ${state.failed}`);
  row("accuracy", acc);
  row("stages", `${h[1]} · ${h[2]} · ${h[3]} · ${h[4]} · ${h[5]}`);
  stage.appendChild(wrap);
  chip("New session", "primary", restart, label(KEYS.restart));
}

function reveal() {
  revealed = state.mode === "line" ? Math.min(revealed + 1, backCount()) : backCount();
  fillBottom();
  renderLegend();
}

function zap() {
  const card = document.getElementById("card");
  if (card) card.classList.add("zap");
}

function chip(text, cls, onClick, key) {
  const b = el("button", "chip" + (cls ? " " + cls : ""), text);
  if (key) b.appendChild(el("span", "k", key));
  b.addEventListener("click", onClick);
  legend.appendChild(b);
}

document.addEventListener("keydown", (e) => {
  if (!state || e.altKey || e.metaKey) return; // ctrl handled per-binding below
  if (state.finished) { if (hit(e, KEYS.restart)) { e.preventDefault(); restart(); } return; }
  if (feedback) {
    if (hit(e, KEYS.remove)) { e.preventDefault(); remove(); return; }
    if (hit(e, KEYS.reveal) || e.key === "Enter") { e.preventDefault(); continueChoice(); }
    return;
  }
  if (isChoice()) {
    if (hit(e, KEYS.skip)) { e.preventDefault(); skip(); return; }
    if (e.key >= "1" && e.key <= "9") {
      const i = +e.key - 1;
      if (i < state.choices.length) { e.preventDefault(); choose(i); }
    }
    return;
  }
  if (hit(e, KEYS.remove)) { e.preventDefault(); remove(); return; }
  if (!fullyRevealed()) {
    if (hit(e, KEYS.skip)) { e.preventDefault(); skip(); return; }
    if (hit(e, KEYS.reveal)) { e.preventDefault(); reveal(); return; }
    return;
  }
  if (hit(e, KEYS.again)) { e.preventDefault(); grade("again"); }
  else if (hit(e, KEYS.good)) { e.preventDefault(); grade("good"); }
  else if (hit(e, KEYS.easy)) { e.preventDefault(); grade("easy"); }
});

document.getElementById("kebab").addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("open"); });
menu.addEventListener("click", (e) => e.stopPropagation());
document.getElementById("mRemove").addEventListener("click", () => { menu.classList.remove("open"); remove(); });
document.addEventListener("click", () => menu.classList.remove("open"));

// Load the configured key bindings first, then the session.
api("/api/keys").then(k => {
  KEYS = k;
  document.querySelector("#mRemove .mk").textContent = label(KEYS.remove);
  load();
});
</script>
</body>
</html>
