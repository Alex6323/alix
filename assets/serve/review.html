<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>flash</title>
<style>
  :root {
    --void: #06121a;
    --panel-top: #103241;
    --panel-bot: #0a212b;
    --ink: #e8f4f5;
    --dim: #6f939d;
    --line: #173640;
    --bolt: #22d3ee;
    --bolt-hi: #7df9e8;
    --good: #3ee0a0;
    --warn: #f5c451;
    --again: #ff6b6b;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --card-w: min(92vw, 820px);
    --card-h: min(82vh, 680px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, #0c2734 0%, var(--void) 60%) fixed;
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; min-height: 100%; overflow: hidden;
  }

  /* ── status bar: the terminal lineage, in monospace ───────────────── */
  .bar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; font-family: var(--mono); font-size: 0.78rem;
    color: var(--dim); border-bottom: 1px solid var(--line); background: rgba(6,18,26,0.6);
  }
  .bar .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--bolt); font-weight: 600; }
  .bar .brand svg { width: 13px; height: 16px; filter: drop-shadow(0 0 5px rgba(34,211,238,0.6)); }
  .bar .deck { color: var(--ink); }
  .bar .sep { color: var(--line); }
  .bar .spacer { flex: 1; }
  /* stage histogram (new|s1|s2|s3|s4|s5) + cards left, like the TUI header */
  .bar .hist { color: var(--ink); font-variant-numeric: tabular-nums; }
  .muted { color: var(--dim); }

  /* overflow menu: only the destructive action lives here */
  .menu-wrap { position: relative; flex: none; }
  .kebab { background: none; border: 0; color: var(--dim); cursor: pointer; font-size: 1.15rem; line-height: 1; padding: 4px 8px; border-radius: 8px; }
  .kebab:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
  .menu { position: absolute; right: 0; top: calc(100% + 8px); z-index: 20; display: none; min-width: 172px; padding: 6px; background: #0b2531; border: 1px solid var(--line); border-radius: 11px; box-shadow: 0 14px 34px -12px rgba(0,0,0,0.8); }
  .menu.open { display: block; }
  .menu button { display: block; width: 100%; text-align: left; background: none; color: var(--again); border: 0; border-radius: 7px; padding: 11px 12px; font-size: 0.92rem; font-weight: 500; cursor: pointer; }
  .menu button:hover { background: rgba(255,255,255,0.07); }
  .menu .mk { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); float: right; }

  /* ── stage + card ─────────────────────────────────────────────────── */
  .stage { flex: 1; display: grid; place-items: center; padding: 22px 16px; min-height: 0; }
  .stack {
    position: relative; width: var(--card-w);
    animation: deal 0.3s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes deal { from { opacity: 0; transform: translateY(12px) scale(0.985); } to { opacity: 1; transform: none; } }
  .peek { position: absolute; inset: 0; border-radius: 20px; background: var(--panel-bot); border: 1px solid var(--line); }
  .peek.p1 { transform: translate(7px, -7px); opacity: 0.7; }
  .peek.p2 { transform: translate(14px, -14px); opacity: 0.4; }
  .stack[data-depth="1"] .peek { display: none; }
  .stack[data-depth="2"] .peek.p2 { display: none; }

  /* fixed-size card, split into a question half and an answer half by the
     separator; each half centers its own content */
  .card {
    position: relative; height: var(--card-h); border-radius: 20px;
    background: linear-gradient(160deg, var(--panel-top), var(--panel-bot));
    border: 1px solid var(--line); box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
    padding: 18px 30px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card::after { content: ""; position: absolute; inset: 12px; border-radius: 12px; border: 1px solid rgba(125,249,232,0.10); pointer-events: none; }
  /* the card stacks content-sized regions from the top: the answer sits right
     under the question and grows downward, so revealing (incl. line-by-line)
     and showing the note never shift anything. Each region is capped and
     scrolls its own overflow, so a long answer doesn't push the note away. */
  .region {
    min-height: 0; overflow: auto;
    display: flex; flex-direction: column; justify-content: flex-start;
    text-align: center; gap: 12px; padding: 10px 0;
    scrollbar-width: none;            /* Firefox: no scrollbar */
  }
  .region::-webkit-scrollbar { width: 0; height: 0; }   /* WebKit: no scrollbar */
  /* instead of a scrollbar, fade the edge that has hidden content */
  .region.a.fade-top {
    mask-image: linear-gradient(to bottom, transparent, #000 34px);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 34px);
  }
  .region.a.fade-bottom {
    mask-image: linear-gradient(to top, transparent, #000 34px);
    -webkit-mask-image: linear-gradient(to top, transparent, #000 34px);
  }
  .region.a.fade-top.fade-bottom {
    mask-image: linear-gradient(to bottom, transparent, #000 34px, #000 calc(100% - 34px), transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 34px, #000 calc(100% - 34px), transparent);
  }
  .region.q { flex: 0 0 auto; max-height: 38%; }   /* question */
  /* the answer can use almost the whole card; only when the card has a note do
     we cap it shorter, to leave room for the note below */
  .region.a { flex: 0 1 auto; max-height: 82%; }
  .region.a.withnote { max-height: 52%; }
  .region.n { flex: 0 0 auto; max-height: 30%; }   /* note */
  /* keep the note (and its divider) pinned to the bottom of the card */
  #noteDivider { margin-top: auto; }
  .front-text { font-size: clamp(1.4rem, 4.4vw, 2.05rem); font-weight: 600; line-height: 1.28; letter-spacing: -0.01em; }
  .context { color: var(--bolt); font-family: var(--mono); font-size: 0.95rem; white-space: pre-wrap; }
  .context .hole { color: var(--bolt-hi); font-weight: 700; }      /* the active cloze blank */
  .context .muted-hole { color: var(--dim); }                     /* sibling holes, hidden */
  /* bound the image by its region (flex shrink + min-height:0), so it scales
     down to fit instead of scrolling; flex-grow 0 keeps small images at their
     natural size rather than ballooning. */
  .card-img { flex: 0 1 auto; min-height: 0; align-self: center; max-width: 100%; object-fit: contain; margin: 12px auto 0; border-radius: 8px; }

  .divider { flex: none; height: 1px; width: 70%; margin: 0 auto; background: linear-gradient(90deg, transparent, var(--line) 18%, var(--line) 82%, transparent); }

  .reveal { animation: revealIn 0.26s ease both; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .answer { color: var(--good); font-size: clamp(1.15rem, 3.6vw, 1.5rem); line-height: 1.4; margin: 0 0 4px; white-space: pre-wrap; }
  .answer.pending { color: var(--dim); }
  /* a wrong typed line recedes (dim + small) so the correct answer leads */
  .answer.miss { color: var(--again); opacity: 0.5; font-size: clamp(0.92rem, 2.6vw, 1.08rem); }
  .answer .mark { margin-left: 10px; font-weight: 700; }   /* ✓ / ✗ after the line */
  .expected { color: var(--good); font-size: clamp(1.15rem, 3.6vw, 1.5rem); line-height: 1.4; margin: 2px 0 8px; }

  /* typing / fuzzy input fields */
  .inputs { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 520px; margin: 0 auto; }
  .field {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    border-radius: 12px; padding: 13px 16px; min-height: 52px; color: var(--ink);
    font-family: var(--sans); font-size: 1.1rem; text-align: center; outline: none;
  }
  .field:focus { border-color: var(--bolt); }
  /* mode badge on every card — typing and fuzzy look identical otherwise */
  .mode-tag {
    display: block; width: fit-content; margin: 0 auto 14px;
    font-family: var(--mono); font-size: 0.6rem;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px;
  }
  /* notes: a warm, clearly-separated block (yellow, like the TUI), as wide as
     the card rather than the answer text */
  .note {
    text-align: left; margin: 18px auto 0; max-width: 600px;
    background: rgba(245, 213, 122, 0.09); border: 1px solid rgba(245, 213, 122, 0.18);
    border-left: 3px solid #e7c66b; border-radius: 10px;
    padding: 12px 15px; color: #ecdca6; font-size: 0.93rem;
  }
  .note p { margin: 0 0 10px; } .note p:last-child { margin-bottom: 0; }
  .note pre { margin: 8px 0; padding: 10px 12px; overflow-x: auto; background: rgba(0,0,0,0.32); border-radius: 8px; font: 0.82rem/1.45 var(--mono); color: #cfe0e3; }

  /* multiple-choice options */
  .options { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 560px; margin: 0 auto; }
  .option {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--ink);
    border-radius: 12px; padding: 13px 16px; min-height: 52px; font-size: 1.02rem; cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .option .num { font-family: var(--mono); font-size: 0.78rem; color: var(--dim); }
  .option .opt { white-space: pre-wrap; }
  button.option:hover { border-color: var(--bolt); background: rgba(34,211,238,0.06); }
  button.option:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .option.correct { border-color: var(--good); background: rgba(62,224,160,0.12); color: var(--good); }
  .option.correct .num { color: var(--good); }
  .option.wrong { border-color: var(--again); background: rgba(255,107,107,0.13); color: var(--again); }
  .option.wrong .num { color: var(--again); }
  .option.dim { opacity: 0.45; }

  .card.zap { animation: zap 0.5s ease-out; }
  @keyframes zap {
    0%   { box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8), 0 0 0 0 rgba(125,249,232,0); }
    35%  { box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8), 0 0 26px 1px rgba(125,249,232,0.5); }
    100% { box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8), 0 0 0 0 rgba(125,249,232,0); }
  }

  /* ── summary ──────────────────────────────────────────────────────── */
  .summary { width: var(--card-w); text-align: left; animation: deal 0.3s both; }
  .summary .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
  .summary h2 { font-size: 1.6rem; margin: 0 0 18px; }
  .summary .row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); color: var(--dim); }
  .summary .row b { color: var(--ink); font-family: var(--mono); font-weight: 600; }

  /* ── deck-selection screen ────────────────────────────────────────── */
  .select { width: var(--card-w); text-align: left; animation: deal 0.3s both; }
  .select .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 16px; }
  .select .msg { color: var(--dim); }
  .deck-filter { width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 11px 14px; background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 11px; color: var(--ink); font: inherit; font-size: 0.95rem; }
  .deck-filter::placeholder { color: var(--dim); }
  .deck-filter:focus { outline: none; border-color: var(--bolt); }
  .decklist { display: flex; flex-direction: column; gap: 8px; max-height: 62vh; overflow-y: auto; scrollbar-width: none; }
  .decklist::-webkit-scrollbar { width: 0; }
  .deckrow { display: flex; align-items: center; gap: 12px; padding: 12px 14px; min-height: 48px; border: 1px solid var(--line); border-radius: 11px; cursor: pointer; transition: border-color 0.12s, background 0.12s; }
  .deckrow:hover { border-color: var(--bolt); }
  .deckrow:focus { outline: none; border-color: var(--bolt); box-shadow: 0 0 0 2px rgba(125,249,232,0.35); }
  .deckrow .box { flex: none; width: 18px; height: 18px; border: 1px solid var(--dim); border-radius: 5px; }
  .deckrow.on { border-color: var(--bolt); background: rgba(125,249,232,0.06); }
  .deckrow.on .box { background: var(--bolt); border-color: var(--bolt); position: relative; }
  .deckrow.on .box::after { content: "✓"; position: absolute; inset: 0; display: grid; place-items: center; color: var(--void); font-size: 0.8rem; font-weight: 700; }
  .deckrow .name { flex: 1; }
  .deckrow .name .lock { color: var(--dim); }
  .deckrow .meta { font-family: var(--mono); font-size: 0.74rem; color: var(--dim); }
  .deckrow .meta.state-finished { color: var(--good); }
  .deckrow .meta.state-examdue { color: var(--warn); }
  .deckrow.examdue .box { opacity: 0.25; cursor: default; }  /* exam-only: not tickable */
  .deckrow.locked { opacity: 0.55; }
  .deckrow.locked:hover { border-color: var(--bolt); }
  .chip:disabled { opacity: 0.4; cursor: default; }
  .leave-msg { align-self: center; color: var(--again); font-size: 0.85rem; }

  /* ── legend: compact, tappable, doubles as the keymap ─────────────── */
  .legend { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  /* chips centered on the viewport (= card) centerline; score pinned right */
  .legend .keys { grid-column: 2; display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .legend .score { grid-column: 3; justify-self: end; font-family: var(--mono); font-size: 0.82rem; color: var(--dim); font-variant-numeric: tabular-nums; }
  .legend .score b { color: var(--good); font-weight: 600; }
  .legend .score s { color: var(--again); text-decoration: none; font-weight: 600; }
  .legend .score .left { color: var(--ink); margin-left: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; color: var(--ink); border: 1px solid var(--line);
    border-radius: 11px; padding: 8px 13px; min-height: 42px;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .chip .k { font-family: var(--mono); font-size: 0.68rem; color: var(--dim); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; }
  .chip:hover { border-color: var(--bolt); color: var(--bolt-hi); }
  .chip:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .chip.primary { background: var(--bolt); color: var(--void); border-color: var(--bolt); }
  .chip.primary .k { color: rgba(6,18,26,0.55); border-color: rgba(6,18,26,0.3); }
  .chip.primary:hover { filter: brightness(1.08); color: var(--void); }
  .chip.again:hover { border-color: var(--again); color: var(--again); }
  .chip.good:hover { border-color: var(--good); color: var(--good); }
  .chip.easy:hover { border-color: var(--bolt-hi); color: var(--bolt-hi); }

  /* ── ask Claude ── */
  .ask { width: var(--card-w); max-width: 92vw; display: flex; flex-direction: column; gap: 12px; animation: deal 0.3s both; }
  .ask-log { display: flex; flex-direction: column; gap: 10px; max-height: 58vh; overflow-y: auto; padding-right: 4px; }
  .ask-q { align-self: flex-end; max-width: 85%; background: rgba(125,249,232,0.10); border: 1px solid var(--line); border-radius: 12px 12px 4px 12px; padding: 9px 13px; }
  .ask-a { align-self: flex-start; max-width: 92%; white-space: pre-wrap; line-height: 1.5; border-left: 3px solid var(--bolt); padding: 4px 0 4px 12px; }
  .ask-thinking { align-self: flex-start; color: var(--dim); font-style: italic; }
  .ask-status { align-self: flex-start; color: var(--good); font-size: 0.85rem; }
  .ask-error { align-self: flex-start; color: var(--again); font-size: 0.85rem; }
  .ask-hint { color: var(--dim); }
  .ask-input { width: 100%; box-sizing: border-box; resize: vertical; min-height: 52px; padding: 11px 13px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.25); color: var(--ink); font: inherit; }
  .ask-input:focus { outline: none; border-color: var(--bolt); }
  .ask-input:disabled { opacity: 0.6; }

  /* ── explain (understanding) cards ── */
  .explain-input { width: 100%; box-sizing: border-box; resize: vertical; min-height: 64px; padding: 11px 13px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.25); color: var(--ink); font: inherit; }
  .explain-input:focus { outline: none; border-color: var(--bolt); }
  .explain-label { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin: 6px 0 4px; }
  .explain-answer { white-space: pre-wrap; color: var(--ink); opacity: 0.85; margin-bottom: 6px; }

  /* ── AI exam ── */
  .exam { width: var(--card-w); max-width: 92vw; display: flex; flex-direction: column; gap: 12px; animation: deal 0.3s both; max-height: 78vh; overflow-y: auto; padding-right: 4px; }
  .exam-wait { color: var(--dim); font-style: italic; }
  .exam-progress { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
  .exam-q { font-size: clamp(1.1rem, 3.4vw, 1.4rem); line-height: 1.4; color: var(--ink); }
  .exam-input { width: 100%; box-sizing: border-box; resize: vertical; min-height: 120px; padding: 11px 13px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.25); color: var(--ink); font: inherit; }
  .exam-input:focus { outline: none; border-color: var(--bolt); }
  .exam-pass { color: var(--good); font-weight: 700; font-size: 1.1rem; }
  .exam-fail { color: var(--again); font-weight: 700; font-size: 1.1rem; }
  .exam-unlocks { color: var(--good); font-size: 0.9rem; }
  .exam-result { border-left: 3px solid var(--line); padding: 2px 0 4px 12px; }
  .exam-rq { color: var(--ink); margin-bottom: 2px; }
  .exam-verdict { font-size: 0.92rem; }
  .exam-verdict.v-pass { color: var(--good); }
  .exam-verdict.v-partial { color: var(--warn); }
  .exam-verdict.v-fail { color: var(--again); }
  .exam-label { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin: 6px 0 2px; }
  .exam-points, .exam-missed { margin: 0 0 4px; padding-left: 18px; }
  .exam-points li { color: var(--ink); opacity: 0.85; }
  .exam-missed li { color: var(--again); opacity: 0.8; }
  .exam-ready { color: var(--warn); margin-top: 8px; }

  @media (prefers-reduced-motion: reduce) {
    .stack, .summary, .reveal, .card.zap { animation: none; }
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="brand">
      <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M 269 168 L 221 254 L 253 254 L 237 348 L 297 246 L 263 246 L 285 168 Z" fill="currentColor"/></svg>
      flash
    </span>
    <span class="sep">·</span>
    <span class="deck" id="deck"></span>
    <span class="spacer"></span>
    <span class="hist" id="hist"></span>
    <span class="menu-wrap" id="menuWrap">
      <button class="kebab" id="kebab" aria-label="More actions" aria-haspopup="true">⋮</button>
      <div class="menu" id="menu" role="menu">
        <button id="mAsk" role="menuitem">Ask Claude <span class="mk" id="mAskKey">?</span></button>
        <button id="mRemove" role="menuitem">Remove card <span class="mk">x</span></button>
      </div>
    </span>
  </div>
  <main class="stage" id="stage"></main>
  <div class="legend">
    <div class="keys" id="legend"></div>
    <span class="score" id="score"></span>
  </div>

<script>
"use strict";
let state = null;     // last StateDto
let revealed = 0;     // back lines shown for the current card
let feedback = null;  // choice result being shown ({chosen, correct, passed})
let confirmingLeave = false; // showing the "session not finished" leave prompt
let selectEsc = null; // in the deck-select confirm view, Esc returns to browse
let explainInput = ""; // the typed reconstruction on an explain card (client-side)
let asking = false;   // the ask-Claude overlay is open
let askData = { transcript: [], thinking: false, status: null, error: null };
let askPoll = null;   // setInterval handle while a reply is pending
let examData = null;  // the ExamDto while an exam is active (null otherwise)
let examPoll = null;  // setInterval handle while an exam call is in flight
let KEYS = {};        // configured key bindings, from /api/keys

const stage = document.getElementById("stage");
const legend = document.getElementById("legend");
const deckEl = document.getElementById("deck");
const histEl = document.getElementById("hist");
const scoreEl = document.getElementById("score");
const menuWrap = document.getElementById("menuWrap");
const menu = document.getElementById("menu");

async function api(path, opts) { return (await fetch(path, opts)).json(); }
function post(body) { return { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }; }
function load()    { api("/api/state").then(apply); }
function grade(g)  { if (g === "easy") zap(); api("/api/grade", post({ grade: g })).then(apply); }
function skip()    { api("/api/skip", post({})).then(apply); }
function remove()  { api("/api/remove", post({})).then(apply); }
function restart() { api("/api/restart", post({})).then(apply); }
function select(names) { api("/api/select", post({ decks: names })).then(apply); }
function deselect() { confirmingLeave = false; menu.classList.remove("open"); api("/api/deselect", post({})).then(apply); }

// Returning to the picker mid-session abandons the cards still queued, so warn
// first; a finished session (or the select phase) leaves straight away.
function leaveSession() {
  if (!state || state.phase !== "review" || state.finished) { deselect(); return; }
  confirmingLeave = true;
  renderLeaveConfirm();
}
function cancelLeave() { confirmingLeave = false; render(); }
function renderLeaveConfirm() {
  legend.innerHTML = "";
  legend.appendChild(el("span", "leave-msg", `Session not finished — ${state.remaining} card${state.remaining === 1 ? "" : "s"} left.`));
  chip("Leave anyway", "again", deselect, "enter");
  chip("Stay", "primary", cancelLeave, "esc");
}

function apply(s) { state = s; revealed = 0; feedback = null; explainInput = ""; render(); }
function isChoice() { return state.mode === "choice" && state.choices; }
function isInput() { return state.mode === "typing" || state.mode === "fuzzy"; }
function isExplain() { return state.mode === "explain"; }
function modeLabel() {
  return { typing: "typing exact", fuzzy: "typing fuzzy", line: "line by line", explain: "understanding" }[state.mode] || state.mode;
}
function choose(i) { api("/api/choose", post({ index: i })).then(f => { feedback = f; render(); }); }
function submitCheck() {
  const lines = Array.from(document.querySelectorAll("#ansRegion input.field")).map(i => i.value);
  api("/api/check", post({ lines })).then(f => { feedback = f; render(); });
}
// Continue from a result (choice or typed) applies the grade and advances.
function continueAfter() { grade(feedback.passed ? "good" : "again"); }

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
}
// Histogram cells [new, s1..s5] as HTML; stages above `top` are unreachable
// (every card caps below them via % max-stage:), shown as a muted –.
function histCells(h, top) {
  return h.map((v, i) => (i >= 1 && i > top) ? '<span class="muted">–</span>' : String(v));
}
function backCount() { return state.card ? state.card.back.length : 0; }
function fullyRevealed() { return backCount() === 0 || revealed >= backCount(); }

// Does a keydown match one of a binding list (from the config)?
function hit(e, binds) {
  return (binds || []).some(b => b.ctrl === e.ctrlKey && e.key.toLowerCase() === b.k.toLowerCase());
}
// A short label for the first binding of an action, for the chip key-hints.
function label(binds) {
  if (!binds || !binds.length) return "";
  const b = binds[0];
  const name = b.k === " " ? "space" : b.k === "Enter" ? "enter"
    : b.k === "Escape" ? "esc" : b.k === "Backspace" ? "bksp" : b.k;
  return (b.ctrl ? "ctrl-" : "") + name;
}

function render() {
  stage.innerHTML = "";
  legend.innerHTML = "";
  menu.classList.remove("open");

  if (examData) { renderExam(); return; }
  if (state.phase === "select") { renderSelect(); return; }

  deckEl.textContent = state.label;
  histEl.innerHTML = histCells(state.histogram, state.top_stage).join("|");
  scoreEl.innerHTML = `<b>${state.passed}✓</b> <s>${state.failed}✗</s><span class="left">${state.remaining}↓</span>`;
  menuWrap.style.display = state.finished ? "none" : "";

  if (asking) { renderAsk(); return; }
  if (state.finished) renderSummary();
  else renderCard();
}

// ── ask Claude ────────────────────────────────────────────────────────
// Available once a card is answered. Sends run the CLI on the server; we poll
// /api/ask while it's thinking. One conversation spans the session.
function isAnswered() {
  if (!state || state.phase !== "review" || state.finished || !state.card) return false;
  if (feedback) return true;
  return !isChoice() && !isInput() && fullyRevealed();
}
function openAsk() {
  asking = true;
  render(); // builds the panel once (entrance animation runs once)
  api("/api/ask").then(d => { askData = d; if (asking) syncAsk(); }); // pick up any prior transcript
}
function closeAsk() { asking = false; stopAskPoll(); render(); }
function sendAsk(text) {
  const q = (text || "").trim();
  if (!q || askData.thinking) return;
  const ta = document.querySelector(".ask-input");
  if (ta) ta.value = ""; // the textarea persists across syncAsk; clear the sent question
  api("/api/ask", post({ question: q })).then(d => { askData = d; if (asking) syncAsk(); startAskPoll(); });
}
function saveAskNote() {
  if (askData.thinking || !askData.transcript.length) return;
  api("/api/ask/note", post({})).then(d => { askData = d; if (asking) syncAsk(); startAskPoll(); });
}
function startAskPoll() {
  stopAskPoll();
  askPoll = setInterval(() => {
    api("/api/ask").then(d => { askData = d; if (!d.thinking) stopAskPoll(); if (asking) syncAsk(); });
  }, 400);
}
function stopAskPoll() { if (askPoll) { clearInterval(askPoll); askPoll = null; } }

// (Re)fill just the transcript log from askData.
function fillAskLog(log) {
  log.innerHTML = "";
  for (const ex of askData.transcript) {
    log.appendChild(el("div", "ask-q", ex.q));
    log.appendChild(el("div", "ask-a", ex.a));
  }
  if (askData.thinking) log.appendChild(el("div", "ask-thinking", "Claude is thinking…"));
  if (askData.status) log.appendChild(el("div", "ask-status", askData.status));
  if (askData.error) log.appendChild(el("div", "ask-error", askData.error));
  if (!askData.transcript.length && !askData.thinking && !askData.status && !askData.error)
    log.appendChild(el("div", "ask-hint", "Ask Claude about this card."));
  log.scrollTop = log.scrollHeight;
}

// Update the open panel in place — no rebuild, so the entrance animation
// doesn't re-run while we poll and the textarea keeps its focus/value.
function syncAsk() {
  const wrap = document.querySelector(".ask");
  if (!wrap) { render(); return; }
  fillAskLog(wrap.querySelector(".ask-log"));
  const input = wrap.querySelector(".ask-input");
  if (input) input.disabled = askData.thinking;
  const send = legend.querySelector(".chip.primary");
  if (send) send.disabled = askData.thinking;
}

function renderAsk() {
  const wrap = el("div", "ask");
  const log = el("div", "ask-log");
  fillAskLog(log);
  wrap.appendChild(log);

  const input = el("textarea", "ask-input");
  input.placeholder = "Ask about this card…";
  input.rows = 2;
  input.disabled = askData.thinking;
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendAsk(input.value); }
  });
  wrap.appendChild(input);
  stage.appendChild(wrap);

  legend.innerHTML = "";
  const send = chip("Send", "primary", () => sendAsk(input.value), "enter");
  send.disabled = askData.thinking;
  chip("Save note", "", saveAskNote, label(KEYS.save_note));
  chip("Close", "", closeAsk, "esc");
  if (!askData.thinking) input.focus();
}

// ── AI exam ───────────────────────────────────────────────────────────
// A self-contained overlay (like ask): the server runs the three Claude calls
// on a background thread and we poll /api/exam while `thinking`. Answers are
// entered one question at a time; grading is a single batch call.
function startExam(deck) {
  api("/api/exam/start", post({ deck })).then(d => {
    if (d && d.phase) { examData = d; render(); if (d.thinking) startExamPoll(); }
  });
}
function closeExam() {
  stopExamPoll();
  api("/api/exam/close", post({})).then(s => { examData = null; apply(s); });
}
function startExamPoll() {
  stopExamPoll();
  examPoll = setInterval(() => {
    api("/api/exam").then(d => {
      // Only re-render when something visible changed; otherwise the spinner's
      // entrance animation would re-run on every poll (flicker).
      const prev = examData;
      examData = d;
      if (!d.thinking) stopExamPoll();
      if (!prev || prev.phase !== d.phase || prev.error !== d.error) render();
    });
  }, 600);
}
function stopExamPoll() { if (examPoll) { clearInterval(examPoll); examPoll = null; } }
// Save the current answer, then move to question `goto`.
function examNav(goto) {
  const ta = document.querySelector(".exam-input");
  api("/api/exam/answer", post({ text: ta ? ta.value : "", goto })).then(d => { examData = d; render(); });
}
// Save the last answer and submit all answers for grading.
function examSubmit() {
  const ta = document.querySelector(".exam-input");
  api("/api/exam/grade", post({ text: ta ? ta.value : "" })).then(d => {
    examData = d; render(); if (d.thinking) startExamPoll();
  });
}
function examRemediate() {
  api("/api/exam/remediate", post({})).then(d => { examData = d; render(); if (d.thinking) startExamPoll(); });
}

function renderExam() {
  const d = examData;
  deckEl.textContent = "exam · " + d.deck;
  histEl.textContent = d.strictness;
  scoreEl.innerHTML = "";
  menuWrap.style.display = "none";
  const wrap = el("div", "exam");

  if (d.phase === "generating" || d.phase === "grading" || d.phase === "remediating") {
    const msg = { generating: "Preparing your exam…", grading: "Grading your answers…",
                  remediating: "Writing remediation cards…" }[d.phase];
    wrap.appendChild(el("div", "exam-wait", msg));
    if (d.error) wrap.appendChild(el("div", "ask-error", d.error));
    stage.appendChild(wrap);
    if (d.error || d.phase === "generating") chip("Close", "", closeExam, "esc");
    return;
  }

  if (d.phase === "answering") {
    wrap.appendChild(el("div", "exam-progress", `Question ${d.current + 1} / ${d.total}`));
    wrap.appendChild(el("div", "exam-q", d.question || ""));
    const ta = el("textarea", "exam-input");
    ta.placeholder = "Type your answer…";
    ta.value = d.answer || "";
    ta.rows = 6;
    wrap.appendChild(ta);
    if (d.error) wrap.appendChild(el("div", "ask-error", d.error));
    stage.appendChild(wrap);
    ta.focus();
    if (d.current > 0) chip("Back", "", () => examNav(d.current - 1));
    if (d.on_last) chip("Submit for grading", "primary", examSubmit);
    else chip("Next", "primary", () => examNav(d.current + 1));
    chip("Quit", "", closeExam, "esc");
    return;
  }

  if (d.phase === "results") {
    wrap.appendChild(el("div", d.passed ? "exam-pass" : "exam-fail",
      d.passed ? "PASSED — deck mastered ✓" : "FAILED"));
    if (d.passed && d.unlocks.length)
      wrap.appendChild(el("div", "exam-unlocks", "Unlocks: " + d.unlocks.join(", ")));
    d.grades.forEach((g, i) => {
      const q = el("div", "exam-result");
      q.appendChild(el("div", "exam-rq", `Q${i + 1}. ${g.question}`));
      q.appendChild(el("div", "exam-verdict v-" + g.verdict.toLowerCase(), `${g.verdict} — ${g.feedback}`));
      if (g.verdict !== "PASS") {
        if (g.points.length) {
          q.appendChild(el("div", "exam-label", "A complete answer covers:"));
          const ul = el("ul", "exam-points");
          g.points.forEach(p => ul.appendChild(el("li", null, p)));
          q.appendChild(ul);
        }
        if (g.missed.length) {
          q.appendChild(el("div", "exam-label", "You missed:"));
          const ul = el("ul", "exam-missed");
          g.missed.forEach(m => ul.appendChild(el("li", null, m)));
          q.appendChild(ul);
        }
      }
      wrap.appendChild(q);
    });
    if (d.error) wrap.appendChild(el("div", "ask-error", d.error));
    stage.appendChild(wrap);
    if (!d.passed && d.gaps.length) chip("Add remediation cards", "primary", examRemediate);
    chip("Close", "", closeExam, "esc");
    return;
  }

  if (d.phase === "remediated") {
    wrap.appendChild(el("div", "exam-pass", "Remediation cards added ✓"));
    wrap.appendChild(el("div", "exam-wait", "Re-drill the deck, then re-sit the exam."));
    stage.appendChild(wrap);
    chip("Close", "", closeExam, "esc");
    return;
  }
}

// The deck-selection screen. Two phases: Browse (tap a deck name to launch it,
// or tick checkboxes to pick several) and Confirm (review the ticked decks, then
// Start the merged session).
async function renderSelect() {
  deckEl.textContent = "select decks";
  histEl.textContent = "";
  scoreEl.innerHTML = "";
  menuWrap.style.display = "none";

  const data = await api("/api/decks");
  if (!data.decks.length) {
    const wrap = el("div", "select");
    wrap.appendChild(el("div", "lede", "choose decks to study"));
    wrap.appendChild(el("div", "msg", "No decks found. Add .txt decks to your decks folder."));
    stage.appendChild(wrap);
    return;
  }

  const chosen = new Set(); // ticked deck names, shared across the two phases

  function renderBrowse() {
    selectEsc = null;
    stage.innerHTML = ""; legend.innerHTML = "";
    let focused = null; // the focused, startable (unlocked) deck name

    // Launch a single deck: an exam-due deck starts its exam, anything else a
    // review session.
    const launch = (name) => {
      const deck = data.decks.find(x => x.name === name);
      if (deck && deck.state === "examdue") startExam(name);
      else select([name]);
    };

    const wrap = el("div", "select");
    wrap.appendChild(el("div", "lede", "tap a deck to start — or tick several to merge"));

    const filter = el("input", "deck-filter");
    filter.type = "text"; filter.placeholder = "filter decks…"; filter.autocomplete = "off";
    wrap.appendChild(filter);

    // The primary button is Start (launch the focused deck) until decks are
    // ticked, then Confirm (review the multi-deck selection).
    function syncPrimary() {
      legend.innerHTML = "";
      if (chosen.size) {
        const b = el("button", "chip primary", "Confirm");
        b.appendChild(el("span", "k", `${chosen.size} ⏎`));
        b.addEventListener("click", renderConfirm);
        legend.appendChild(b);
      } else {
        // An exam-due deck launches its exam, not a review, so label it so.
        const fd = focused && data.decks.find(x => x.name === focused);
        const b = el("button", "chip primary", fd && fd.state === "examdue" ? "Take exam" : "Start");
        b.appendChild(el("span", "k", "enter"));
        b.disabled = !focused; // only when an unlocked deck row is focused
        b.addEventListener("click", () => { if (focused) launch(focused); });
        legend.appendChild(b);
      }
    }

    const toggleTick = (name, row) => {
      if (chosen.has(name)) chosen.delete(name); else chosen.add(name);
      row.classList.toggle("on");
      syncPrimary();
    };

    const list = el("div", "decklist");
    const rows = [];
    for (const d of data.decks) {
      // Exam-due decks have no reviewable cards, so they can't join a merged
      // review — only launch their own exam. Their tick box is disabled.
      const examdue = d.state === "examdue";
      const row = el("div", "deckrow" + (d.locked ? " locked" : "") + (examdue ? " examdue" : "") + (chosen.has(d.name) ? " on" : ""));
      row.tabIndex = 0;
      row.dataset.deck = d.name;
      if (d.locked) row.dataset.locked = "1";
      if (examdue) row.dataset.examdue = "1";
      const box = el("span", "box");
      box.addEventListener("click", (e) => { e.stopPropagation(); if (!d.locked && !examdue) toggleTick(d.name, row); });
      row.appendChild(box);
      const name = el("span", "name", d.name);
      if (d.locked) name.appendChild(el("span", "lock", " \u{1F512}"));
      row.appendChild(name);
      if (d.meta) row.appendChild(el("span", "meta state-" + d.state, d.meta));
      // Tapping the row launches that deck (locked decks can't start).
      row.addEventListener("click", () => { if (!d.locked) launch(d.name); });
      rows.push({ row, name: d.name.toLowerCase() });
      list.appendChild(row);
    }
    wrap.appendChild(list);
    stage.appendChild(wrap);

    // Focus drives the Start button: a focused unlocked deck enables it; the
    // search box (or a locked deck) disables it. Tracked via focusin so clicking
    // the button itself doesn't clear the remembered focus.
    wrap.addEventListener("focusin", (e) => {
      const t = e.target;
      if (t.dataset && t.dataset.deck !== undefined) focused = t.dataset.locked ? null : t.dataset.deck;
      else if (t === filter) focused = null;
      if (!chosen.size) syncPrimary();
    });

    const visible = () => rows.filter(r => r.row.style.display !== "none");
    filter.addEventListener("input", () => {
      const q = filter.value.trim().toLowerCase();
      for (const { row, name } of rows) row.style.display = !q || name.includes(q) ? "" : "none";
    });
    filter.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") { e.preventDefault(); const v = visible(); if (v.length) v[0].row.focus(); }
    });
    list.addEventListener("keydown", (e) => {
      const row = e.target.closest(".deckrow");
      if (!row) return;
      const v = visible();
      const idx = v.findIndex(r => r.row === row);
      if (e.key === "ArrowDown") { e.preventDefault(); if (idx < v.length - 1) v[idx + 1].row.focus(); }
      else if (e.key === "ArrowUp") { e.preventDefault(); if (idx > 0) v[idx - 1].row.focus(); else filter.focus(); }
      else if (e.key === " ") { e.preventDefault(); if (!row.dataset.locked && !row.dataset.examdue) toggleTick(row.dataset.deck, row); }
    });

    syncPrimary();
    filter.focus(); // ready to type-to-filter immediately
  }

  function renderConfirm() {
    selectEsc = renderBrowse; // Esc / Cancel returns to browse, keeping the ticks
    stage.innerHTML = ""; legend.innerHTML = "";
    const wrap = el("div", "select");
    wrap.appendChild(el("div", "lede", "start these decks together?"));
    const list = el("div", "decklist");
    for (const name of chosen) {
      const row = el("div", "deckrow");
      row.appendChild(el("span", "name", name));
      list.appendChild(row);
    }
    wrap.appendChild(list);
    stage.appendChild(wrap);

    const start = el("button", "chip primary", "Start");
    start.appendChild(el("span", "k", "enter"));
    start.addEventListener("click", () => select([...chosen]));
    legend.appendChild(start);
    const cancel = el("button", "chip", "Cancel");
    cancel.appendChild(el("span", "k", "esc"));
    cancel.addEventListener("click", renderBrowse);
    legend.appendChild(cancel);
  }

  renderBrowse();
}

function renderCard() {
  const c = state.card;
  const deck = el("div", "stack");
  deck.dataset.depth = Math.min(3, Math.max(1, state.remaining));
  deck.appendChild(el("div", "peek p2"));
  deck.appendChild(el("div", "peek p1"));

  const card = el("div", "card");
  card.id = "card";

  // question region
  const q = el("div", "region q");
  q.appendChild(el("div", "front-text", c.front));
  for (const ctx of c.context) q.appendChild(contextLine(ctx));
  if (c.img) q.appendChild(cardImage(c.img));
  card.appendChild(q);

  card.appendChild(el("div", "divider"));

  // answer / options region (filled on reveal or answer). The note region and
  // its divider are added only once the note is shown (see setNote); the answer
  // is capped shorter only when the card has a note, to leave room for it.
  const hasNote = c.note && c.note.length > 0;
  const a = el("div", "region a" + (hasNote ? " withnote" : ""));
  a.id = "ansRegion";
  a.addEventListener("scroll", () => updateFade(a));
  card.appendChild(a);

  deck.appendChild(card);
  stage.appendChild(deck);

  fillBottom();
  renderLegend();
}

// Fills the answer region for the current mode/phase, and shows the note (with
// its own divider) only when it should be visible.
function fillBottom() {
  const a = document.getElementById("ansRegion");
  if (!a) return;
  a.innerHTML = "";
  a.appendChild(el("span", "mode-tag", modeLabel())); // badge heads the answer section
  if (feedback) { (isChoice() ? renderChoiceFeedback : renderCheckFeedback)(a); setNote(true); }
  else if (isChoice()) { renderChoices(a); setNote(false); }
  else if (isInput()) { renderInput(a); setNote(false); }
  else if (isExplain()) { renderExplain(a); setNote(fullyRevealed()); }
  else { fillAnswer(a); setNote(fullyRevealed()); }
  // keep the newest line in view as a verse is revealed line by line
  if (state.mode === "line" && revealed > 0) a.scrollTop = a.scrollHeight;
  updateFade(a);
}

// Show a soft fade on whichever edge of the answer region hides content,
// instead of a scrollbar.
function updateFade(a) {
  if (!a) return;
  a.classList.toggle("fade-top", a.scrollTop > 2);
  a.classList.toggle("fade-bottom", a.scrollTop + a.clientHeight < a.scrollHeight - 2);
}

// Adds (or removes) the note region and a divider before it. Because content is
// top-aligned, adding it on reveal doesn't shift the question or answer, so it
// only needs to exist while shown — no premature empty zone or stray divider.
function setNote(show) {
  const card = document.getElementById("card");
  if (!card) return;
  let divider = document.getElementById("noteDivider");
  let n = document.getElementById("noteRegion");
  const has = state.card.note && state.card.note.length > 0;
  if (show && has) {
    if (!divider) { divider = el("div", "divider"); divider.id = "noteDivider"; card.appendChild(divider); }
    if (!n) { n = el("div", "region n"); n.id = "noteRegion"; card.appendChild(n); }
    n.innerHTML = "";
    renderNote(n, state.card.note);
  } else {
    if (divider) divider.remove();
    if (n) n.remove();
  }
}

// Tappable multiple-choice options.
function renderChoices(a) {
  const wrap = el("div", "options");
  state.choices.forEach((opt, i) => {
    const b = el("button", "option");
    b.appendChild(el("span", "num", String(i + 1)));
    b.appendChild(el("span", "opt", opt));
    b.addEventListener("click", () => choose(i));
    wrap.appendChild(b);
  });
  a.appendChild(wrap);
}

// Typing / fuzzy: an input per answer line, submitted with Enter or the chip.
function renderInput(a) {
  const wrap = el("div", "inputs");
  state.card.back.forEach(() => {
    const inp = el("input", "field");
    inp.type = "text"; inp.autocomplete = "off"; inp.spellcheck = false;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); submitCheck(); } });
    wrap.appendChild(inp);
  });
  a.appendChild(wrap);
  const first = wrap.querySelector("input");
  if (first) first.focus();
}

// The typed answer after submitting: each line gets a trailing ✓ (green) or ✗
// (red); a wrong line also shows the expected answer beneath it.
function renderCheckFeedback(a) {
  const wrap = el("div", "reveal");
  feedback.results.forEach(r => {
    const line = el("div", "answer" + (r.passed ? "" : " miss"));
    line.appendChild(el("span", "txt", r.input || "—"));
    line.appendChild(el("span", "mark", r.passed ? "✓" : "✗"));
    wrap.appendChild(line);
    // Show the correct answer whenever the input differed — including a fuzzy
    // pass within tolerance, so typos don't get memorised.
    if (r.distance > 0) wrap.appendChild(el("div", "expected", r.expected));
  });
  a.appendChild(wrap);
}

// The options after answering: correct in green, a wrong pick in red.
function renderChoiceFeedback(a) {
  const wrap = el("div", "options");
  state.choices.forEach((opt, i) => {
    let cls = "option";
    if (i === feedback.correct) cls += " correct";
    else if (i === feedback.chosen) cls += " wrong";
    else cls += " dim";
    const row = el("div", cls);
    row.appendChild(el("span", "num", String(i + 1)));
    row.appendChild(el("span", "opt", opt));
    wrap.appendChild(row);
  });
  a.appendChild(wrap);
}

// Explain (understanding) cards: before reveal a free textarea (optional); after
// reveal your answer beside the key points (the back lines). Self-graded — the
// typed text never leaves the client.
function renderExplain(a) {
  if (revealed === 0) {
    const ta = el("textarea", "explain-input");
    ta.placeholder = "Type your answer… (optional)";
    ta.rows = 3;
    ta.value = explainInput;
    ta.addEventListener("input", () => { explainInput = ta.value; });
    ta.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); explainReveal(); }
    });
    a.appendChild(ta);
    setTimeout(() => ta.focus(), 0);
    return;
  }
  if (explainInput.trim()) {
    a.appendChild(el("div", "explain-label", "your answer"));
    a.appendChild(el("div", "explain-answer", explainInput));
  }
  a.appendChild(el("div", "explain-label", "your answer should cover"));
  const pts = el("div", "reveal");
  for (const p of state.card.back) pts.appendChild(el("div", "answer", "• " + p));
  a.appendChild(pts);
}
function explainReveal() {
  const ta = document.querySelector(".explain-input");
  if (ta) explainInput = ta.value;
  revealed = backCount();
  fillBottom();
  renderLegend();
}

// Fill the answer region for reveal modes (flip / line / choice fallback).
function fillAnswer(a) {
  if (!a) return;
  // fillBottom already cleared the region and added the mode badge; don't wipe it.
  if (revealed === 0) return; // stays empty until revealed

  const c = state.card;
  const shown = state.mode === "line" ? Math.min(revealed, c.back.length) : c.back.length;
  const sec = el("div", "reveal");
  for (let i = 0; i < shown; i++) sec.appendChild(el("div", "answer", c.back[i]));
  if (state.mode === "line" && shown < c.back.length) sec.appendChild(el("div", "answer pending", "···"));
  a.appendChild(sec);
  // Attach the answer image to the region itself (a flex column), not to the
  // `.reveal` block, so it can be bounded by the region and scaled to fit.
  if (c.img_back) a.appendChild(cardImage(c.img_back));
}

// An <img> for a card image side. The src is a server `/img/<key>` URL.
function cardImage(src) {
  const img = el("img", "card-img");
  img.src = src;
  img.alt = "";
  return img;
}

// A cloze context line, with the active blank brightened and hidden holes
// dimmed. Markers come from the server (cloze BLANK "____" and HIDDEN "[…]").
function contextLine(text) {
  const div = el("div", "context");
  div.innerHTML = escapeHtml(text)
    .split("____").join('<span class="hole">____</span>')
    .split("[…]").join('<span class="muted-hole">[…]</span>');
  return div;
}
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderNote(parent, units) {
  if (!units || units.length === 0) return;
  const note = el("div", "note");
  for (const u of units) {
    if (u.kind === "sentence") note.appendChild(el("p", null, u.text));
    else if (u.kind === "code") {
      const pre = el("pre");
      pre.appendChild(el("code", null, u.lines.join("\n")));
      note.appendChild(pre);
    }
  }
  parent.appendChild(note);
}

function renderLegend() {
  legend.innerHTML = "";
  if (feedback) {
    chip("Continue", "primary", continueAfter, label(KEYS.reveal));
    chip("Ask", "", openAsk, label(KEYS.ask));
  } else if (isChoice()) {
    chip("Skip", "", skip, label(KEYS.skip));
  } else if (isInput()) {
    chip("Submit", "primary", submitCheck, "enter");
    chip("Skip", "", skip, label(KEYS.skip));
  } else if (isExplain() && !fullyRevealed()) {
    chip("Reveal points", "primary", explainReveal, "enter");
    chip("Skip", "", skip, label(KEYS.skip));
  } else if (!fullyRevealed()) {
    chip(state.mode === "line" && revealed > 0 ? "Reveal next" : "Reveal", "primary", reveal, label(KEYS.reveal));
    chip("Skip", "", skip, label(KEYS.skip));
  } else {
    chip("Again", "again", () => grade("again"), label(KEYS.again));
    chip("Good", "good", () => grade("good"), label(KEYS.good));
    chip("Easy", "easy", () => grade("easy"), label(KEYS.easy));
    chip("Ask", "", openAsk, label(KEYS.ask));
  }
  chip("Decks", "", leaveSession, "esc"); // return to the deck picker
}

function renderSummary() {
  const acc = state.reviews > 0 ? Math.round(100 * state.passed / state.reviews) + "%" : "–";
  const h = state.histogram;
  const wrap = el("div", "summary");
  wrap.appendChild(el("div", "lede", "session complete"));
  wrap.appendChild(el("h2", null, state.reviews > 0 ? "Nicely charged." : "Nothing due."));
  const row = (label, value) => {
    const r = el("div", "row");
    r.appendChild(el("span", null, label));
    r.appendChild(el("b", null, value));
    wrap.appendChild(r);
  };
  row("reviewed", `${state.reviews}`);
  row("passed / failed", `${state.passed} / ${state.failed}`);
  row("accuracy", acc);
  // stages s1..s5, with stages above the reachable top shown as a muted –
  const stagesRow = el("div", "row");
  stagesRow.appendChild(el("span", null, "stages"));
  const stagesVal = el("b");
  stagesVal.innerHTML = histCells(state.histogram, state.top_stage).slice(1).join(" · ");
  stagesRow.appendChild(stagesVal);
  wrap.appendChild(stagesRow);
  if (!state.can_restart) {
    wrap.appendChild(el("div", "note", "Nothing due right now — come back later."));
  }
  const examDue = state.exam_due || [];
  examDue.forEach(name => {
    wrap.appendChild(el("div", "exam-ready", `✦ ${name} is ready for its exam.`));
  });
  stage.appendChild(wrap);
  // An exam-due deck takes the primary action; otherwise "New session" does.
  examDue.forEach((name, i) => {
    chip(examDue.length === 1 ? "Take the exam" : `Exam: ${name}`, i === 0 ? "primary" : "", () => startExam(name));
  });
  const newSession = chip("New session", examDue.length ? "" : "primary", restart, label(KEYS.restart));
  newSession.disabled = !state.can_restart;
  chip("Back to Decks", "", deselect, "esc");
}

function reveal() {
  revealed = state.mode === "line" ? Math.min(revealed + 1, backCount()) : backCount();
  fillBottom();
  renderLegend();
}

function zap() {
  const card = document.getElementById("card");
  if (card) card.classList.add("zap");
}

function chip(text, cls, onClick, key) {
  const b = el("button", "chip" + (cls ? " " + cls : ""), text);
  if (key) b.appendChild(el("span", "k", key));
  b.addEventListener("click", onClick);
  legend.appendChild(b);
  return b;
}

document.addEventListener("keydown", (e) => {
  if (!state || e.altKey || e.metaKey) return; // ctrl handled per-binding below
  // The exam overlay takes priority; Esc leaves it, the textarea handles typing.
  if (examData) {
    if (e.key === "Escape") { e.preventDefault(); closeExam(); }
    return;
  }
  if (state.phase === "select") {
    if (e.key === "Enter") {
      const b = legend.querySelector(".chip.primary");
      if (b && !b.disabled) { e.preventDefault(); b.click(); }
    } else if (e.key === "Escape" && selectEsc) {
      e.preventDefault(); selectEsc();
    }
    return;
  }
  // The ask overlay: Esc closes, the save-note key saves; the textarea handles
  // typing and Enter-to-send.
  if (asking) {
    if (e.key === "Escape") { e.preventDefault(); closeAsk(); return; }
    if (hit(e, KEYS.save_note)) { e.preventDefault(); saveAskNote(); return; }
    return;
  }
  // While the leave prompt is up: Enter confirms leaving, Esc stays; other keys
  // are inert (so a stray Esc can never blow through the guard).
  if (confirmingLeave) {
    if (e.key === "Enter") { e.preventDefault(); deselect(); }
    else if (e.key === "Escape") { e.preventDefault(); cancelLeave(); }
    return;
  }
  // Esc returns to the deck picker (with a confirm when the session isn't done).
  if (e.key === "Escape") { e.preventDefault(); leaveSession(); return; }
  if (state.finished) {
    // Enter takes the primary action (the exam, when a deck is exam due).
    if (state.exam_due && state.exam_due.length && e.key === "Enter") {
      const b = legend.querySelector(".chip.primary");
      if (b) { e.preventDefault(); b.click(); }
      return;
    }
    if (state.can_restart && hit(e, KEYS.restart)) { e.preventDefault(); restart(); }
    return;
  }
  if (feedback) {
    if (hit(e, KEYS.ask)) { e.preventDefault(); openAsk(); return; }
    if (hit(e, KEYS.remove)) { e.preventDefault(); remove(); return; }
    if (hit(e, KEYS.reveal) || e.key === "Enter") { e.preventDefault(); continueAfter(); }
    return;
  }
  // While typing in a field, only Ctrl shortcuts act so plain keys stay text;
  // Enter (submit) is handled by the field itself.
  if (isInput()) {
    if (e.ctrlKey && hit(e, KEYS.remove)) { e.preventDefault(); remove(); }
    else if (e.ctrlKey && hit(e, KEYS.skip)) { e.preventDefault(); skip(); }
    return;
  }
  // Explain before reveal: the textarea takes plain keys and Enter-to-reveal;
  // only Ctrl shortcuts act here.
  if (isExplain() && !fullyRevealed()) {
    if (e.ctrlKey && hit(e, KEYS.remove)) { e.preventDefault(); remove(); }
    else if (e.ctrlKey && hit(e, KEYS.skip)) { e.preventDefault(); skip(); }
    return;
  }
  if (hit(e, KEYS.remove)) { e.preventDefault(); remove(); return; }
  if (isChoice()) {
    if (hit(e, KEYS.skip)) { e.preventDefault(); skip(); return; }
    if (e.key >= "1" && e.key <= "9") {
      const i = +e.key - 1;
      if (i < state.choices.length) { e.preventDefault(); choose(i); }
    }
    return;
  }
  if (!fullyRevealed()) {
    if (hit(e, KEYS.skip)) { e.preventDefault(); skip(); return; }
    if (hit(e, KEYS.reveal)) { e.preventDefault(); reveal(); return; }
    return;
  }
  if (hit(e, KEYS.ask)) { e.preventDefault(); openAsk(); return; }
  if (hit(e, KEYS.again)) { e.preventDefault(); grade("again"); }
  else if (hit(e, KEYS.good)) { e.preventDefault(); grade("good"); }
  else if (hit(e, KEYS.easy)) { e.preventDefault(); grade("easy"); }
});

document.getElementById("kebab").addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("open"); });
menu.addEventListener("click", (e) => e.stopPropagation());
document.getElementById("mAsk").addEventListener("click", () => { menu.classList.remove("open"); if (isAnswered()) openAsk(); });
document.getElementById("mRemove").addEventListener("click", () => { menu.classList.remove("open"); remove(); });
document.addEventListener("click", () => menu.classList.remove("open"));

// Load the configured key bindings first, then the session.
api("/api/keys").then(k => {
  KEYS = k;
  document.querySelector("#mRemove .mk").textContent = label(KEYS.remove);
  document.getElementById("mAskKey").textContent = label(KEYS.ask);
  load();
});
</script>
</body>
</html>
