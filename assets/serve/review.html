<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>alix</title>
<!--%head%-->
<style>
  :root {
    --card-w: min(94vw, 1200px);
    --card-h: min(88vh, 780px);
  }
  * { box-sizing: border-box; }
  /* A blinking caret should only ever appear inside a real text input or a
     text-based source (a code excerpt you might read/select) — never on a focused
     button, a chosen option, or page/card text (e.g. with the browser's
     caret-browsing on). caret-color is inherited, so transparent here hides it
     everywhere; the editable elements and source excerpts opt back in. */
  html { caret-color: transparent; }
  input, textarea, [contenteditable], .excerpt, .code { caret-color: auto; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, var(--halo) 0%, var(--void) 60%) fixed;
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; min-height: 100%; overflow: hidden;
  }

  /* ── status bar: the terminal lineage, in monospace ───────────────── */
  .bar {
    padding: 10px 16px; font-family: var(--mono); font-size: 0.78rem;
    color: var(--dim); border-bottom: 1px solid var(--line); background: rgba(6,18,26,0.6);
  }
  .bar-inner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 14px; width: 100%; }
  .bar-center { justify-self: center; min-width: 0; display: flex; align-items: center; }
  .bar-right { justify-self: end; display: flex; align-items: center; gap: 14px; }
  .bar-chip { display: inline-flex; align-items: center; gap: 6px; background: none; color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 4px 11px; font-family: var(--sans); font-size: 0.8rem; white-space: nowrap; cursor: pointer; transition: border-color 0.12s, color 0.12s; }
  .bar-chip:hover { border-color: var(--bolt); color: var(--bolt-hi); }
  .bar .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--bolt); font-weight: 600; }
  .bar .brand svg { width: 13px; height: 16px; filter: drop-shadow(0 0 5px rgba(34,211,238,0.6)); }
  /* A long (hand-crafted) title must shorten with an ellipsis — never wrap to a
     second line and grow the header's height. */
  .bar .deck { color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; max-width: min(52vw, 420px); }
  .bar .sep { color: var(--line); }
  .bar .spacer { flex: 1; }
  /* Reused readout: exam strictness while examining, the deck's card count
     while augmenting; empty during review. */
  .bar .hist { color: var(--ink); font-variant-numeric: tabular-nums; }
  .bar-filter { width: min(300px, 56vw); background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 8px; color: var(--ink); font: inherit; font-size: 0.82rem; padding: 5px 12px; }
  .bar-filter::placeholder { color: var(--dim); }
  .bar-filter:focus { outline: none; border-color: var(--bolt); }
  .muted { color: var(--dim); }

  /* overflow menu: only the destructive action lives here */
  .menu-wrap { position: relative; flex: none; }
  .kebab { background: none; border: 0; color: var(--ink); cursor: pointer; font-size: 1.15rem; line-height: 1; padding: 4px 8px; border-radius: 8px; }
  /* Browser-style picker nav (back + refresh), for mouse/touch over keys. */
  .bar-left { display: inline-flex; align-items: center; gap: 10px; min-width: 0; }
  .bar-nav { display: inline-flex; align-items: center; gap: 1px; flex: none; }
  .navbtn { background: none; border: 0; color: var(--ink); cursor: pointer; font-size: 1.05rem; line-height: 1; padding: 4px 8px; border-radius: 8px; }
  .navbtn:hover:not(:disabled) { color: var(--ink); background: rgba(255,255,255,0.06); }
  .navbtn:disabled { opacity: 0.3; cursor: default; }
  .sheet { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: grid; place-items: center; z-index: 60; }
  .sheet[hidden] { display: none; }
  .sheet-panel { background: var(--void); border: 1px solid var(--line); border-radius: 14px; padding: 20px 24px; max-width: min(440px, 90vw); color: var(--ink); box-shadow: 0 12px 44px rgba(0,0,0,0.45); animation: deal 0.2s both; }
  .sheet-panel h2 { margin: 0 0 14px; font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--bolt); }
  .sheet-keys { display: grid; grid-template-columns: auto 1fr; gap: 9px 16px; align-items: center; font-size: 0.9rem; }
  .sheet-keys kbd { justify-self: start; font-family: var(--mono); font-size: 0.72rem; color: var(--dim); border: 1px solid var(--line); border-radius: 5px; padding: 2px 7px; }
  .sheet-about p { margin: 0 0 10px; font-size: 0.92rem; }
  .sheet-about .about-name { font-size: 1.05rem; }
  .sheet-about .about-tag { color: var(--dim); }
  .sheet-about a { color: var(--bolt); text-decoration: none; }
  .sheet-about a:hover { text-decoration: underline; }
  .kebab:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
  .menu { position: absolute; right: 0; top: calc(100% + 8px); z-index: 20; display: none; min-width: 172px; padding: 6px; background: var(--menu-bg); border: 1px solid var(--line); border-radius: 11px; box-shadow: 0 14px 34px -12px rgba(0,0,0,0.8); }
  .menu.open { display: block; }
  .menu button { display: block; width: 100%; text-align: left; background: none; color: var(--again); border: 0; border-radius: 7px; padding: 11px 12px; font-size: 0.92rem; font-weight: 500; cursor: pointer; }
  .menu button:hover:not(:disabled) { background: rgba(255,255,255,0.07); }
  .menu button:disabled { opacity: 0.5; cursor: default; }
  .menu .mk { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); float: right; }

  /* ── stage + card ─────────────────────────────────────────────────── */
  .stage { flex: 1; display: grid; place-items: center; padding: 22px 16px; min-height: 0; }
  .stack {
    position: relative; width: var(--card-w);
    animation: deal 0.3s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes deal { from { opacity: 0; transform: translateY(12px) scale(0.985); } to { opacity: 1; transform: none; } }
  .peek { position: absolute; inset: 0; border-radius: 20px; background: var(--panel-bot); border: 1px solid var(--line); }
  .peek.p1 { transform: translate(7px, -7px); opacity: 0.7; }
  .peek.p2 { transform: translate(14px, -14px); opacity: 0.4; }
  .stack[data-depth="1"] .peek { display: none; }
  .stack[data-depth="2"] .peek.p2 { display: none; }

  /* fixed-size card, split into a question half and an answer half by the
     separator; each half centers its own content */
  .card {
    position: relative; height: var(--card-h); border-radius: 20px;
    background: linear-gradient(160deg, var(--panel-top), var(--panel-bot));
    border: 1px solid var(--line); box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
    padding: 18px 30px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card::after { content: ""; position: absolute; inset: 12px; border-radius: 12px; border: 1px solid rgba(125,249,232,0.10); pointer-events: none; }
  /* the card stacks content-sized regions from the top: the answer sits right
     under the question and grows downward, so revealing (incl. line-by-line)
     and showing the note never shift anything. Each region is capped and
     scrolls its own overflow, so a long answer doesn't push the note away. */
  .region {
    min-height: 0; overflow: auto;
    display: flex; flex-direction: column; justify-content: flex-start;
    text-align: center; gap: 12px; padding: 10px 0;
    scrollbar-width: none;            /* Firefox: no scrollbar */
  }
  .region::-webkit-scrollbar { width: 0; height: 0; }   /* WebKit: no scrollbar */
  /* instead of a scrollbar, fade the edge that has hidden content */
  .region.a.fade-top {
    mask-image: linear-gradient(to bottom, transparent, #000 34px);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 34px);
  }
  .region.a.fade-bottom {
    mask-image: linear-gradient(to top, transparent, #000 34px);
    -webkit-mask-image: linear-gradient(to top, transparent, #000 34px);
  }
  .region.a.fade-top.fade-bottom {
    mask-image: linear-gradient(to bottom, transparent, #000 34px, #000 calc(100% - 34px), transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 34px, #000 calc(100% - 34px), transparent);
  }
  /* a clear "there's more below" marker when the answer/excerpt overflows the card */
  .more-hint { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.05em; color: var(--bolt); background: var(--panel-bot, rgba(6,18,26,0.95)); border: 1px solid var(--line); border-radius: 999px; padding: 3px 11px; pointer-events: none; opacity: 0; transition: opacity 0.15s; box-shadow: 0 5px 16px -7px rgba(0,0,0,0.8); }
  .more-hint.show { opacity: 0.94; }
  .region.q { flex: 0 0 auto; max-height: 38%; }   /* question */
  /* the answer grows to fill the slack between the top-anchored question and the
     bottom-pinned note (a note caps it shorter, to leave room). When its content
     fits, it centers — a short answer settles below the midline instead of
     clustering under the question; when it overflows it top-aligns and scrolls, so
     long answers still use the whole card. The class is set by updateFade. */
  .region.a { flex: 1 1 auto; max-height: 82%; position: relative; }
  /* The mode badge is pinned just below the divider, out of the centred flow (see
     .mode-tag), so a short "balanced" answer no longer drags it down; reserve its row. */
  .region.a:has(.mode-tag) { padding-top: 34px; }
  .region.a.withnote { max-height: 52%; }
  .region.a.balanced { justify-content: center; }
  .region.a.filled { justify-content: flex-start; }
  .region.n { flex: 0 0 auto; max-height: 30%; }   /* note */
  /* keep the note (and its divider) pinned to the bottom of the card */
  #noteDivider { margin-top: auto; }
  /* a cited card's answer region is tappable to swap answer <-> source; a corner
     icon marks it ( </> = view the source, ¶ = back to the answer ) */
  .region.a.citable { position: relative; cursor: pointer; }
  .cite-toggle { position: absolute; top: 6px; right: 10px; display: inline-flex; align-items: center; gap: 6px;
                 color: var(--dim); user-select: none; transition: color 0.12s; }
  .cite-toggle .ci { font-family: var(--mono); font-size: 0.9rem; line-height: 1; }
  .cite-toggle .k { font-family: var(--mono); font-size: 0.66rem; border: 1px solid var(--line);
                    border-radius: 5px; padding: 1px 5px; }
  .region.a.citable:hover .cite-toggle { color: var(--bolt); }
  .region.a.citable:hover .cite-toggle .k { border-color: var(--bolt); }
  .cite-err { color: var(--dim); font-style: italic; font-size: 0.8rem; padding-left: 6px; }
  .excerpt { padding: 6px 8px; background: rgba(0,0,0,0.25); border-radius: 8px; overflow-x: auto;
             font-family: var(--mono); font-size: 0.78rem; line-height: 1.45; }
  .exline { display: flex; gap: 12px; white-space: pre; }
  .exline .lno { color: var(--dim); text-align: right; min-width: 3ch; user-select: none; }
  .exline .ltx { color: var(--ink); }
  .excerpt-more { color: var(--dim); font-size: 0.72rem; padding-left: 6px; margin-top: 4px; }
  .front-text { font-size: clamp(1.4rem, 4.4vw, 2.05rem); font-weight: 600; line-height: 1.28; letter-spacing: -0.01em; }
  /* The topological orientation breadcrumb: each region is its name over a thin
     per-card heatmap bar. Two channels, kept apart: name weight/opacity = where
     you are; bar color (red→green) = how solid each card in the area is. Clips
     rather than wraps to stay a thin strip. */
  .crumb { display: flex; align-items: flex-start; gap: 14px; flex-wrap: nowrap;
           overflow: hidden; margin-bottom: 0.55rem; }
  .crumb-region { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .crumb-name { font-size: 0.74rem; letter-spacing: 0.02em; color: var(--ink);
                white-space: nowrap; opacity: 0.5; }
  .crumb-region.cur .crumb-name { opacity: 1; font-weight: 600; }
  .crumb-bar { display: flex; gap: 1px; height: 3px; border-radius: 2px; overflow: hidden; }
  .crumb-cell { flex: 1 1 0; min-width: 3px; }
  /* The picker's focus drawer: opens under a selected deck that has a topology.
     Pick the ordering (a topology) and, optionally, one region to drill — the
     heatmap shows where each region is weak (red) or learned (green), and the
     right end shows how many cards that selection has due. The reveal is a single
     `height` transition on the clipping wrapper: the drawer's content is laid out
     once and `overflow: hidden` just moves the clip line, so opening and closing
     stay smooth, and it always animates to height 0 *before* it's removed (never
     a snap). */
  .drawer-wrap { margin-left: 22px; overflow: hidden; flex: 0 0 auto; }
                 /* height animated via the Web Animations API; flex:0 0 auto stops the
                    flex column shrinking it to 0 (overflow:hidden ⇒ min-height:0) */
  .drawer { margin: 2px 0 8px; display: flex; flex-direction: column; gap: 10px;
            padding: 11px 13px; border: 1px solid var(--line); border-left: 2px solid var(--bolt);
            border-radius: 9px; background: rgba(255,255,255,0.025); }
  .drawer-head { display: flex; align-items: center; gap: 8px; }
  .drawer-label { font-size: 0.7rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--dim); }
  .drawer-topo { font-family: var(--sans); font-size: 0.82rem; color: var(--ink);
                 background: var(--menu-bg); border: 1px solid var(--line); border-radius: 7px;
                 padding: 3px 7px; cursor: pointer; }
  .drawer-body { display: flex; align-items: center; gap: 16px; }
  .drawer-regions { display: flex; flex-wrap: wrap; gap: 6px; flex: 1 1 auto; min-width: 0; }
  .drawer-region { display: flex; flex-direction: column; gap: 3px; min-width: 52px;
                   padding: 3px 6px; border: 1px solid var(--line); border-radius: 6px;
                   background: transparent; cursor: pointer; transition: border-color 0.12s; }
  .drawer-region:hover { border-color: var(--dim); }
  .drawer-region.sel { border-color: var(--bolt); background: rgba(34,211,238,0.07); }
  .drawer-region .crumb-name { font-size: 0.68rem; opacity: 0.8; }
  .drawer-region.sel .crumb-name { opacity: 1; font-weight: 600; }
  .drawer-region.all { justify-content: center; min-width: 0; }
  .drawer-due { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end;
                line-height: 1.02; }
  .drawer-due .n { font-size: 1.35rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink); }
  .drawer-due .l { font-size: 0.64rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--dim); }
  .drawer-due.zero .n { color: var(--dim); }
  .context { color: var(--bolt); font-family: var(--mono); font-size: 0.95rem; white-space: pre-wrap; }
  .context .hole { color: var(--bolt-hi); font-weight: 700; }      /* the active cloze blank */
  .context .muted-hole { color: var(--dim); }                     /* sibling holes, hidden */
  /* bound the image by its region (flex shrink + min-height:0), so it scales
     down to fit instead of scrolling; flex-grow 0 keeps small images at their
     natural size rather than ballooning. */
  .card-img { flex: 0 1 auto; min-height: 0; align-self: center; max-width: 100%; object-fit: contain; margin: 12px auto 0; border-radius: 8px; }

  .divider { flex: none; height: 1px; width: 70%; margin: 0 auto; background: linear-gradient(90deg, transparent, var(--line) 18%, var(--line) 82%, transparent); }

  .reveal { animation: revealIn 0.26s ease both; }
  /* A reshaped list — or any multi-line answer — reveals as a left-aligned block, centered as a whole. */
  .reveal.list { text-align: left; width: max-content; max-width: 100%; margin-inline: auto; }
  /* A fenced code snippet in a reshaped answer: monospace, indentation kept. */
  .code-block { text-align: left; font: 0.86rem/1.5 var(--mono); color: var(--ink); background: rgba(0,0,0,0.28); border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; margin: 5px 0; overflow-x: auto; white-space: pre; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .answer { color: var(--good); font-size: clamp(1.15rem, 3.6vw, 1.5rem); line-height: 1.4; margin: 0 0 4px; white-space: pre-wrap; }
  .answer.pending { color: var(--dim); }
  .acquire-hint { color: var(--dim); font-size: 0.85rem; margin-top: 12px; font-style: italic; }
  /* a wrong typed line recedes (dim + small) so the correct answer leads */
  .answer.miss { color: var(--again); opacity: 0.5; font-size: clamp(0.92rem, 2.6vw, 1.08rem); }
  .answer .mark { margin-left: 10px; font-weight: 700; }   /* ✓ / ✗ after the line */
  .expected { color: var(--good); font-size: clamp(1.15rem, 3.6vw, 1.5rem); line-height: 1.4; margin: 2px 0 8px; }

  /* typing / typeline input fields */
  .inputs { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 520px; margin: 0 auto; }
  .field {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    border-radius: 12px; padding: 13px 16px; min-height: 52px; color: var(--ink);
    font-family: var(--sans); font-size: 1.1rem; text-align: center; outline: none;
  }
  .field:focus { border-color: var(--bolt); }
  /* mode badge on every card — typing and typeline look identical otherwise */
  .mode-tag {
    position: absolute; top: 8px; left: 0; right: 0;   /* pinned under the divider */
    width: fit-content; margin: 0 auto;
    font-family: var(--mono); font-size: 0.6rem;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* notes: a warm, clearly-separated block (yellow, like the TUI), as wide as
     the card rather than the answer text */
  .note {
    text-align: left; margin: 18px auto 0; max-width: 600px;
    background: var(--note-bg); border: 1px solid var(--note-line);
    border-left: 3px solid var(--note-border); border-radius: 10px;
    padding: 12px 15px; color: var(--note-ink); font-size: 0.93rem;
  }
  .note p { margin: 0 0 10px; } .note p:last-child { margin-bottom: 0; }
  .note pre { margin: 8px 0; padding: 10px 12px; overflow-x: auto; background: rgba(0,0,0,0.32); border-radius: 8px; font: 0.82rem/1.45 var(--mono); color: var(--note-code); }

  /* multiple-choice options */
  .options { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 560px; margin: 0 auto; }
  .option {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--ink);
    border-radius: 12px; padding: 13px 16px; min-height: 52px; font-size: 1.02rem; cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .option .num { font-family: var(--mono); font-size: 0.78rem; color: var(--dim); }
  .option .opt { white-space: pre-wrap; }
  button.option:hover { border-color: var(--bolt); background: rgba(34,211,238,0.06); }
  button.option:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .option.correct { border-color: var(--good); background: rgba(62,224,160,0.12); color: var(--good); }
  .option.correct .num { color: var(--good); }
  .option.wrong { border-color: var(--again); background: rgba(255,107,107,0.13); color: var(--again); }
  .option.wrong .num { color: var(--again); }
  .option.dim { opacity: 0.45; }

  /* ── summary ──────────────────────────────────────────────────────── */
  .summary { width: var(--card-w); text-align: left; animation: deal 0.3s both; }
  .summary .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
  .summary h2 { font-size: 1.6rem; margin: 0 0 18px; }
  .summary .row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); color: var(--dim); }
  .summary .row b { color: var(--ink); font-family: var(--mono); font-weight: 600; }

  /* ── deck-selection screen ────────────────────────────────────────── */
  .select { width: var(--card-w); text-align: left; animation: deal 0.3s both; align-self: stretch; display: flex; flex-direction: column; min-height: 0; }
  .select .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 16px; }
  /* a workspace drill-in's goal, shown under the eyebrow (pulled up close to it). */
  .select .lede-desc { color: var(--dim); font-size: 0.85rem; line-height: 1.4; max-width: 64ch; margin: -10px 0 16px; }
  .select .msg { color: var(--dim); }
  .deck-filter { width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 11px 14px; background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 11px; color: var(--ink); font: inherit; font-size: 0.95rem; }
  .deck-filter::placeholder { color: var(--dim); }
  .deck-filter:focus { outline: none; border-color: var(--bolt); }
  .decklist { display: flex; flex-direction: column; gap: 8px; }
  /* a single scroll container holds both the deck and workspace sections */
  .lists { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow-y: auto; scrollbar-width: none; }
  .lists::-webkit-scrollbar { width: 0; }
  .select .section { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); margin: 18px 2px 9px; flex: none; }
  .lists > .section:first-child { margin-top: 2px; }
  .select .empty-hint { color: var(--dim); font-size: 0.85rem; padding: 4px 2px 0; }
  /* single-launch rows: click a deck to start it, a workspace/folder to open.
     A leading chevron (›) marks a drillable row; a glyph slot shows 🔒 / 🕒.
     Members nest by --depth in the unlock dependency tree (flattened on filter). */
  .deckrow { position: relative; display: flex; align-items: center; gap: 12px; padding: 12px 14px; padding-left: calc(14px + var(--depth, 0) * 18px); min-height: 48px; border: 1px solid var(--line); border-radius: 11px; cursor: pointer; transition: border-color 0.12s, background 0.12s; margin-bottom: 5px; flex: none; }
  .lists.filtering .deckrow { padding-left: 14px; }
  .deckrow:hover { border-color: var(--bolt); }
  .deckrow:focus { outline: none; border-color: var(--bolt); box-shadow: 0 0 0 2px rgba(125,249,232,0.35); }
  .deckrow .open { flex: none; width: 22px; text-align: center; color: var(--dim); font-size: 1.1rem; line-height: 1; }
  .deckrow .icon { flex: none; width: 22px; height: 22px; }

</head>
<body>
  <div id="tokengate" class="sheet" hidden>
    <div class="sheet-panel">
      <h2>Pairing token required</h2>
      <p>This alix server is protected. Open the <code>…/?token=…</code> link it printed at startup, or paste the token below.</p>
      <input id="tokengate-input" class="bar-filter" placeholder="pairing token" autocomplete="off" spellcheck="false">
      <button id="tokengate-connect" class="bar-chip">Connect</button>
    </div>
  </div>
  <div class="bar">
    <div class="bar-inner">
      <span class="bar-left">
        <!--%brand%-->
        <span class="bar-nav" id="barNav" style="display:none">
          <button class="navbtn" id="navBack" aria-label="Back" title="Back">←</button>
          <button class="navbtn" id="navRefresh" aria-label="Refresh decks" title="Refresh decks (r)">⟳</button>
        </span>
      </span>
      <span class="bar-center">
        <span class="deck" id="deck"></span>
        <input class="bar-filter" id="barFilter" type="text" autocomplete="off" placeholder="Search…" style="display:none">
      </span>
      <span class="bar-right">
        <span class="hist" id="hist"></span>
        <button class="bar-chip" id="masteredBtn" style="display:none">Mastered 🎉</button>
        <span class="menu-wrap" id="menuWrap">
          <button class="kebab" id="kebab" aria-label="Menu" aria-haspopup="true">☰</button>
          <div class="menu" id="menu" role="menu">
            <button id="mAsk" class="m-review" role="menuitem">Ask Tutor <span class="mk" id="mAskKey">?</span></button>
            <button id="mRemove" class="m-review" role="menuitem">Remove card <span class="mk">x</span></button>
            <button id="mPromote" class="m-review" role="menuitem">Promote to deck</button>
            <button id="mShortcuts" class="m-picker" role="menuitem">Keyboard shortcuts</button>
            <button id="theme-open" role="menuitem" style="color: var(--ink)">Theme…</button>
            <button id="mDraw" role="menuitem" style="color: var(--ink)">Draw answers <span class="mk" id="mDrawState">off</span></button>
            <button id="mAbout" class="m-picker" role="menuitem">About</button>
          </div>

      </span>
    </div>
  </div>
  <main class="stage" id="stage"></main>
  <div class="sheet" id="sheet" hidden>
    <div class="sheet-panel" id="sheetPanel" role="dialog" aria-modal="true"></div>
  </div>
  <div class="legend">
    <div class="keys" id="legend"></div>
    <span class="score" id="score"></span>
  </div>

<script>
"use strict";
// Pairing token (alix serve --lan): capture ?token= once, keep it in
// sessionStorage and attach it to every /api request.
// Missing/invalid token → a 401 opens the gate.
(function () {
  const q = new URLSearchParams(location.search).get("token");
  if (q) {
    sessionStorage.setItem("alix.token", q);
    const u = new URL(location.href); u.searchParams.delete("token");
    history.replaceState(null, "", u); // don't leave the token in the URL bar/history
  }
  const orig = window.fetch;
  window.fetch = async (url, opts = {}) => {
    const tok = sessionStorage.getItem("alix.token");
    if (tok && String(url).startsWith("/api")) {
      opts = { ...opts, headers: { ...(opts.headers || {}), Authorization: "Bearer " + tok } };
    }
    const res = await orig(url, opts);
    if (res.status === 401 && String(url).startsWith("/api")) {
      sessionStorage.removeItem("alix.token"); // wrong/missing → let the gate re-collect it
      showTokenGate();
    }
    return res;
  };
})();

// Shown on a 401 (no/invalid pairing token): a full-screen prompt to paste the
// token the server printed at startup, then reload with it applied.
function showTokenGate() {
  const gate = document.getElementById("tokengate");
  if (!gate || !gate.hidden) return;
  gate.hidden = false;
  const input = document.getElementById("tokengate-input");
  const connect = () => {
    const t = input.value.trim();
    if (!t) return;
    sessionStorage.setItem("alix.token", t);
    location.reload();
  };
  document.getElementById("tokengate-connect").onclick = connect;
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") connect(); });
  input.focus();
}
let state = null;     // last StateDto
let revealed = 0;     // back lines shown for the current card
let citationView = false; // showing the source excerpt in place of the answer
let feedback = null;  // choice result being shown ({chosen, correct, passed})
let typelineChecked = []; // TypeLine: TypedResult per line confirmed so far this card
let confirmingLeave = false; // showing the "session not finished" leave prompt
let selectEsc = null; // in the deck-select confirm view, Esc returns to browse
let lastWorkspace = null; // name of the workspace you launched from, to return into it
// The focus drawer's current pick for the deck under the cursor: which topology
// orders the session and (optionally) which one region to drill. `deck` tracks
// the focused deck so launch only applies the pick to that deck. `topoCache`
// memoizes each deck's `/api/deck-topology` payload across picker re-renders.
let drawerSel = { deck: null, topology: null, region: null };
let topoCache = {};
let explainInput = ""; // the typed reconstruction on an explain card (client-side)
let marks = [];        // per-key-point yes/no/pending for an explain checklist (client-side)
let kpCur = 0;         // the key point the cursor is on, walked top to bottom
let drawStrokes = [];    // strokes on a draw card this reveal: [{tool, points:[{x,y}]}]
let drawSnapshot = null; // frozen dataURL of the drawing, kept visible during self-grade
let drawTool = "pen";    // "pen" | "erase"
let drawCanvasEl = null; // the live <canvas> while drawing
// Per-device "Draw answers" preference (wired to the menu in Task 5).
let drawToggle = (function () { try { return localStorage.getItem("alix-draw") === "1"; } catch (e) { return false; } })();
let asking = false;   // the ask-Claude overlay is open
let askData = { transcript: [], thinking: false, status: null, error: null };
let askInfo = { model: "default", effort: "default" }; // the tutor's model + effort, from /api/ask-info
let askPoll = null;   // setInterval handle while a reply is pending
let examData = null;  // the ExamDto while an exam is active (null otherwise)
let examConfirmingQuit = false; // showing the "abandon the exam?" confirmation
let examPoll = null;  // setInterval handle while an exam call is in flight
let augmentData = null; // the AugmentDto while the Augment screen is open (null otherwise)
let augmentPoll = null; // setInterval handle while a generation is in flight
let duePoll = null;   // setInterval handle while the summary waits for a cooling card
let browsing = null;  // {cards, label, i} while the read-only browse overlay is open
let walkData = null;  // the WalkDto while an in-page trace walk is active (null otherwise)
let walkConfirmingLeave = false; // showing the "leave the walk?" confirmation
let KEYS = {};        // configured review key bindings, from /api/keys
let PK = {};          // configured deck-picker nav keys, from /api/picker-keys
let BK = { next: [{ k: "l", ctrl: false }], prev: [{ k: "h", ctrl: false }] }; // browse pager keys, from /api/browse-keys

const stage = document.getElementById("stage");
const legend = document.getElementById("legend");
const deckEl = document.getElementById("deck");
const histEl = document.getElementById("hist");
const scoreEl = document.getElementById("score");
const menuWrap = document.getElementById("menuWrap");
const barFilter = document.getElementById("barFilter");
const masteredBtn = document.getElementById("masteredBtn");
// The centered header slot shows the picker search (#barFilter) or a breadcrumb
// (#deck, during review/exam), or neither (a drill-in / mastered sub-view). The
// Mastered jump (right side) only shows on the top picker; renderList sets it.
function headerSearch() { deckEl.style.display = "none"; barFilter.style.display = ""; }
function headerBreadcrumb() { barFilter.style.display = "none"; deckEl.style.display = ""; masteredBtn.style.display = "none"; }
function headerNone() { barFilter.style.display = "none"; deckEl.style.display = "none"; masteredBtn.style.display = "none"; }
// Browser-style picker nav: ← goes back (mirrors Esc; off at the top level), ⟳
// re-scans the decks (same as the `r` key). Shown only on the picker.
const barNav = document.getElementById("barNav");
const navBack = document.getElementById("navBack");
const navRefresh = document.getElementById("navRefresh");
function updateNavBack() { navBack.disabled = !selectEsc; }
navBack.addEventListener("click", () => { if (selectEsc) selectEsc(); });
navRefresh.addEventListener("click", () => { replayLogo(); renderSelect(); });
const menu = document.getElementById("menu");

async function api(path, opts) { return (await fetch(path, opts)).json(); }
function post(body) { return { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }; }
// On load the page may be seeded in browse mode (a `alix browse --serve` launch):
// the state then carries the browse phase + cards, so open the overlay directly.
function load() { api("/api/state").then(s => { if (s.phase === "browse") { browsing = { cards: s.cards, label: s.label, i: 0 }; state = s; render(); } else apply(s); }); }
function grade(g)  { api("/api/grade", post({ grade: g })).then(apply); }
function skip()    { api("/api/skip", post({})).then(apply); }
function acquire() { api("/api/acquire", post({})).then(apply); }
function remove()  { api("/api/remove", post({})).then(apply); }
function promote() { api("/api/promote", post({})).then(apply); }
function restart() { api("/api/restart", post({})).then(apply); }
// A trace picked from the picker returns a WalkDto (kind "walk"); a fact deck
// returns a review StateDto (kind "review"). `isWalk` is the single place the two
// responses are told apart — by the `kind` tag, not by sniffing phase values.
function isWalk(s) {
  return !!s && s.kind === "walk";
}

// `level` picks a session depth (Recognize/Recall/Reconstruct) explicitly;
// omitted, the server resolves the deck's own remembered last level.
function select(name, topology, region, level) {
  rememberLaunch(name);
  api("/api/select", post({ deck: name, topology: topology || null, region: region || null, level: level || null })).then(s => {
    if (isWalk(s)) {
      walkData = s;
      walkConfirmingLeave = false;
      render();
    } else {
      apply(s);
    }
  });
}
// Remember the deck just launched so the picker re-lands the cursor on it when it
// re-opens (the selection shouldn't move while the user is away). Survives both an
// in-page return (review/exam/browse) and a page-reload return (walk).
function rememberLaunch(name) { if (name) sessionStorage.setItem("alix.lastDeck", name); }
// Browse a deck read-only: the server builds the card list and returns it; open
// the in-page browse overlay (no page nav). Leaving returns to the picker, which
// re-lands on this deck (rememberLaunch + lastWorkspace).
function browseDeck(it, wsName) {
  rememberLaunch(it.name);
  lastWorkspace = wsName || null;
  api("/api/browse", post({ deck: it.name })).then(d => { browsing = { cards: d.cards, label: d.label, i: 0 }; render(); });
}
function closeBrowse() { browsing = null; api("/api/deselect", post({})).then(apply); }
function browseGo(delta) { if (!browsing) return; const n = browsing.i + delta; if (n >= 0 && n < browsing.cards.length) { browsing.i = n; render(); } }
function deselect() { confirmingLeave = false; menu.classList.remove("open"); api("/api/deselect", post({})).then(apply); }

// Returning to the picker mid-session abandons the cards still queued, so warn
// first; a finished session (or the select phase) leaves straight away.
function leaveSession() {
  if (!state || state.phase !== "review") { deselect(); return; }
  confirmingLeave = true;
  renderLeaveConfirm();
}
function cancelLeave() { confirmingLeave = false; render(); }
function renderLeaveConfirm() {
  legend.innerHTML = "";
  legend.appendChild(el("span", "leave-msg", `Session not finished — ${state.remaining} card${state.remaining === 1 ? "" : "s"} left.`));
  chip("Leave anyway", "again", deselect, "enter");
  chip("Stay", "primary", cancelLeave, "esc");
}

function apply(s) { state = s; revealed = 0; citationView = false; feedback = null; explainInput = ""; marks = []; kpCur = 0; drawStrokes = []; drawSnapshot = null; drawTool = "pen"; drawCanvasEl = null; typelineChecked = []; render(); }
function hasKeypoints() { return isExplain() && state.keypoints && state.keypoints.length > 0; }
// A never-seen card: an attempt then reveal, acknowledged with one key (not graded).
function isAcquire() { return !!(state && state.acquire); }
// First encounter as a recognition question (strictly-augmented atomic card).
function isAcquireChoice() { return isAcquire() && !!state.choices; }
function isChoice() { return state.mode === "choice" && state.choices; }
function isInput() { return state.mode === "typing"; }
function isTypeLine() { return state.mode === "typeline"; }
function isExplain() { return state.mode === "explain"; }
// A genuine Recognize-session MC pick (never true for the acquire on-ramp,
// which shows its own recognition question regardless of level).
function isRecognizeMc() { return !isAcquire() && isChoice(); }
// The Recognize fallback: the session is Recognize but no MC could be built
// (too few distractors) — attempt→reveal with a plain Knew-it/Not-yet call,
// not the generic three-way grade.
function isRecognizeFallback() { return !isAcquire() && state.level === "recognize" && !state.choices; }
// Draw is effective when the card is authored draw-only OR the per-device toggle
// is on — but only for the self-graded modes L1 supports, and never while acquiring.
function effectiveDraw() {
  if (!state || !state.card) return false;
  if (state.card.context && state.card.context.length) return false; // cloze cards don't draw in L1 (a mode-less cloze resolves to flip)
  if (state.mode !== "flip" && state.mode !== "explain") return false;
  return state.input === "draw" || drawToggle;
}
// The badge names the check you're doing *right now* ("flip"/"line"/"typing"/
// "explain"/"choice") so how you interact is clear up front, prefixed with provenance
// ("new" / "remediation") when it applies. Crucially it badges the *present*
// interaction, not the scheduled one: whenever choices are on screen — a recognition
// MC on a first encounter, or choice mode — it's a pick-one, so show "choice", never
// the "flip" the card's schedule will use once acquired.
function modeLabel() {
  const kind = state.promotable ? "remediation" : isAcquire() ? "new" : "";
  const check = state.choices ? "choice" : state.mode === "typeline" ? "typing · line" : state.mode;
  return kind ? kind + " · " + check : check;
}
// A pick's result is pure evidence (the grade is separate, via /api/grade).
// The acquire on-ramp always shows its feedback (ungraded — any pick just
// leads to "Seen"). A genuine Recognize pick is quieter: a wrong one demotes
// itself at once (no feedback screen, no manual Continue) and a correct one
// pauses on "Next" / the quiet "I guessed" override.
function choose(i) {
  api("/api/choose", post({ index: i })).then(f => {
    if (!isAcquire() && isChoice() && !f.passed) { grade("failed"); return; }
    feedback = f;
    render();
  });
}
function submitCheck() {
  const lines = Array.from(document.querySelectorAll("#ansRegion input.field")).map(i => i.value);
  api("/api/check", post({ lines })).then(f => { feedback = f; render(); });
}
// TypeLine: one line at a time, ordered so position pairs with the card's own
// line index. Resubmits every line checked so far (the previously-graded
// inputs plus the new one) so the server always pairs by true position; the
// last request's response IS the full result set, so once it covers every
// back line it doubles as `feedback` for the closing three-way grade.
function submitTypeLine(value) {
  const lines = typelineChecked.map(r => r.input).concat([value]);
  api("/api/check", post({ lines, ordered: true })).then(f => {
    typelineChecked = f.results;
    if (typelineChecked.length >= backCount()) feedback = f;
    render();
  });
}
// The "Check" legend chip and the field's own Enter both submit the current
// (next-unchecked) line's typed value.
function submitCurrentTypeLine() {
  const inp = document.querySelector("#ansRegion input.field");
  submitTypeLine(inp ? inp.value : "");
}

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
}
// The drawer's open/close height animation: quick.
const DRAWER_MS = 170;
const DRAWER_EASE = "cubic-bezier(0.4, 0, 0.2, 1)";
function backCount() { return state.card ? state.card.back.length : 0; }
function fullyRevealed() { return backCount() === 0 || revealed >= backCount(); }

// Does a keydown match one of a binding list (from the config)?
function hit(e, binds) {
  return (binds || []).some(b => b.ctrl === e.ctrlKey && e.key.toLowerCase() === b.k.toLowerCase());
}
// A short label for the first binding of an action, for the chip key-hints.
function label(binds) {
  if (!binds || !binds.length) return "";
  const b = binds[0];
  const name = b.k === " " ? "space" : b.k === "Enter" ? "enter"
    : b.k === "Escape" ? "esc" : b.k === "Backspace" ? "bksp" : b.k;
  return (b.ctrl ? "ctrl-" : "") + name;
}

// While the summary is showing, a card the user missed may cool back into
// due-ness. Poll /api/state (which re-checks server-side) so it re-enters review
// on its own — no manual restart. Only re-renders when a card actually returns,
// so the summary doesn't re-animate on every tick.
function stopDuePoll() { if (duePoll) { clearInterval(duePoll); duePoll = null; } }
function startDuePoll() {
  if (duePoll) return;
  duePoll = setInterval(() => {
    api("/api/state").then(s => {
      if (s.phase === "review" && s.card) { stopDuePoll(); apply(s); }
    }).catch(() => {});
  }, 3000);
}

function render() {
  stopDuePoll();
  stage.innerHTML = "";
  legend.innerHTML = "";
  menu.classList.remove("open");

  if (examData) { renderExam(); return; }
  if (augmentData) { renderAugment(); return; }
  if (walkData) { renderWalk(); return; }
  if (browsing) { renderBrowse(); return; }
  if (state.phase === "select") { renderSelect(); return; }

  headerBreadcrumb();
  deckEl.textContent = state.label;
  histEl.textContent = ""; // no per-review readout in the header — it's noise
  scoreEl.innerHTML = `<b>${state.passed}✓</b> <s>${state.failed}✗</s><span class="left">${state.remaining}↓</span>`;
  menuWrap.style.display = state.phase === "done" ? "none" : "";
  setMenuContext("review");

  if (asking) { renderAsk(); return; }
  if (state.phase === "done") { renderSummary(); startDuePoll(); }
  else renderCard();
}

// ── ask Claude ────────────────────────────────────────────────────────
// Available once a card is answered. Sends run the CLI on the server; we poll
// /api/ask while it's thinking. One conversation spans the session.
function isAnswered() {
  if (!state || state.phase !== "review" || !state.card) return false;
  if (feedback) return true;
  return !isChoice() && !isInput() && fullyRevealed();
}
function openAsk() {
  asking = true;
  render(); // builds the panel once (entrance animation runs once)
  const ep = walkData ? "/api/walk/ask" : "/api/ask";
  api(ep).then(d => { askData = d; if (asking) syncAsk(); }); // pick up any prior transcript
}
function closeAsk() {
  asking = false;
  stopAskPoll();
  if (walkData) {
    // Re-pull the walk state (a saved note may have landed on a checkpoint).
    api("/api/walk").then(d => { walkData = d; render(); }).catch(render);
  } else {
    // A note saved during the chat now lives on the server's card; re-pull the
    // state so it shows on return without a manual reload. Keep the reveal
    // position (`revealed`/`feedback` are client-side and the card can't change
    // while the modal ask panel is open), so we don't reset the card to its front.
    api("/api/state").then(s => { state = s; render(); }).catch(render);
  }
}
function sendAsk(text) {
  const q = (text || "").trim();
  if (!q || askData.thinking) return;
  const ta = document.querySelector(".ask-input");
  if (ta) ta.value = ""; // the textarea persists across syncAsk; clear the sent question
  const ep = walkData ? "/api/walk/ask" : "/api/ask";
  api(ep, post({ question: q })).then(d => { askData = d; if (asking) syncAsk(); startAskPoll(); });
}
function saveAskNote() {
  if (askData.thinking || !askData.transcript.length) return;
  const ep = walkData ? "/api/walk/ask/note" : "/api/ask/note";
  api(ep, post({})).then(d => { askData = d; if (asking) syncAsk(); startAskPoll(); });
}
// Loop the header logo while any Claude/server call is in flight — a calm loader
// that complements the inline spinners; rest it otherwise.
function updateBusy() {
  var logo = document.querySelector(".brand alix-logo");
  if (logo) logo.toggleAttribute("loop", !!(askPoll || examPoll));
}
// Replay the header logo's reveal once — the reload button and the `r` key.
function replayLogo() {
  var logo = document.querySelector(".brand alix-logo");
  if (logo && logo.replay) logo.replay();
}
// Render the dependency-tree prefix as CSS-drawn guides instead of box-drawing
// glyphs. The prefix is 3-char groups ("│  "/"   " ancestors, "├─ "/"└─ " branch);
// each group becomes a fixed-width cell whose CSS vertical extends past the row gap,
// so adjacent rows' verticals connect into continuous lines (glyphs can't span it).
function treeGuides(prefix) {
  const box = el("span", "tree");
  for (let i = 0; i + 3 <= prefix.length; i += 3) {
    const c = prefix[i];
    const cls = c === "│" ? "line" : c === "├" ? "tee" : c === "└" ? "ell" : "empty";
    box.appendChild(el("span", "guide " + cls));
  }
  return box;
}
function startAskPoll() {
  stopAskPoll();
  askPoll = setInterval(() => {
    const ep = walkData ? "/api/walk/ask" : "/api/ask";
    api(ep).then(d => { askData = d; if (!d.thinking) stopAskPoll(); if (asking) syncAsk(); });
  }, 400);
  updateBusy();
}
function stopAskPoll() { if (askPoll) { clearInterval(askPoll); askPoll = null; } updateBusy(); }

// (Re)fill just the transcript log from askData.
function fillAskLog(log) {
  log.innerHTML = "";
  for (const ex of askData.transcript) {
    log.appendChild(el("div", "ask-q", ex.q));
    log.appendChild(el("div", "ask-a", ex.a));
  }
  if (askData.thinking) log.appendChild(el("div", "ask-thinking", "Thinking…"));
  if (askData.status) log.appendChild(el("div", "ask-status", askData.status));
  if (askData.error) log.appendChild(el("div", "ask-error", askData.error));
  if (!askData.transcript.length && !askData.thinking && !askData.status && !askData.error)
    log.appendChild(el("div", "ask-hint", walkData ? "Ask the tutor about this step." : "Ask the tutor about this card."));
  // Keep the newest exchange in view; the card + conversation scroll together
  // now (the card sticks), so scroll their shared container, not just the log.
  const sc = log.closest(".ask-scroll") || log;
  sc.scrollTop = sc.scrollHeight;
}

// Update the open panel in place — no rebuild, so the entrance animation
// doesn't re-run while we poll and the textarea keeps its focus/value.
function syncAsk() {
  const wrap = document.querySelector(".ask");
  if (!wrap) { render(); return; }
  fillAskLog(wrap.querySelector(".ask-log"));
  const input = wrap.querySelector(".ask-input");
  if (input) {
    input.disabled = askData.thinking;
    // Once Claude's reply lands, focus the box so a follow-up can be typed
    // immediately (the poll stops here, so this fires once per answer).
    if (!askData.thinking) input.focus();
  }
  const send = legend.querySelector(".chip.primary");
  if (send) send.disabled = askData.thinking;
}

// `subject` is optional: null = use the current review card; an object with
// {q, items} = walk checkpoint header (prompt as q, key points as items).
function renderAsk(subject) {
  const wrap = el("div", "ask");
  // Which model is answering (and its effort). The tutor uses the CLI default
  // unless `[ask]` pins one — not the stronger model that built the deck.
  wrap.appendChild(el("div", "ask-model", `claude · model: ${askInfo.model} · effort: ${askInfo.effort}`));

  // The card/checkpoint and the conversation share one scroll region: the subject
  // sticks to the top as a reference while Claude's conversation scrolls under it.
  const scroll = el("div", "ask-scroll");
  if (subject) {
    // Walk: show the checkpoint prompt + key points.
    const ref = el("div", "ask-card");
    ref.appendChild(el("div", "ask-card-q", subject.q));
    for (const item of subject.items || []) ref.appendChild(el("div", "ask-card-a", "▸ " + item));
    scroll.appendChild(ref);
  } else {
    // Review: show the current card's front + answer lines.
    const c = state.card;
    if (c) {
      const ref = el("div", "ask-card");
      ref.appendChild(el("div", "ask-card-q", c.front));
      for (const ctx of c.context || []) ref.appendChild(el("div", "ask-card-ctx", ctx));
      for (const b of c.back) ref.appendChild(el("div", "ask-card-a", b));
      scroll.appendChild(ref);
    }
  }
  const log = el("div", "ask-log");
  fillAskLog(log);
  scroll.appendChild(log);
  wrap.appendChild(scroll);

  const input = el("textarea", "ask-input");
  input.placeholder = subject ? "Ask about this step… (Shift+Enter to send)" : "Ask about this card… (Shift+Enter to send)";
  input.rows = 2;
  input.disabled = askData.thinking;
  input.addEventListener("keydown", e => {
    // Enter inserts a newline (compose freely); Shift+Enter sends.
    if (e.key === "Enter" && e.shiftKey) { e.preventDefault(); sendAsk(input.value); }
  });
  wrap.appendChild(input);
  stage.appendChild(wrap);

  legend.innerHTML = "";
  const send = chip("Send", "primary", () => sendAsk(input.value), "shift+enter");
  send.disabled = askData.thinking;
  chip("Save note", "", saveAskNote, label(KEYS.save_note));
  chip("Close", "", closeAsk, "esc");
  if (!askData.thinking) input.focus();
}

// ── AI exam ───────────────────────────────────────────────────────────
// A self-contained overlay (like ask): the server runs the three Claude calls
// on a background thread and we poll /api/exam while `thinking`. Answers are
// entered one question at a time; grading is a single batch call.
function startExam(deck) {
  rememberLaunch(deck);
  api("/api/exam/start", post({ deck })).then(d => {
    // A trace exam cooling down after a recent fail replies with the remaining
    // time instead of a sitting — re-walk and re-sit later.
    if (d && d.cooldown_ms != null) {
      const mins = Math.max(1, Math.round(d.cooldown_ms / 60000));
      alert("This trace exam is cooling down after a recent fail.\nRe-walk it and try again in about " + mins + " min.");
      return;
    }
    if (d && d.phase) { examData = d; render(); if (d.thinking) startExamPoll(); }
  });
}
function closeExam() {
  examConfirmingQuit = false;
  stopExamPoll();
  api("/api/exam/close", post({})).then(s => { examData = null; apply(s); });
}

// The answering-phase footer buttons — re-rendered on their own when the quit
// confirmation is dismissed, so the textarea keeps the answer you typed.
function examAnswerButtons(d) {
  legend.innerHTML = "";
  if (d.current > 0) chip("Back", "", () => examNav(d.current - 1));
  if (d.on_last) chip("Submit for grading", "primary", examSubmit, "shift+enter");
  else chip("Next", "primary", () => examNav(d.current + 1), "shift+enter");
  chip("Quit", "", quitExam, "esc");
}
// Leaving mid-answer abandons the exam, so confirm first — exactly like leaving
// a review session. Other phases (results/error/generating) just close.
function quitExam() {
  if (!examData || examData.phase !== "answering") { closeExam(); return; }
  examConfirmingQuit = true;
  legend.innerHTML = "";
  legend.appendChild(el("span", "leave-msg", "Quit the exam? Your answers won't be graded."));
  chip("Quit anyway", "again", closeExam, "enter");
  chip("Keep going", "primary", cancelExamQuit, "esc");
}
function cancelExamQuit() { examConfirmingQuit = false; if (examData) examAnswerButtons(examData); }
function startExamPoll() {
  stopExamPoll();
  examPoll = setInterval(() => {
    api("/api/exam").then(d => {
      // Only re-render when something visible changed; otherwise the spinner's
      // entrance animation would re-run on every poll (flicker).
      const prev = examData;
      examData = d;
      if (!d.thinking) stopExamPoll();
      if (!prev || prev.phase !== d.phase || prev.error !== d.error) render();
      else if (d.thinking) {
        // Tick the elapsed counter in place — a full re-render would restart the
        // entrance animation (flicker).
        const e = document.querySelector(".exam-elapsed");
        if (e) { e.innerHTML = ""; e.appendChild(el("span", "dot"));
                 e.appendChild(document.createTextNode(examElapsedText(d))); }
      }
    });
  }, 600);
  updateBusy();
}
function stopExamPoll() { if (examPoll) { clearInterval(examPoll); examPoll = null; } updateBusy(); }
// Progress line under the spinner: a live "Claude is working" counter — the only
// honest signal we get from a `claude -p` call that streams no token-level state.
function examElapsedText(d) {
  const s = d.elapsed || 0;
  if (s < 2) return "Claude is working…";
  if (s < 90) return `Claude is working… ${s}s`;
  return `Claude is working… ${Math.floor(s / 60)}m ${s % 60}s — this can take a couple of minutes`;
}
// Save the current answer, then move to question `goto`.
function examNav(goto) {
  const ta = document.querySelector(".exam-input");
  api("/api/exam/answer", post({ text: ta ? ta.value : "", goto })).then(d => { examData = d; render(); });
}
// Save the last answer and submit all answers for grading.
function examSubmit() {
  const ta = document.querySelector(".exam-input");
  api("/api/exam/grade", post({ text: ta ? ta.value : "" })).then(d => {
    examData = d; render(); if (d.thinking) startExamPoll();
  });
}
function examRemediate() {
  api("/api/exam/remediate", post({})).then(d => { examData = d; render(); if (d.thinking) startExamPoll(); });
}

function renderExam() {
  const d = examData;
  headerBreadcrumb();
  deckEl.textContent = "exam · " + d.deck;
  histEl.textContent = d.strictness;
  scoreEl.innerHTML = "";
  menuWrap.style.display = "none";
  const wrap = el("div", "exam");
  // A failed Claude call surfaces a prominent banner up top, so it's never
  // mistaken for "nothing happened" (the result/grades may scroll below it).
  if (d.error) wrap.appendChild(el("div", "exam-error", "⚠ " + d.error));

  if (d.phase === "generating" || d.phase === "grading" || d.phase === "remediating") {
    const msg = { generating: "Preparing your exam…", grading: "Grading your answers…",
                  remediating: "Writing remediation cards…" }[d.phase];
    wrap.appendChild(el("div", "exam-wait", msg));
    const prog = el("div", "exam-elapsed");
    prog.appendChild(el("span", "dot"));
    prog.appendChild(document.createTextNode(examElapsedText(d)));
    wrap.appendChild(prog);
    stage.appendChild(wrap);
    if (d.error || d.phase === "generating") chip("Close", "", closeExam, "esc");
    return;
  }

  if (d.phase === "answering") {
    wrap.appendChild(el("div", "exam-progress", `Question ${d.current + 1} / ${d.total}`));
    wrap.appendChild(el("div", "exam-q", d.question || ""));
    const ta = el("textarea", "exam-input");
    ta.placeholder = "Type your answer… (Shift+Enter to continue)";
    ta.value = d.answer || "";
    ta.rows = 6;
    // Enter inserts a newline; Shift+Enter takes the primary action — advance,
    // or submit on the last question — matching the ask box.
    ta.addEventListener("keydown", e => {
      // Inert while the quit confirmation is up (Enter/Esc answer that instead).
      if (e.key === "Enter" && e.shiftKey && !examConfirmingQuit) {
        e.preventDefault();
        if (examData.on_last) examSubmit(); else examNav(examData.current + 1);
      }
    });
    wrap.appendChild(ta);
    stage.appendChild(wrap);
    ta.focus();
    examAnswerButtons(d);
    return;
  }

  if (d.phase === "results") {
    wrap.appendChild(el("div", d.passed ? "exam-pass" : "exam-fail",
      d.passed ? "PASSED — deck mastered ✓" : "FAILED"));
    if (d.passed && d.unlocks.length)
      wrap.appendChild(el("div", "exam-unlocks", "Unlocks: " + d.unlocks.join(", ")));
    d.grades.forEach((g, i) => {
      const q = el("div", "exam-result");
      q.appendChild(el("div", "exam-rq", `Q${i + 1}. ${g.question}`));
      q.appendChild(el("div", "exam-verdict v-" + g.verdict.toLowerCase(), `${g.verdict} — ${g.feedback}`));
      if (g.verdict !== "PASS") {
        if (g.points.length) {
          q.appendChild(el("div", "exam-label", "A complete answer covers:"));
          const ul = el("ul", "exam-points");
          g.points.forEach(p => ul.appendChild(el("li", null, p)));
          q.appendChild(ul);
        }
        if (g.missed.length) {
          q.appendChild(el("div", "exam-label", "You missed:"));
          const ul = el("ul", "exam-missed");
          g.missed.forEach(m => ul.appendChild(el("li", null, m)));
          q.appendChild(ul);
        }
      }
      wrap.appendChild(q);
    });
    // A failed trace exam is re-walked (no card remediation — a trace is a path,
    // not a card pile); a failed fact exam can turn its gaps into cards.
    if (!d.passed && d.is_trace)
      wrap.appendChild(el("div", "exam-wait", "Re-walk the trace to strengthen the weak hops, then re-sit."));
    stage.appendChild(wrap);
    if (!d.passed && d.can_remediate)
      chip(d.error ? "Try remediation again" : "Add remediation cards", "primary", examRemediate);
    chip("Close", "", closeExam, "esc");
    return;
  }

  if (d.phase === "remediated") {
    const n = d.remediated_count || 0;
    const headline = n === 0
      ? "No new remediation cards needed ✓"
      : `Created ${n} remediation card${n === 1 ? "" : "s"} ✓`;
    wrap.appendChild(el("div", "exam-pass", headline));
    wrap.appendChild(el("div", "exam-wait", "Re-drill the deck, then re-sit the exam."));
    stage.appendChild(wrap);
    chip("Close", "", closeExam, "esc");
    return;
  }
}

// ── AI augment (the picker's "Augment a" action, decks only) ────────────────
// Reports what a deck's augmentation cache holds, fills the gaps (a costed
// background call, polled like the exam), and removes. Generation is one job at
// a time; the page polls /api/augment while it runs.
function openAugment(deck) {
  rememberLaunch(deck);
  api("/api/augment/open", post({ deck })).then(d => {
    if (d && d.rows) { augmentData = d; render(); }
  });
}
function closeAugment() {
  stopAugmentPoll();
  api("/api/augment/close", post({})).then(s => { augmentData = null; apply(s); });
}
// The shared guidance box's text, read when a Generate/Add is clicked.
function augGuidance() {
  const i = document.querySelector(".aug-guide-input");
  return i ? i.value.trim() : "";
}
function augmentGenerate(target, guidance) {
  if (augmentData.busy) return;
  api("/api/augment/generate", post({ target, with: guidance || null })).then(d => {
    augmentData = d; render(); if (d.busy) startAugmentPoll();
  });
}
function augmentRemove(target, topology) {
  api("/api/augment/remove", post({ target, topology: topology || null }))
    .then(d => { augmentData = d; render(); });
}
function startAugmentPoll() {
  stopAugmentPoll();
  augmentPoll = setInterval(() => {
    api("/api/augment").then(d => {
      const prev = augmentData;
      augmentData = d;
      if (!d.busy) stopAugmentPoll();
      // Re-render when the in-flight state changed (a job started or finished, so
      // the coverage bars move); otherwise tick the elapsed counter in place so
      // the spinner's entrance animation doesn't restart (flicker).
      if (!prev || prev.busy !== d.busy || prev.error !== d.error) render();
      else {
        const e = document.querySelector(".exam-elapsed");
        if (e) { e.innerHTML = ""; e.appendChild(el("span", "dot"));
                 e.appendChild(document.createTextNode(augElapsedText(d))); }
      }
    });
  }, 600);
}
function stopAugmentPoll() { if (augmentPoll) { clearInterval(augmentPoll); augmentPoll = null; } }
function augElapsedText(d) {
  const s = d.elapsed || 0;
  if (s < 2) return "Claude is working…";
  if (s < 90) return `Claude is working… ${s}s`;
  return `Claude is working… ${Math.floor(s / 60)}m ${s % 60}s — this can take a couple of minutes`;
}
// The in-flight spinner cell (reuses the exam's pulsing dot + elapsed styling).
function augBusyCell(d) {
  const sp = el("span", "exam-elapsed");
  sp.appendChild(el("span", "dot"));
  sp.appendChild(document.createTextNode(augElapsedText(d)));
  return sp;
}
// A per-card target row: a coverage bar + Generate (fills the gap) and Remove.
function augCardRow(d, row) {
  const r = el("div", "aug-row");
  r.appendChild(el("span", "aug-label", row.label));
  const bar = el("span", "aug-bar");
  const fill = el("i");
  const frac = row.eligible ? row.covered / row.eligible : 0;
  fill.style.width = Math.round(frac * 100) + "%";
  const full = row.eligible && row.covered >= row.eligible;
  if (full) fill.className = "full";
  bar.appendChild(fill);
  r.appendChild(bar);
  r.appendChild(el("span", "aug-count", row.covered + "/" + row.eligible));
  const actions = el("span", "aug-actions");
  if (row.busy) actions.appendChild(augBusyCell(d));
  else {
    const gen = el("button", "aug-btn", full ? "Complete" : "Generate");
    gen.disabled = !!d.busy || !row.eligible || !!full;
    gen.addEventListener("click", () => augmentGenerate(row.kind, augGuidance()));
    actions.appendChild(gen);
    if (row.covered > 0) {
      const rm = el("button", "aug-btn ghost", "Remove");
      rm.disabled = !!d.busy;
      rm.addEventListener("click", () => augmentRemove(row.kind, null));
      actions.appendChild(rm);
    }
  }
  r.appendChild(actions);
  return r;
}
// The topology row: its named topologies (each removable) + Add (uses guidance).
function augTopologyRow(d, row) {
  const r = el("div", "aug-row aug-row-topo");
  r.appendChild(el("span", "aug-label", row.label));
  const list = el("span", "aug-topos");
  if (!row.items.length) list.appendChild(el("span", "aug-none", "none yet"));
  for (const name of row.items) {
    const pill = el("span", "aug-topo");
    pill.appendChild(el("span", null, name));
    if (!d.busy) {
      const x = el("button", "aug-x", "✕");
      x.title = "Remove this topology";
      x.addEventListener("click", () => augmentRemove("topology", name));
      pill.appendChild(x);
    }
    list.appendChild(pill);
  }
  r.appendChild(list);
  const actions = el("span", "aug-actions");
  if (row.busy) actions.appendChild(augBusyCell(d));
  else {
    const add = el("button", "aug-btn", "Add");
    add.disabled = !!d.busy;
    add.addEventListener("click", () => augmentGenerate("topology", augGuidance()));
    actions.appendChild(add);
  }
  r.appendChild(actions);
  return r;
}
function renderAugment() {
  const d = augmentData;
  headerBreadcrumb();
  deckEl.textContent = "augment · " + d.deck;
  histEl.textContent = d.cards + (d.cards === 1 ? " card" : " cards");
  scoreEl.innerHTML = "";
  menuWrap.style.display = "none";
  const wrap = el("div", "aug");
  if (d.error) wrap.appendChild(el("div", "exam-error", "⚠ " + d.error));
  for (const row of d.rows)
    wrap.appendChild(row.kind === "topology" ? augTopologyRow(d, row) : augCardRow(d, row));
  const foot = el("div", "aug-foot");
  const gi = el("input", "aug-guide-input");
  gi.type = "text";
  gi.placeholder = "Guidance for generation (optional) — e.g. use common misconceptions";
  // Backspace edits the guidance, it doesn't leave the view (like the picker filter).
  gi.addEventListener("keydown", (e) => { if (e.key === "Backspace") e.stopPropagation(); });
  foot.appendChild(gi);
  foot.appendChild(el("div", "aug-cost",
    "Generating runs Claude and costs tokens. It fills only the cards a target is missing."));
  wrap.appendChild(foot);
  stage.appendChild(wrap);
  // Footer: "remove everything" sits behind a confirm; Close exits to the picker.
  legend.innerHTML = "";
  const rmAll = chip("Remove all", "", () => {
    if (confirm("Remove every augmentation for this deck?")) augmentRemove("all");
  });
  rmAll.disabled = !!d.busy;
  chip("Close", "", closeAugment, "esc");
}

// The deck-selection screen, mirroring the terminal picker. Three sections —
// Workspaces (each with its last-progress time), Recent loose decks, and
// Folders — and single-launch: click a deck to start it (a trace walks, a deck
// reviews, an exam-due deck sits its exam) or open a workspace/folder to drill
// into its unlock dependency tree. 🔒 exam locked (still drillable) · 🕒 nothing due ·
// mastered 🎉 decks live in the Mastered window (m). The filter searches every
// loose deck.
async function renderSelect() {
  deckEl.textContent = "";
  histEl.textContent = "";
  scoreEl.innerHTML = "";
  menuWrap.style.display = "";
  setMenuContext("picker");
  // Drop cached topology heatmaps so the drawer reflects progress from any
  // session just finished (the strengths are recomputed on next focus).
  topoCache = {};

  const data = await api("/api/decks");
  const workspaces = data.workspaces || [];
  const recent = data.recent || [];
  const folders = data.folders || [];
  if (!workspaces.length && !recent.length && !folders.length) {
    const wrap = el("div", "select");
    wrap.appendChild(el("div", "lede", "choose decks to study"));
    wrap.appendChild(el("div", "msg", "No decks found. Add .txt decks to your decks folder."));
    stage.appendChild(wrap);
    return;
  }

  // Every mastered (exam-passed) deck across the catalog, for the m window.
  const mastered = recent.filter(d => d.mastered);
  for (const g of workspaces.concat(folders)) for (const m of g.members) if (m.mastered) mastered.push(m);

  // Can a row be started now, at *any* level? Drilling is never gated by the
  // prerequisite lock (only the exam is — an exam-locked deck's `examable` is
  // false), so a gated view refuses only a deck with nothing due at any level.
  // `reviewable` already folds in the trace/exam-due special cases alongside
  // the per-level due-ness, so this reads as "any level (or the trace/exam)
  // is startable" — the gate for the ▾ split button. The Mastered window is
  // ungated — a finished deck can be reopened to cram or re-examine.
  const canStart = (it, gated) => it.reviewable || !gated;

  // Maps a level name to its own due-ness field (`picker::DeckStatus`'s
  // per-level split), so each level chip — and the plain Learn button, which
  // targets the deck's own last-used level — gates on its own honest signal
  // rather than "any level" (recall-settled must not enable a Recall chip
  // just because Reconstruct is due).
  const LEVELS = ["recognize", "recall", "reconstruct"]; // menu/keys order — 1/2/3
  const LEVEL_FIELD = { recognize: "reviewable_recognize", recall: "reviewable_recall", reconstruct: "reviewable_reconstruct" };
  const canStartAt = (it, gated, level) => it[LEVEL_FIELD[level]] || !gated;

  // Rows that carry the level split (the Learn ▾ chip and its v key): a deck —
  // not a workspace/folder — that isn't exam-primary, has a remembered level,
  // and isn't a trace (walked, not leveled).
  const hasLevelSplit = (row) => !!(row && row._item && !row._open
    && row._item.state !== "examdue" && row._item.last_level && !row._item.is_trace);

  // The plain Learn/primary button's gate: a trace always walks and an
  // exam-due deck's primary is its exam (both non-level, via `canStart`);
  // otherwise it reviews at the deck's own last-used level.
  const canStartPrimary = (it, gated) =>
    (it.is_trace || it.state === "examdue") ? canStart(it, gated) : canStartAt(it, gated, it.last_level);

  // Launch one deck/member. An exam-due deck sits its exam; a trace will walk
  // once the web hosts walks (for now it reviews its explain cards — the single
  // place to change). Launching inside a workspace remembers it so leaving the
  // session returns here.
  function launch(it, wsName, gated) {
    if (!canStartPrimary(it, gated)) return;
    lastWorkspace = wsName || null;
    // A trace's primary action is always the WALK (its exam is reached via the
    // "Take exam" button, or the walk's capstone). An exam-due fact deck sits its
    // exam when available (sourced + prerequisites passed); else it reviews.
    if (!it.is_trace && it.state === "examdue" && it.examable) startExam(it.name);
    else {
      // Apply the focus drawer's topology/region pick, but only when it belongs
      // to the deck being launched (the drawer follows the focused row).
      const sel = drawerSel.deck === it.name ? drawerSel : {};
      select(it.name, sel.topology, sel.region);
    }
  }

  // Launch at an explicit level (from the split Learn button's ▾ menu), same
  // drawer-scope rules as `launch`, but never routes to the exam — picking a
  // level always means "review", gated on that level's own due-ness.
  function launchLevel(it, wsName, gated, level) {
    if (!canStartAt(it, gated, level)) return;
    lastWorkspace = wsName || null;
    const sel = drawerSel.deck === it.name ? drawerSel : {};
    select(it.name, sel.topology, sel.region, level);
  }

  // The workspace's emblem if it has one, else the chevron. An SVG renders as a
  // theme-tinted mask (so it follows the active theme); a raster renders as-is.
  function rowIcon(grp) {
    if (grp.icon) {
      if (grp.icon_svg) {
        const span = el("span", "icon mask");
        span.style.webkitMaskImage = `url("${grp.icon}")`;
        span.style.maskImage = `url("${grp.icon}")`;
        return span;
      }
      const img = document.createElement("img");
      img.className = "icon";
      img.src = grp.icon;
      img.alt = "";
      return img;
    }
    return el("span", "open", "›");
  }

  // A drillable workspace/folder row (icon/chevron, opens its members).
  function openRow(grp) {
    const row = el("div", "deckrow");
    row.tabIndex = 0;
    row.appendChild(rowIcon(grp));
    // A workspace's description (its goal) sits dim under the title.
    const text = el("div", "rowtext");
    text.appendChild(el("span", "name", grp.label || grp.name));
    if (grp.description) text.appendChild(el("span", "desc", grp.description));
    row.appendChild(text);
    if (grp.path) row.appendChild(el("span", "loc", grp.path));
    if (grp.meta) row.appendChild(el("span", "meta", grp.meta));
    row.addEventListener("click", () => renderDrill(grp));
    row._open = grp;
    row._search = (grp.label || grp.name).toLowerCase();
    row._default = true;
    return row;
  }

  // A single deck/member row. `gated` toggles the nothing-due gate; `wsName` is
  // the workspace to return into; `dflt` whether it shows before any filter;
  // `showKind` tags a trace (only in a drill-in, like the TUI — Recent omits it).
  function deckRow(it, gated, wsName, dflt, showKind) {
    // Drilling is never blocked by the lock, so dim only a deck with nothing to
    // launch (nothing due). A drillable locked deck stays bright but keeps 🔒.
    const dimmed = gated && !it.reviewable;
    const row = el("div", "deckrow" + (dimmed ? " dim" : ""));
    row.tabIndex = 0;
    // The dependency-tree branch prefix (├─/└─/│), drawn for workspace members
    // like the TUI; it provides the indentation, and is hidden while filtering
    // (a filtered subset is no longer a tree). An exam-locked deck has no row
    // glyph — the footer names the lock for the focused row.
    if (it.tree) row.appendChild(treeGuides(it.tree));
    row.appendChild(el("span", "name", it.label || it.name));
    if (showKind && it.is_trace) row.appendChild(el("span", "kind", "trace"));
    if (it.path) row.appendChild(el("span", "loc", it.path));
    // The highest level with a badge (solid border = currently solid, dashed =
    // earned but lapsed — subsumption, spec {#check-matrix}); `new` corner chip
    // when any card is fresh. Both absent on workspace/folder rows (no fields).
    if (it.badge_level) {
      const lvl = it.badge_level;
      const badge = el("span", "badge-level" + (it.badge_dotted ? " dotted" : ""), lvl[0].toUpperCase() + lvl.slice(1));
      badge.title = it.badge_dotted ? lvl + " badge earned, currently lapsed" : lvl + " badge, currently solid";
      row.appendChild(badge);
    }
    if (it.new_cards) row.appendChild(el("span", "badge-new", "new"));
    if (it.meta) row.appendChild(el("span", "meta state-" + it.state, it.meta));
    // 🕒 nothing due — at the line end with the status, so the left gutter stays
    // tree + title. (A finished deck shows its 🎉 in the badge instead.)
    if (gated && !it.reviewable && it.state !== "finished") row.appendChild(el("span", "glyph", "\u{1F552}"));
    // A quiet ▾ marks a deck with a focus drawer, so you can see at a glance which
    // rows expand on focus (rather than discovering it only after selecting).
    if (it.has_topology) {
      const hint = el("span", "drawer-hint", "▾");
      hint.title = "opens a focus drawer";
      row.appendChild(hint);
    }
    // Click selects (focuses) the deck — opening the focus drawer when it has a
    // topology — rather than launching outright; Review / Enter then launches.
    row.addEventListener("click", () => row.focus());
    row._item = it; row._gated = gated; row._wsName = wsName;
    row._search = (it.label || it.name).toLowerCase();
    row._default = dflt !== false;
    return row;
  }

  // Renders a sectioned list with a filter, focus-driven primary button, and
  // keyboard navigation. `sections` is [{ title, rows }] (title null = no
  // header). `gated` is informational; `back` (Esc/h) leaves the view;
  // `allowMastered` binds the m key + a chip to the Mastered window.
  function renderList(opts) {
    selectEsc = opts.back || null;
    updateNavBack();
    stage.innerHTML = ""; legend.innerHTML = "";
    let focusedEl = null;
    let drawerEl = null; // the focus drawer under the focused deck, if it has a topology
    let closingEl = null; // a drawer mid-close (animating out before removal)
    let drawerCycle = null; // (dir)=>{} to step the drawer's region selection, when open
    let levelMenuOpen = false; // the split Learn button's ▾ menu (Recognize/Recall/Reconstruct) is open

    const wrap = el("div", "select");
    if (opts.lede) wrap.appendChild(el("div", "lede", opts.lede));
    // A workspace drill-in shows its goal (description) under the eyebrow.
    if (opts.ledeDesc) wrap.appendChild(el("div", "lede-desc", opts.ledeDesc));
    let filter;
    if (opts.headerFilter) {
      // The picker's search and Mastered jump live in the header; no in-content box.
      headerSearch();
      filter = barFilter;
      filter.value = "";
      if (opts.allowMastered && mastered.length) {
        masteredBtn.style.display = "";
        masteredBtn.onclick = renderMastered;
      } else {
        masteredBtn.style.display = "none";
      }
    } else {
      headerNone();
      filter = el("input", "deck-filter");
      filter.type = "text"; filter.autocomplete = "off";
      wrap.appendChild(filter);
    }
    filter.placeholder = opts.filterPlaceholder || "Search  ·  / or Ctrl-F";

    const lists = el("div", "lists");
    const sectionEls = [];
    for (const sec of opts.sections) {
      const header = sec.title ? el("div", "section", sec.title) : null;
      if (header) lists.appendChild(header);
      for (const r of sec.rows) lists.appendChild(r);
      sectionEls.push({ header, rows: sec.rows });
    }
    const emptyHint = el("div", "empty-hint", "No decks match.");
    lists.appendChild(emptyHint);
    wrap.appendChild(lists);
    stage.appendChild(wrap);

    const visibleRows = () =>
      Array.from(lists.querySelectorAll(".deckrow")).filter(r => r.style.display !== "none");

    // The primary button reflects the focused row: Open a workspace/folder,
    // Start/Take exam a deck (disabled when locked or nothing due).
    function syncPrimary() {
      legend.innerHTML = "";
      const f = focusedEl;
      // The split Learn button's level menu: temporarily swaps the whole footer
      // for Recognize/Recall/Reconstruct + Cancel, focused row's own last-used
      // level highlighted as the primary. Closed by picking one, Cancel, or Esc.
      if (f && f._item && levelMenuOpen) {
        const it = f._item;
        // mousedown preventDefault keeps focus on the deck row (the kebab /
        // drawer-cell trick), so row nav and the menu's own Escape keep working
        // after any of these buttons is clicked — a click otherwise moves focus
        // onto a button syncPrimary() is about to destroy, stranding it on <body>.
        LEVELS.forEach((lvl, i) => {
          const b = el("button", "chip" + (lvl === it.last_level ? " primary" : ""), lvl[0].toUpperCase() + lvl.slice(1));
          b.appendChild(el("span", "k", String(i + 1)));
          b.disabled = !canStartAt(it, f._gated, lvl);
          b.addEventListener("mousedown", e => e.preventDefault());
          b.addEventListener("click", () => { levelMenuOpen = false; launchLevel(it, f._wsName, f._gated, lvl); });
          legend.appendChild(b);
        });
        const cancel = el("button", "chip", "Cancel");
        cancel.appendChild(el("span", "k", "esc"));
        cancel.addEventListener("mousedown", e => e.preventDefault());
        cancel.addEventListener("click", () => { levelMenuOpen = false; syncPrimary(); });
        legend.appendChild(cancel);
        return;
      }
      let primary;
      if (f && f._open) {
        primary = el("button", "chip primary", "Open");
        primary.appendChild(el("span", "k", "enter"));
        primary.addEventListener("click", () => renderDrill(f._open));
      } else if (f && f._item) {
        const it = f._item;
        const examPrimary = it.state === "examdue"; // a drilled deck's main action is its exam
        primary = el("button", "chip primary", examPrimary ? "Take exam" : "Learn");
        // A plain Learn subtly names the level it'll resume at (the deck's own
        // remembered last level); an exam-due deck's primary names its exam instead.
        // A trace has no level (it's walked, not leveled), so it never gets a tag.
        if (!examPrimary && it.last_level && !it.is_trace) primary.appendChild(el("span", "level-tag", " ·" + it.last_level));
        // Learn (facts → review, trace → walk) is Enter; an exam-due deck's
        // primary is its exam (also enter, or 🔒 when that exam is locked).
        primary.appendChild(el("span", "k", examPrimary && !it.examable ? "\u{1F512}" : "enter"));
        primary.disabled = !canStartPrimary(it, f._gated);
        primary.addEventListener("click", () => launch(it, f._wsName, f._gated));
      } else {
        primary = el("button", "chip primary", "Learn");
        primary.appendChild(el("span", "k", "enter"));
        primary.disabled = true;
      }
      legend.appendChild(primary);
      // The level split: a small ▾ beside a plain Learn opens the level menu
      // above (Recognize/Recall/Reconstruct); see `hasLevelSplit` for which
      // rows carry it.
      if (hasLevelSplit(f)) {
        const it = f._item;
        const lv = el("button", "chip split", "▾");
        lv.title = "choose a level";
        lv.appendChild(el("span", "k", "v"));
        lv.disabled = !canStart(it, f._gated);
        // Keep focus on the deck row (see the level menu above): the click
        // rebuilds the footer, which would otherwise strand focus on <body>.
        lv.addEventListener("mousedown", e => e.preventDefault());
        lv.addEventListener("click", () => { levelMenuOpen = true; syncPrimary(); });
        legend.appendChild(lv);
      }
      // A read-only Browse of the focused deck (key b).
      if (f && f._item) {
        const br = el("button", "chip", "Browse");
        br.appendChild(el("span", "k", "b"));
        br.addEventListener("click", () => browseDeck(f._item, f._wsName));
        legend.appendChild(br);
      }
      // Augment the focused deck (key a): add / remove AI augmentations.
      if (f && f._item) {
        const ag = el("button", "chip", "Augment");
        ag.appendChild(el("span", "k", "a"));
        ag.addEventListener("click", () => { lastWorkspace = f._wsName || null; openAugment(f._item.name); });
        legend.appendChild(ag);
      }
      // Back is the header ← nav button (and Esc/Backspace); no footer chip.
