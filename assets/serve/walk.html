<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>alix · trace</title>
<link rel="stylesheet" href="/theme.css">
<script>document.documentElement.dataset.theme=(function(){try{return localStorage.getItem("alix-theme")}catch(e){return null}})()||"dark";</script>
<style>
  :root {
    --card-w: min(92vw, 860px);
    --card-h: min(84vh, 700px);
    --pad: 30px;
  }
  * { box-sizing: border-box; }
  /* no scrollbars anywhere — overflow is signalled with edge fades, not bars */
  * { scrollbar-width: none; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  /* A blinking caret belongs only in a text input (the prediction box) or a
     text-based source (the code excerpt) — never on the card's prose, even with
     the browser's caret-browsing on. */
  html { caret-color: transparent; }
  input, textarea, [contenteditable], .code { caret-color: auto; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, var(--halo) 0%, var(--void) 60%) fixed;
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; min-height: 100%; overflow: hidden;
  }

  /* ── status bar (shared optic with review) ────────────────────────── */
  .bar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; font-family: var(--mono); font-size: 0.78rem;
    color: var(--dim); border-bottom: 1px solid var(--line); background: rgba(6,18,26,0.6);
  }
  .bar .brand { display: inline-flex; align-items: center; gap: 7px; color: var(--bolt); font-weight: 600; }
  .bar .brand svg { width: 14px; height: 16px; filter: drop-shadow(0 0 5px rgba(34,211,238,0.6)); }
  .bar .deck { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 0 1 auto; }
  .bar .sep { color: var(--line); flex: none; }
  .bar .spacer { flex: 1; }
  .bar .mode { flex: none; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.6rem; border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; }
  .bar .mode.live { color: var(--bolt); border-color: rgba(34,211,238,0.35); }

  /* ── stage + card (shared optic with review) ──────────────────────── */
  .stage { flex: 1; display: grid; place-items: center; padding: 16px; min-height: 0; }
  .stack { position: relative; width: var(--card-w); animation: deal 0.3s cubic-bezier(0.2,0.7,0.2,1) both; }
  @keyframes deal { from { opacity: 0; transform: translateY(12px) scale(0.985); } to { opacity: 1; transform: none; } }
  .peek { position: absolute; inset: 0; border-radius: 20px; background: var(--panel-bot); border: 1px solid var(--line); }
  .peek.p1 { transform: translate(7px, -7px); opacity: 0.7; }
  .peek.p2 { transform: translate(14px, -14px); opacity: 0.4; }
  .stack[data-depth="1"] .peek { display: none; }
  .stack[data-depth="2"] .peek.p2 { display: none; }

  .card {
    position: relative; height: var(--card-h); border-radius: 20px;
    background: linear-gradient(160deg, var(--panel-top), var(--panel-bot));
    border: 1px solid var(--line); box-shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
    padding: 22px var(--pad); overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card::after { content: ""; position: absolute; inset: 12px; border-radius: 12px; border: 1px solid rgba(125,249,232,0.10); pointer-events: none; }

  /* every region and its children share one left edge — no centering */
  .region {
    min-height: 0; overflow: auto; text-align: left;
    display: flex; flex-direction: column; justify-content: flex-start;
    gap: 12px; padding: 8px 0; scrollbar-width: none;
  }
  .region::-webkit-scrollbar { width: 0; height: 0; }
  .region.a.fade-top { mask-image: linear-gradient(to bottom, transparent, #000 30px); -webkit-mask-image: linear-gradient(to bottom, transparent, #000 30px); }
  .region.a.fade-bottom { mask-image: linear-gradient(to top, transparent, #000 30px); -webkit-mask-image: linear-gradient(to top, transparent, #000 30px); }
  .region.a.fade-top.fade-bottom { mask-image: linear-gradient(to bottom, transparent, #000 30px, #000 calc(100% - 30px), transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, #000 30px, #000 calc(100% - 30px), transparent); }
  /* a clear "there's more below" marker when the reveal region overflows the card */
  .more-hint { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.05em; color: var(--bolt); background: var(--panel-bot); border: 1px solid var(--line); border-radius: 999px; padding: 3px 11px; pointer-events: none; opacity: 0; transition: opacity 0.15s; box-shadow: 0 5px 16px -7px rgba(0,0,0,0.8); }
  .more-hint.show { opacity: 0.94; }
  .region.q { flex: 0 0 auto; max-height: 46%; }
  .region.a { flex: 1 1 auto; }
  .region.n { flex: 0 0 auto; max-height: 30%; }
  .divider { flex: none; height: 1px; width: 100%; margin: 0; background: linear-gradient(90deg, var(--line), var(--line) 82%, transparent); }

  .eyebrow { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--bolt); }
  .front-text { font-size: clamp(1.05rem, 2.3vw, 1.4rem); font-weight: 600; line-height: 1.32; letter-spacing: -0.01em; }
  .front-text.long { font-size: clamp(0.98rem, 1.8vw, 1.16rem); line-height: 1.4; }
  .lbl { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }

  /* givens: off-screen symbols the question leans on */
  .givens { display: flex; flex-wrap: wrap; gap: 6px; }
  .given { font-family: var(--mono); font-size: 0.76rem; color: var(--bolt-hi); background: rgba(34,211,238,0.07); border: 1px solid rgba(34,211,238,0.2); border-radius: 7px; padding: 3px 9px; }

  /* your committed prediction, recalled on the question side at reveal */
  .predicted { border-left: 3px solid var(--dim); padding: 2px 0 2px 12px; }
  .predicted .lbl { display: block; margin-bottom: 4px; }
  .predicted p { margin: 0; color: var(--ink); opacity: 0.8; line-height: 1.45; white-space: pre-wrap; }
  .predicted.empty p { font-style: italic; opacity: 0.5; }

  /* the reveal: the real source (the oracle), in an editor-style excerpt */
  .reveal-head { display: flex; align-items: baseline; gap: 10px; }
  .reveal-head .lbl { color: var(--bolt); }
  .reveal-head .at { font-family: var(--mono); font-size: 0.74rem; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .excerpt { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--excerpt-bg); }
  .excerpt .file { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); padding: 7px 13px; border-bottom: 1px solid var(--line); background: rgba(0,0,0,0.25); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .code { margin: 0; padding: 9px 0; overflow-x: auto; }
  .ln { display: flex; font-family: var(--mono); font-size: 0.8rem; line-height: 1.55; }
  .ln .n { flex: none; width: 3.2em; padding-right: 13px; text-align: right; color: var(--dim); opacity: 0.55; user-select: none; }
  .ln .t { white-space: pre; color: #cfe7ea; padding-right: 16px; }
  .trunc { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); padding: 5px 13px 0; }
  .excerpt-miss { color: var(--dim); font-size: 0.86rem; font-style: italic; padding: 13px 15px; border: 1px dashed var(--line); border-radius: 12px; }

  /* key points the revealed truth makes */
  .points { margin: 0; padding: 0; list-style: none; }
  .points .lbl { display: block; color: var(--good); margin-bottom: 6px; }
  .points li.pt { position: relative; padding: 4px 0 4px 20px; color: var(--ink); line-height: 1.45; }
  .points li.pt::before { content: "▸"; position: absolute; left: 0; color: var(--good); }

  /* the resolved live grade, shown in the answer region */
  .verdict .badge { display: inline-block; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.05em; padding: 4px 12px; border-radius: 999px; margin-bottom: 8px; }
  .badge.got { color: var(--good); background: rgba(62,224,160,0.13); border: 1px solid rgba(62,224,160,0.3); }
  .badge.partial { color: var(--warn); background: rgba(245,196,81,0.13); border: 1px solid rgba(245,196,81,0.3); }
  .badge.missed { color: var(--again); background: rgba(255,107,107,0.13); border: 1px solid rgba(255,107,107,0.3); }
  .verdict p { margin: 0; line-height: 1.45; opacity: 0.9; }
  .grade-err { color: var(--warn); font-size: 0.86rem; }
  .thinking { display: flex; align-items: center; gap: 10px; color: var(--dim); font-style: italic; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--line); border-top-color: var(--bolt); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* the predict / compress text box fills the answer region */
  .compose { height: 100%; display: flex; flex-direction: column; gap: 10px; }
  .field { flex: 1 1 auto; width: 100%; resize: none; min-height: 120px; padding: 14px 16px; border-radius: 13px; border: 1px solid var(--line); background: rgba(0,0,0,0.25); color: var(--ink); font: 1.02rem/1.5 var(--sans); outline: none; }
  .field:focus { border-color: var(--bolt); box-shadow: 0 0 0 3px rgba(34,211,238,0.12); }
  .lede { flex: none; color: var(--dim); font-size: 0.9rem; line-height: 1.5; }

  /* the note (warm block), reused from review */
  .note { background: var(--note-bg); border: 1px solid var(--note-line); border-left: 3px solid var(--note-border); border-radius: 10px; padding: 12px 15px; color: var(--note-ink); font-size: 0.92rem; line-height: 1.5; }

  /* ── done summary (review's .summary optic) ───────────────────────── */
  .summary { width: var(--card-w); text-align: left; animation: deal 0.3s both; }
  .summary .lede { font-family: var(--mono); color: var(--bolt); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
  .summary h2 { font-size: 1.4rem; margin: 0 0 18px; line-height: 1.3; }
  .summary .row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); color: var(--dim); }
  .summary .row b { color: var(--ink); font-family: var(--mono); font-weight: 600; }
  .summary .row b.got { color: var(--good); } .summary .row b.partial { color: var(--warn); } .summary .row b.missed { color: var(--again); }
  .summary .compression { margin-top: 18px; border-left: 3px solid var(--bolt); padding: 4px 0 4px 14px; }
  .summary .compression .lbl { display: block; color: var(--bolt); margin-bottom: 6px; }
  .summary .compression p { margin: 0; line-height: 1.55; white-space: pre-wrap; color: var(--ink); }

  /* ── bottom action bar (verbatim from review) ─────────────────────── */
  .legend { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  .legend .keys { grid-column: 2; display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .legend .score { grid-column: 3; justify-self: end; font-family: var(--mono); font-size: 0.82rem; color: var(--dim); font-variant-numeric: tabular-nums; }
  .legend .score b { color: var(--good); font-weight: 600; }
  .legend .score i { color: var(--warn); font-style: normal; font-weight: 600; }
  .legend .score s { color: var(--again); text-decoration: none; font-weight: 600; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; color: var(--ink); border: 1px solid var(--line);
    border-radius: 11px; padding: 8px 13px; min-height: 42px;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .chip .k { font-family: var(--mono); font-size: 0.68rem; color: var(--dim); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; }
  .chip:hover { border-color: var(--bolt); color: var(--bolt-hi); }
  .chip:focus-visible { outline: 2px solid var(--bolt-hi); outline-offset: 2px; }
  .chip.primary { background: var(--bolt); color: var(--void); border-color: var(--bolt); }
  .chip.primary .k { color: rgba(6,18,26,0.55); border-color: rgba(6,18,26,0.3); }
  .chip.primary:hover { filter: brightness(1.08); color: var(--void); }
  .chip.again { color: var(--again); border-color: rgba(255,107,107,0.4); }
  .leave-msg { color: var(--dim); font-size: 0.9rem; margin-right: auto; }
  .chip.missed:hover { border-color: var(--again); color: var(--again); }
  .chip.partial:hover { border-color: var(--good); color: var(--good); }
  .chip.got:hover { border-color: var(--bolt-hi); color: var(--bolt-hi); }
  .chip:disabled { opacity: 0.4; cursor: default; }

  /* ask-Claude panel — the same optic as the review tutor, its subject the
     current checkpoint (prompt + key points) instead of a card. */
  .ask { display: flex; flex-direction: column; gap: 14px; width: var(--card-w); max-width: 100%; }
  .ask-scroll { display: flex; flex-direction: column; gap: 12px; max-height: 64vh; overflow-y: auto; padding-right: 4px; }
  .ask-log { display: flex; flex-direction: column; gap: 10px; }
  .ask-q { align-self: flex-end; max-width: 85%; background: rgba(125,249,232,0.10); border: 1px solid var(--line); border-radius: 12px 12px 4px 12px; padding: 9px 13px; }
  .ask-a { align-self: flex-start; max-width: 92%; white-space: pre-wrap; line-height: 1.5; border-left: 3px solid var(--bolt); padding: 4px 0 4px 12px; }
  .ask-thinking { align-self: flex-start; color: var(--dim); font-style: italic; }
  .ask-status { align-self: flex-start; color: var(--good); font-size: 0.85rem; }
  .ask-error { align-self: flex-start; color: var(--again); font-size: 0.85rem; }
  .ask-hint { color: var(--dim); }
  .ask-card { position: sticky; top: 0; z-index: 2; border: 1px solid var(--line); border-radius: 12px; padding: 9px 13px; background: var(--panel-bot); max-height: 30vh; overflow-y: auto; box-shadow: 0 10px 18px -14px var(--void); }
  .ask-card-q { color: var(--bolt); margin-bottom: 5px; }
  .ask-card-a { color: var(--ink); line-height: 1.45; }
  .ask-input { width: 100%; box-sizing: border-box; resize: vertical; min-height: 52px; padding: 11px 13px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.25); color: var(--ink); font: inherit; }
  .ask-input:focus { outline: none; border-color: var(--bolt); }
  .ask-input:disabled { opacity: 0.6; }

  @media (prefers-reduced-motion: reduce) { .stack, .summary { animation: none; } }
</style>
</head>
<body>
  <div class="bar">
    <span class="brand">
      <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M 269 168 L 221 254 L 253 254 L 237 348 L 297 246 L 263 246 L 285 168 Z" fill="currentColor"/></svg>
      alix
    </span>
    <span class="sep">·</span>
    <span class="deck" id="deck">trace</span>
    <span class="spacer"></span>
    <span class="mode" id="mode">self-grade</span>
    <button id="theme-open" class="theme-trigger" type="button" aria-label="Choose theme">◑</button>
  </div>
  <main class="stage" id="stage"></main>
  <div class="legend">
    <div class="keys" id="legend"></div>
    <span class="score" id="score"></span>
  </div>

<script>
"use strict";
let state = null;     // the latest WalkDto
let poll = null;      // setInterval handle while a live grade is in flight
let KEYS = {};        // configured key bindings, from /api/keys
let asking = false;   // the ask-Claude panel is open
let askData = { transcript: [], thinking: false, status: null, error: null };
let askPoll = null;   // setInterval handle while an ask reply is pending
// Hosted by the review server (picked from its deck list) rather than standalone
// `alix trace --serve` — so we offer a "Back to decks" return to the picker.
const HOSTED = location.pathname === "/walk";

const api  = (path, opts) => fetch(path, opts).then(r => r.json());
const post = body => ({ method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
const el = (tag, cls, text) => { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; };
const stage = document.getElementById("stage");
const legend = document.getElementById("legend");

// does a keydown match a configured binding list? (same as review)
function hit(e, binds) { return (binds || []).some(b => b.ctrl === e.ctrlKey && e.key.toLowerCase() === b.k.toLowerCase()); }
function label(binds) {
  if (!binds || !binds.length) return "";
  const b = binds[0];
  const name = b.k === " " ? "space" : b.k === "Enter" ? "enter" : b.k === "Escape" ? "esc" : b.k;
  return (b.ctrl ? "ctrl-" : "") + name;
}

function load()  { api("/api/walk").then(apply); }
function apply(d) { state = d; if (d.thinking) startPoll(); else stopPoll(); render(); }

function predict(text) { api("/api/walk/predict", post({ text })).then(apply); }
function grade(delta)  { api("/api/walk/grade", post({ delta })).then(apply); }
function restart()     { api("/api/walk/restart", post({})).then(apply); }
// Capstone (hosted mode): leave the walk and have the picker open this trace's
// exam — the compression that verifies and masters it. The picker remembers
// which trace it launched (sessionStorage), so we only flag the intent here.
function takeExam()    { sessionStorage.setItem("alix.takeExam", "1"); leaveWalk(); }

// ── ask-Claude about the current checkpoint (hosted mode) ──────────────────
// The same tutor the review uses; the server scopes it to the current
// checkpoint (prompt + key points + the live excerpt). One conversation spans
// the walk; the panel polls /api/walk/ask while a reply is pending.
function openAsk() { asking = true; render(); api("/api/walk/ask").then(d => { askData = d; if (asking) syncAsk(); }); }
function closeAsk() { asking = false; stopAskPoll(); load(); } // re-pull the walk (a saved note may have landed)
function sendAsk(text) {
  const q = (text || "").trim();
  if (!q || askData.thinking) return;
  const ta = document.querySelector(".ask-input");
  if (ta) ta.value = "";
  api("/api/walk/ask", post({ question: q })).then(d => { askData = d; if (asking) syncAsk(); startAskPoll(); });
}
function saveAskNote() {
  if (askData.thinking || !askData.transcript.length) return;
  api("/api/walk/ask/note", post({})).then(d => { askData = d; if (asking) syncAsk(); startAskPoll(); });
}
function startAskPoll() { stopAskPoll(); askPoll = setInterval(() => { api("/api/walk/ask").then(d => { askData = d; if (!d.thinking) stopAskPoll(); if (asking) syncAsk(); }); }, 400); }
function stopAskPoll() { if (askPoll) { clearInterval(askPoll); askPoll = null; } }
function fillAskLog(log) {
  log.innerHTML = "";
  for (const ex of askData.transcript) { log.appendChild(el("div", "ask-q", ex.q)); log.appendChild(el("div", "ask-a", ex.a)); }
  if (askData.thinking) log.appendChild(el("div", "ask-thinking", "Claude is thinking…"));
  if (askData.status) log.appendChild(el("div", "ask-status", askData.status));
  if (askData.error) log.appendChild(el("div", "ask-error", askData.error));
  if (!askData.transcript.length && !askData.thinking && !askData.status && !askData.error) log.appendChild(el("div", "ask-hint", "Ask Claude about this step."));
  const sc = log.closest(".ask-scroll") || log;
  sc.scrollTop = sc.scrollHeight;
}
function syncAsk() {
  const wrap = document.querySelector(".ask");
  if (!wrap) { render(); return; }
  fillAskLog(wrap.querySelector(".ask-log"));
  const input = wrap.querySelector(".ask-input");
  if (input) { input.disabled = askData.thinking; if (!askData.thinking) input.focus(); }
  const send = legend.querySelector(".chip.primary");
  if (send) send.disabled = askData.thinking;
}
function renderAsk() {
  const wrap = el("div", "ask");
  const scroll = el("div", "ask-scroll");
  // The checkpoint under discussion sticks to the top as a reference: its
  // question, then the key points the reveal makes.
  const ref = el("div", "ask-card");
  if (state.prompt) ref.appendChild(el("div", "ask-card-q", state.prompt));
  for (const p of state.points || []) ref.appendChild(el("div", "ask-card-a", "▸ " + p));
  scroll.appendChild(ref);
  const log = el("div", "ask-log");
  fillAskLog(log);
  scroll.appendChild(log);
  wrap.appendChild(scroll);
  const input = el("textarea", "ask-input");
  input.placeholder = "Ask about this step… (Shift+Enter to send)";
  input.rows = 2;
  input.disabled = askData.thinking;
  input.addEventListener("keydown", e => { if (e.key === "Enter" && e.shiftKey) { e.preventDefault(); sendAsk(input.value); } });
  wrap.appendChild(input);
  stage.appendChild(wrap);
  legend.replaceChildren();
  const send = chip("Send", "primary", () => sendAsk(input.value), "⇧↵");
  send.disabled = askData.thinking;
  chip("Save note", "", saveAskNote, label(KEYS.save_note));
  chip("Close", "", closeAsk, "esc");
  if (!askData.thinking) setTimeout(() => input.focus(), 0);
}
// Abandon the walk and return to the deck picker (hosted mode only).
let confirmingLeave = false; // showing the "leave the walk?" confirmation
function leaveWalk() { fetch("/api/walk/leave", post({})).catch(() => {}).finally(() => { location.href = "/"; }); }
// A finished walk leaves straight away; an unfinished one warns first — like a
// review session — since you'd abandon the remaining checkpoints.
function backToDecks() {
  if (!state || state.phase === "done") { leaveWalk(); return; }
  confirmingLeave = true;
  legend.replaceChildren();
  legend.appendChild(el("span", "leave-msg", "Leave the walk before finishing the path?"));
  chip("Leave anyway", "again", leaveWalk, "enter");
  chip("Stay", "primary", cancelLeave, "esc");
}
function cancelLeave() { confirmingLeave = false; render(); }

function startPoll() {
  if (poll) return;
  poll = setInterval(() => api("/api/walk").then(d => { state = d; if (!d.thinking) stopPoll(); render(); }), 700);
}
function stopPoll() { if (poll) { clearInterval(poll); poll = null; } }

// ── top chrome + the running tally (got · partial · missed) ────────────────
function renderChrome() {
  document.getElementById("deck").textContent = state.description || "trace";
  document.getElementById("deck").title = state.description || "";
  const mode = document.getElementById("mode");
  mode.textContent = state.auto_grade ? "live grading" : "self-grade";
  mode.classList.toggle("live", !!state.auto_grade);

  const score = document.getElementById("score");
  score.replaceChildren();
  let g = 0, p = 0, m = 0;
  (state.path || []).forEach(h => { if (h.delta === "got") g++; else if (h.delta === "partial") p++; else if (h.delta === "missed") m++; });
  score.append(el("b", null, String(g)), " · ", el("i", null, String(p)), " · ", el("s", null, String(m)));
}

// ── render the active phase onto the shared card optic ─────────────────────
function render() {
  if (!state) return;
  renderChrome();
  stage.replaceChildren();
  legend.replaceChildren();
  if (asking) { renderAsk(); return; } // the ask panel takes over the stage
  if (state.phase === "predict")  renderPredict();
  else if (state.phase === "reveal")   renderReveal();
  else if (state.phase === "done")     renderDone();
  // A return-to-picker escape hatch when the review server hosts this walk —
  // labelled like a fact deck's session ("Leave").
  if (HOSTED) chip("Leave", "", backToDecks, "esc");
}

// the card shell with a question region; returns {card, q, a}
function buildCard() {
  const stack = el("div", "stack");
  stack.dataset.depth = Math.min(3, Math.max(1, state.total - state.current + 1));
  stack.appendChild(el("div", "peek p2"));
  stack.appendChild(el("div", "peek p1"));
  const card = el("div", "card");
  const q = el("div", "region q");
  card.appendChild(q);
  card.appendChild(el("div", "divider"));
  const a = el("div", "region a");
  a.addEventListener("scroll", () => updateFade(a));
  card.appendChild(a);
  card.appendChild(el("div", "more-hint")); // overflow marker (shown by updateFade)
  stack.appendChild(card);
  stage.appendChild(stack);
  // Compute the fade + "more" marker once content is laid out, so an overflowing
  // excerpt is flagged immediately — not only after the first scroll.
  requestAnimationFrame(() => updateFade(a));
  return { card, q, a };
}

// Count the reveal lines (`.ln`) sitting fully below the region's visible bottom,
// so the marker can say how much more there is.
function hiddenLineCount(a) {
  const lns = a.querySelectorAll(".ln");
  if (!lns.length) return 0;
  const foldY = a.getBoundingClientRect().bottom;
  let n = 0;
  lns.forEach(ln => { if (ln.getBoundingClientRect().top >= foldY - 4) n++; });
  return n;
}

function updateFade(a) {
  if (!a) return;
  const atBottom = a.scrollTop + a.clientHeight >= a.scrollHeight - 2;
  a.classList.toggle("fade-top", a.scrollTop > 2);
  a.classList.toggle("fade-bottom", !atBottom);
  const more = a.parentElement && a.parentElement.querySelector(".more-hint");
  if (!more) return;
  if (!atBottom && a.scrollHeight > a.clientHeight + 2) {
    const n = hiddenLineCount(a);
    more.textContent = n > 0 ? `⌵ ${n} more line${n === 1 ? "" : "s"}` : "⌵ more below";
    more.classList.add("show");
  } else {
    more.classList.remove("show");
  }
}

// add the question prompt (with a long-question shrink) to a region
function addPrompt(q, text) {
  q.appendChild(el("div", "eyebrow", `checkpoint ${state.current} / ${state.total}`));
  const ft = el("div", "front-text" + ((text || "").length > 110 ? " long" : ""), text || "");
  q.appendChild(ft);
}

function renderPredict() {
  const { q, a } = buildCard();
  addPrompt(q, state.prompt);
  if (state.givens && state.givens.length) {
    const g = el("div", "givens");
    state.givens.forEach(x => g.appendChild(el("span", "given", x)));
    q.appendChild(g);
  }
  const wrap = el("div", "compose");
  const ta = el("textarea", "field");
  ta.placeholder = "Predict the next checkpoint — even a hunch beats “I don’t know.”";
  ta.addEventListener("keydown", e => { if (e.key === "Enter" && (e.shiftKey || e.metaKey || e.ctrlKey)) { e.preventDefault(); submitPredict(ta); } });
  wrap.appendChild(ta);
  wrap.appendChild(el("div", "lede", "The gap between your guess and the truth is the learning.  ·  Enter for a new line, Shift+Enter to reveal."));
  a.appendChild(wrap);
  chip("Reveal", "primary", () => submitPredict(ta), "⇧↵");
  setTimeout(() => ta.focus(), 0);
}

function submitPredict(ta) { const t = ta.value.trim(); if (t) predict(t); }

function renderReveal() {
  const { card, q, a } = buildCard();
  addPrompt(q, state.prompt);
  const pred = el("div", "predicted" + (state.prediction ? "" : " empty"));
  pred.appendChild(el("span", "lbl", "you predicted"));
  pred.appendChild(el("p", null, state.prediction || "(no prediction)"));
  q.appendChild(pred);

  // the source excerpt
  const head = el("div", "reveal-head");
  head.appendChild(el("span", "lbl", "the source"));
  if (state.locator) head.appendChild(el("span", "at", "at " + state.locator));
  a.appendChild(head);
  if (state.excerpt) {
    const ex = el("div", "excerpt");
    ex.appendChild(el("div", "file", state.excerpt.path));
    const code = el("div", "code");
    state.excerpt.lines.forEach(ln => {
      const row = el("div", "ln");
      row.appendChild(el("span", "n", String(ln.n)));
      row.appendChild(el("span", "t", ln.text));
      code.appendChild(row);
    });
    ex.appendChild(code);
    if (state.excerpt.truncated) ex.appendChild(el("div", "trunc", "… excerpt truncated"));
    a.appendChild(ex);
  } else {
    a.appendChild(el("div", "excerpt-miss", state.excerpt_error || "no excerpt for this checkpoint"));
  }
  if (state.points && state.points.length) {
    const ul = el("ul", "points");
    ul.appendChild(el("li", "lbl", "key points"));
    state.points.forEach(pt => ul.appendChild(el("li", "pt", pt)));
    a.appendChild(ul);
  }
  // live grading: spinner / verdict shown inline
  if (state.thinking) {
    const t = el("div", "thinking");
    t.appendChild(el("span", "spinner"));
    t.appendChild(document.createTextNode("Claude is grading your prediction…"));
    a.appendChild(t);
  } else if (state.verdict) {
    const v = el("div", "verdict");
    v.appendChild(el("span", "badge " + verdictClass(state.verdict), state.verdict));
    if (state.feedback) v.appendChild(el("p", null, state.feedback));
    a.appendChild(v);
  } else if (state.grade_error) {
    a.appendChild(el("div", "grade-err", "Live grading failed (" + state.grade_error + ") — grade it yourself."));
  }

  // the note pins to the bottom of the card (a region grows above it)
  if (state.note) {
    card.appendChild(el("div", "divider"));
    const n = el("div", "region n");
    n.appendChild(el("div", "note", state.note));
    card.appendChild(n);
  }

  renderRevealActions();
}

function verdictClass(v) {
  v = (v || "").toLowerCase();
  return v.startsWith("got") ? "got" : v.startsWith("partial") ? "partial" : "missed";
}

// the three grades map onto review's again/good/easy keys
const DELTAS = [
  { delta: "m", cls: "missed",  label: "Missed",  keys: () => KEYS.again },
  { delta: "p", cls: "partial", label: "Partial", keys: () => KEYS.good },
  { delta: "g", cls: "got",     label: "Got it",  keys: () => KEYS.easy },
];

function renderRevealActions() {
  if (state.thinking) { chip("Grading…", "", () => {}).disabled = true; return; }
  if (state.verdict) {
    chip(state.current < state.total ? "Next checkpoint" : "Finish", "primary", () => grade(verdictClass(state.verdict)[0]), label(KEYS.reveal) || "↵");
  } else {
    // self-grade (also the fallback after a live-grade error)
    DELTAS.forEach(d => chip(d.label, d.cls, () => grade(d.delta), label(d.keys())));
  }
  // Ask Claude about this step (hosted mode — the review server runs the tutor).
  if (HOSTED) chip("Ask", "", openAsk, label(KEYS.ask) || "?");
}

function renderDone() {
  const s = state.summary || { got: 0, partial: 0, missed: 0, weak: [], total: 0 };
  const wrap = el("div", "summary");
  wrap.appendChild(el("div", "lede", "walk complete · the drill is done"));
  wrap.appendChild(el("h2", null, state.description || "Trace walked."));
  const row = (k, v, cls) => {
    const r = el("div", "row");
    r.appendChild(el("span", null, k));
    r.appendChild(el("b", cls || null, v));
    wrap.appendChild(r);
  };
  row("got", String(s.got), "got");
  row("partial", String(s.partial), "partial");
  row("missed", String(s.missed), "missed");
  if (s.weak && s.weak.length) row("weak (resurface sooner)", s.weak.map(h => "#" + h).join(" · "));
  else if (s.total) row("every checkpoint landed", "✓");
  // The exam (the compression) is what verifies and masters the trace.
  wrap.appendChild(el("div", "lede", HOSTED
    ? "Verify it: retrace the whole path in the exam to master this trace."
    : "Verify it with `alix exam` — retrace the whole path to master this trace."));
  stage.appendChild(wrap);
  if (HOSTED) chip("Take the exam", "primary", takeExam, "↵");
  chip("Walk again", HOSTED ? "" : "primary", restart, HOSTED ? "" : (label(KEYS.reveal) || "↵"));
}

function chip(text, cls, onClick, key) {
  const b = el("button", "chip" + (cls ? " " + cls : ""), text);
  if (key) b.appendChild(el("span", "k", key));
  b.addEventListener("click", onClick);
  legend.appendChild(b);
  return b;
}

// keyboard: the grade keys (again/good/easy) on the reveal; reveal/Enter for the
// primary action. Typing in a textarea is left alone.
document.addEventListener("keydown", e => {
  if (!state || e.altKey || e.metaKey) return;
  // While the ask panel is open: Esc closes it; typing + Shift+Enter-to-send are
  // handled inside the panel's own input.
  if (asking) {
    if (e.key === "Escape") { e.preventDefault(); closeAsk(); }
    return;
  }
  // While the leave confirmation is up: Enter leaves, Esc keeps going.
  if (HOSTED && confirmingLeave) {
    if (e.key === "Enter") { e.preventDefault(); leaveWalk(); }
    else if (e.key === "Escape") { e.preventDefault(); cancelLeave(); }
    return;
  }
  // Esc returns to the deck picker (hosted mode), even from a textarea — but an
  // unfinished walk asks to confirm first.
  if (HOSTED && e.key === "Escape") { e.preventDefault(); backToDecks(); return; }
  if (e.target && /^(TEXTAREA|INPUT)$/.test(e.target.tagName)) return;
  // `?` (or the configured ask key) opens the tutor on the reveal.
  if (HOSTED && state.phase === "reveal" && (e.key === "?" || hit(e, KEYS.ask))) { e.preventDefault(); openAsk(); return; }
  if (state.phase === "reveal" && !state.thinking && !state.verdict) {
    for (const d of DELTAS) if (hit(e, d.keys())) { e.preventDefault(); grade(d.delta); return; }
  }
  if (hit(e, KEYS.reveal) || (e.key === "Enter" && !e.ctrlKey)) {
    const b = legend.querySelector(".chip.primary");
    if (b && !b.disabled) { e.preventDefault(); b.click(); }
  }
});

api("/api/keys").then(k => { KEYS = k; if (state) render(); });
load();
</script>
<script src="/theme.js"></script>
</body>
</html>
